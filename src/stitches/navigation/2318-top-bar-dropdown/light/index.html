<!--                 Navigation                   -->
<!-- ============================================ -->

<header id="cs-navigation">
    <!--Nav Logo-->
    <a href="" class="cs-logo cs-desktop" aria-label="Return to [Company Name] Home page">
        <div class="cs-logo-wrapper">
            <!--Default Logo-->
            <img class="cs-default" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Logos/construction-logo.svg" alt="" width="210" height="29" aria-hidden="true" decoding="async">
            <!--Dark Mode Logo-->
            <img class="cs-dark" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Logos/construction-logo-white2.svg" alt="" width="210" height="29" aria-hidden="true" decoding="async">
        </div>
    </a>
    <div class="cs-middle">
        <!--Top Bar-->
        <div class="cs-top-bar">
            <div class="cs-top-social">
                <a href="" class="cs-social-link" aria-label="Facebook">
                    <img class="cs-social-icon" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Icons/facebook-1a.svg" alt="" width="12" height="12" aria-hidden="true" decoding="async">
                </a>
                <a href="" class="cs-social-link" aria-label="Twitter">
                    <img class="cs-social-icon" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Icons/twitter-1a.svg" alt="" width="12" height="12" aria-hidden="true" decoding="async">
                </a>
                <a href="" class="cs-social-link" aria-label="Instagram">
                    <img class="cs-social-icon" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Icons/instagram1a.svg" alt="" width="12" height="12" aria-hidden="true" decoding="async">
                </a>
                <a href="" class="cs-social-link" aria-label="YouTube">
                    <img class="cs-social-icon" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Icons/youtube1a.svg" alt="" width="12" height="12" aria-hidden="true" decoding="async">
                </a>
            </div>
            <ul class="cs-location">
                <li class="cs-item cs-remove">
                    <img class="cs-icon" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Icons/red-pin1.svg" alt="" width="20" height="20" aria-hidden="true" decoding="async">
                    555 Fake Avenue - South Milwaukee, WI 53172
                </li>
                <li class="cs-item">
                    <img class="cs-icon" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Icons/red-clock1.svg" alt="" width="20" height="20" aria-hidden="true" decoding="async">
                    M-F: 8:00am - 9:00pm
                </li>
            </ul>
        </div>
        <div class="cs-bottom-bar">
            <a href="" class="cs-logo cs-mobile" aria-label="Return to [Company Name] Home page">
                <div class="cs-logo-wrapper">
                    <!--Default Logo-->
                    <img class="cs-default" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Logos/construction-logo.svg" alt="" width="210" height="29" aria-hidden="true" decoding="async">
                    <!--Dark Mode Logo-->
                    <img class="cs-dark" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Logos/construction-logo-white2.svg" alt="" width="210" height="29" aria-hidden="true" decoding="async">
                </div>
            </a>
            <!--Navigation List-->
            <nav class="cs-nav" aria-label="main navigation">
                <!--Mobile Nav Toggle-->
                <button class="cs-toggle" aria-expanded="false" aria-controls="cs-ul-wrapper" aria-label="mobile menu toggle" aria-haspopup="menu">
                    <span class="cs-box" aria-hidden="true">
                        <span class="cs-line cs-line1"></span>
                        <span class="cs-line cs-line2"></span>
                        <span class="cs-line cs-line3"></span>
                    </span>
                </button>
                <!-- We need a wrapper div so we can set a fixed height on the cs-ul in case the nav list gets too long from too many dropdowns being opened and needs to have an overflow scroll. This wrapper acts as the background so it can go the full height of the screen and not cut off any overflowing nav items while the cs-ul stops short of the bottom of the screen, which keeps all nav items in view no matter how mnay there are-->
                <div class="cs-ul-wrapper" id="cs-ul-wrapper">
                    <ul class="cs-ul">
                        <li class="cs-li">
                            <a href="" class="cs-li-link cs-active" aria-current="page">
                                Home
                            </a>
                        </li>
                        <!--Copy and paste this cs-dropdown list item and replace any .cs-li with this cs-dropdown group to make a new dropdown and it will work-->
                        <!-- Note: When copying this dropdown, update the id attribute with an appropriate name (e.g., "services-dropdown-toggle", "products-dropdown-toggle") and ensure the aria-labelledby attribute on the ul matches the button's id -->
                        <li class="cs-li cs-dropdown">
                            <button class="cs-li-link cs-dropdown-toggle" aria-haspopup="menu" aria-expanded="false" id="services-dropdown-toggle">
                                Services
                                <img class="cs-drop-icon" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Icons/arrow-dwon2.svg" alt="" width="24" height="24" decoding="async" aria-hidden="true">
                            </button>
                            <ul class="cs-drop-ul" aria-labelledby="services-dropdown-toggle">
                                <li class="cs-drop-li">
                                    <a href="" class="cs-li-link cs-drop-link">New Construction</a>
                                </li>
                                <li class="cs-drop-li">
                                    <a href="" class="cs-li-link cs-drop-link">Home Remodels</a>
                                </li>
                            </ul>
                        </li>
                        <li class="cs-li">
                            <a href="" class="cs-li-link">
                                About
                            </a>
                        </li>
                        <li class="cs-li">
                            <a href="" class="cs-li-link">
                                Asthetics
                            </a>
                        </li>
                        <li class="cs-li">
                            <a href="" class="cs-li-link">
                                FAQ
                            </a>
                        </li>
                    </ul>
                </div>
            </nav>
            <a class="cs-nav-button cs-tablet" href="" aria-label="Call us at (604) 555-0234">
                <picture class="cs-wrapper">
                    <img class="cs-icon" loading="lazy" decoding="async" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Icons/red-phone1.svg" alt="" width="24" height="24" aria-hidden="true">
                </picture>
                <div class="cs-info">
                    <span class="cs-header">Free Contact 24/7</span>
                    <span class="cs-link-content">(604) 555-0234</span>
                </div>
            </a>
            <a href="" class="cs-button-border">
                Get In Touch
                <img class="cs-icon" loading="lazy" decoding="async" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Icons/up-right-arrow.svg" alt="" width="20" height="20" aria-hidden="true">
            </a>
            <!--Dark Mode toggle, uncomment button code if you want to enable a dark mode toggle-->
            <!--<button id="dark-mode-toggle" aria-label="dark mode toggle" aria-pressed="false">
                <svg class="cs-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" style="enable-background:new 0 0 480 480" xml:space="preserve" aria-hidden="true"><path d="M459.782 347.328c-4.288-5.28-11.488-7.232-17.824-4.96-17.76 6.368-37.024 9.632-57.312 9.632-97.056 0-176-78.976-176-176 0-58.4 28.832-112.768 77.12-145.472 5.472-3.712 8.096-10.4 6.624-16.832S285.638 2.4 279.078 1.44C271.59.352 264.134 0 256.646 0c-132.352 0-240 107.648-240 240s107.648 240 240 240c84 0 160.416-42.688 204.352-114.176 3.552-5.792 3.04-13.184-1.216-18.496z" /></svg>
                <img class="cs-sun" aria-hidden="true" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Icons%2Fsun.svg" decoding="async" alt="" width="15" height="15">
            </button>-->
        </div>
    </div>
    <div class="cs-contact-wrapper">
        <a class="cs-desktop-button" href="" aria-label="Call us at (604) 555-0234">
            <picture class="cs-wrapper">
                <img class="cs-button-icon" loading="lazy" decoding="async" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Icons/red-phone1.svg" alt="" width="24" height="24" aria-hidden="true">
            </picture>
            <div class="cs-info">
                <span class="cs-header">Free Contact 24/7</span>
                <span class="cs-link-content">(604) 555-0234</span>
            </div>
        </a>
    </div>
</header>
