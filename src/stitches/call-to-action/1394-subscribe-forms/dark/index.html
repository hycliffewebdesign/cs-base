<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>subscribe forms</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---            CTA             -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #cta-1394 {
    /* 60px - 124px top and bottom */
    padding: clamp(3.75rem, 7.82vw, 7.75rem) 1rem;
    background-color: #1a1a1a;
    position: relative;
    overflow: hidden;
    z-index: 1;
  }
  #cta-1394 .cs-container {
    width: 100%;
    /* changes to 1280px at tablet */
    max-width: calc(550 / 16 * 1rem);
    margin: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    /* 48px - 64px */
    gap: clamp(3rem, 6vw, 4rem);
    position: relative;
    z-index: 1;
  }
  #cta-1394 .cs-content {
    /* set text align to left if content needs to be left aligned */
    text-align: center;
    width: 100%;
    max-width: calc(522 / 16 * 1rem);
    display: flex;
    flex-direction: column;
    /* centers content horizontally, set to flex-start to left align */
    align-items: center;
    position: relative;
    z-index: 1;
  }
  #cta-1394 .cs-content:before {
    /* circle overlay */
    content: "";
    width: calc(774 / 16 * 1rem);
    height: calc(774 / 16 * 1rem);
    background: #1a1a1a;
    opacity: 0.8;
    border-radius: 50%;
    position: absolute;
    display: block;
    /* -36px to -92px */
    top: calc(clamp(2.25rem, 6vw, 5.75rem) * -1);
    left: 50%;
    z-index: -1;
    transform: translateX(-50%);
  }
  #cta-1394 .cs-title,
  #cta-1394 .cs-text {
    max-width: calc(500 / 16 * 1rem);
    color: var(--bodyTextColorWhite);
  }
  #cta-1394 .cs-text {
    margin-bottom: calc(32 / 16 * 1rem);
    opacity: 0.8;
  }
  #cta-1394 .cs-form {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: calc(12 / 16 * 1rem);
    position: relative;
    z-index: 1;
  }
  #cta-1394 .cs-input {
    font-size: calc(16 / 16 * 1rem);
    width: 100%;
    /* 46px - 72px */
    height: clamp(2.875rem, 8vw, 4.5rem);
    margin: 0;
    padding: 0;
    padding-left: calc(20 / 16 * 1rem);
    border: none;
    border-radius: calc(80 / 16 * 1rem);
    /* prevents padding from adding to width and height */
    box-sizing: border-box;
    display: block;
  }
  #cta-1394 .cs-input::placeholder {
    color: #767676;
  }
  #cta-1394 .cs-button-solid {
    font-size: calc(16 / 16 * 1rem);
    /* 46px - 56px */
    line-height: clamp(2.875rem, 5.5vw, 3.5rem);
    text-decoration: none;
    font-weight: 700;
    text-align: center;
    margin: 0;
    color: #fff;
    min-width: calc(150 / 16 * 1rem);
    padding: 0 calc(32 / 16 * 1rem);
    overflow: hidden;
    background-color: var(--primary);
    border-radius: calc(80 / 16 * 1rem);
    display: inline-block;
    position: relative;
    z-index: 1;
    /* prevents padding from adding to the width */
    box-sizing: border-box;
  }
  #cta-1394 .cs-button-solid:before {
    content: "";
    position: absolute;
    height: 100%;
    width: 0%;
    background: #000;
    opacity: 1;
    top: 0;
    left: 0;
    z-index: -1;
    transition: width 0.3s;
  }
  #cta-1394 .cs-button-solid:hover {
    cursor: pointer;
  }
  #cta-1394 .cs-button-solid:hover:before {
    width: 100%;
  }
  #cta-1394 .cs-submit {
    width: 100%;
    border: none;
  }
  #cta-1394 .cs-background {
    width: 100%;
    height: 100%;
    display: block;
    position: absolute;
    top: 0;
    left: 0;
    z-index: -1;
  }
  #cta-1394 .cs-background img {
    height: 100%;
    width: 100%;
    opacity: 0.5;
    position: absolute;
    top: 0;
    left: 0;
    object-fit: cover;
  }
}
/* Tablet - 768px */
@media only screen and (min-width: 48rem) {
  #cta-1394 .cs-container {
    max-width: calc(1280 / 16 * 1rem);
  }
  #cta-1394 .cs-input {
    width: 100%;
  }
  #cta-1394 .cs-submit {
    width: auto;
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    right: calc(8 / 16 * 1rem);
  }
  #cta-1394 .cs-picture {
    width: 50%;
  }
}
</style>
</head>
<body>

<!-- ============================================ -->
<!--                     CTA                      -->
<!-- ============================================ -->

<section id="cta-1394">
    <div class="cs-container">
        <div class="cs-content">
            <span class="cs-topper">Subscribe</span>
            <h2 class="cs-title">Subscribe for Newsletter</h2>
            <p class="cs-text">
                Subscribe to our newsletter and stay up-to-date with the latest news, exclusive offers, and exciting updates.
            </p>
            <form class="cs-form" name="Contact Form" method="post">
                <input class="cs-input" type="email" id="cs-email-1394" name="find-us" placeholder="Email Address">
                <button class="cs-button-solid cs-submit" type="submit">Subscribe Now</button>
            </form>
        </div>
    </div>
    <!--Background Image-->
    <picture class="cs-background">
        <source media="(max-width: 600px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/meeting10.jpg">
        <source media="(min-width: 601px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/meeting10.jpg">
        <img loading="lazy" decoding="async" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/meeting10.jpg" alt="meeting" width="1920" height="486" aria-hidden="true">
    </picture>
</section>

<script></script>
</body>
</html>
