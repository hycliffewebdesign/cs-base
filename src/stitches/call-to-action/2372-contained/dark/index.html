<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>contained</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---      Call To Action        -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #cta-2372 {
    padding: var(--sectionPadding);
  }
  #cta-2372 .cs-container {
    width: 100%;
    max-width: 80rem;
    margin: auto;
    padding: clamp(2rem, 8vw, 3.75rem) clamp(1rem, 6vw, 6.75rem) 0;
    background-color: #08101A;
    border-radius: 1rem;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    /* 48px - 64px */
    gap: clamp(3rem, 6vw, 4rem);
    position: relative;
    z-index: 1;
  }
  #cta-2372 .cs-content {
    /* set text align to left if content needs to be left aligned */
    text-align: left;
    width: 100%;
    max-width: 36.25rem;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    /* centers content horizontally, set to flex-start to left align */
    align-items: flex-start;
  }
  #cta-2372 .cs-title {
    text-align: inherit;
    margin-bottom: 2rem;
    /* 48px - 64px */
    padding-bottom: clamp(3rem, 6vw, 4rem);
    color: var(--bodyTextColorWhite);
    position: relative;
    z-index: 1;
  }
  #cta-2372 .cs-title:before {
    content: '';
    width: 100vw;
    height: 1px;
    background: #D2D8DF;
    opacity: 0.2;
    display: block;
    position: absolute;
    bottom: 0;
    left: 0;
  }
  #cta-2372 .cs-text {
    margin-bottom: 1rem;
    color: var(--bodyTextColorWhite);
  }
  #cta-2372 .cs-text:last-of-type {
    margin-bottom: 2rem;
  }
  #cta-2372 .cs-button-solid {
    font-size: 1rem;
    /* 46px - 56px */
    line-height: clamp(2.875em, 5.5vw, 3.5em);
    text-decoration: none;
    font-weight: 700;
    text-align: center;
    margin: 0;
    color: #fff;
    min-width: 9.375rem;
    padding: 0 1.5rem;
    background-color: var(--primary);
    border-radius: 6.25rem;
    white-space: nowrap;
    overflow: hidden;
    display: inline-block;
    position: relative;
    z-index: 1;
    /* prevents padding from adding to the width */
    box-sizing: border-box;
  }
  #cta-2372 .cs-button-solid:before {
    content: '';
    position: absolute;
    height: 100%;
    width: 0%;
    background: #000;
    opacity: 1;
    top: 0;
    left: 0;
    z-index: -1;
    border-radius: 0.25rem;
    transition: width 0.3s;
  }
  #cta-2372 .cs-button-solid:hover:before {
    width: 100%;
  }
  #cta-2372 .cs-graphic {
    width: 100%;
    max-width: 30.625rem;
    height: auto;
    display: block;
  }
  #cta-2372 .cs-floater {
    width: 53.1875rem;
    height: auto;
    background-blend-mode: hard-light;
    opacity: 0.54;
    filter: blur(80px);
    /* prevents the mouse from interacting wiht it */
    pointer-events: none;
    display: block;
    position: absolute;
    left: 50%;
    top: 50%;
    z-index: -1;
    transform: translate(-50%, -50%);
  }
}
/* Tablet - 700px */
@media only screen and (min-width: 43.75rem) {
  #cta-2372 .cs-container {
    padding-bottom: 3.75rem;
    flex-direction: row;
    align-items: flex-end;
  }
  #cta-2372 .cs-content {
    width: 45vw;
  }
  #cta-2372 .cs-graphic {
    width: 40vw;
    position: absolute;
    bottom: 0rem;
    right: 1.125rem;
    z-index: 1;
  }
}
</style>
</head>
<body>

<!-- ============================================ -->
<!--                Call To Action                -->
<!-- ============================================ -->

<section id="cta-2372">
    <div class="cs-container">
        <div class="cs-content">
            <h2 class="cs-title">Start Your Journey Towards Success Today</h2>
            <p class="cs-text">
                Receive expert support and compassionate care tailored to your needs, along with a personalized therapy plan designed to fit seamlessly into your life.
            </p>
            <a href="" class="cs-button-solid">Schedule Your Consultation</a>
        </div>
        <img class="cs-graphic" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Graphics/healing-hands.svg" alt="graphic" loading="lazy" decoding="async" width="490" height="451">
        <img class="cs-floater" loading="lazy" decoding="async" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Graphics/flower2.svg" alt="flower blur" width="851" height="991" aria-hidden="true">
    </div>
</section>

<script></script>
</body>
</html>
