<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>full width</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---      Call To Action        -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #cta-2400 {
    padding: var(--sectionPadding);
    background-color: #191005;
    overflow: hidden;
    position: relative;
    z-index: 1;
  }
  #cta-2400:before {
    content: '';
    width: 100%;
    height: 100%;
    opacity: 0.02;
    background-image: url(https://nyc3.digitaloceanspaces.com/csimages2/Images/Patterns/noise100.png);
    background-attachment: fixed;
    background-repeat: repeat;
    display: block;
    position: absolute;
    top: 0;
    left: 0;
    pointer-events: none;
    z-index: 420;
  }
  #cta-2400 .cs-container {
    width: 100%;
    max-width: 80rem;
    margin: auto;
    padding: 0;
    display: flex;
    flex-direction: column-reverse;
    align-items: center;
    gap: 3rem;
    position: relative;
    z-index: 1;
  }
  #cta-2400 .cs-content {
    text-align: center;
    width: 100%;
    max-width: 28.5625rem;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  #cta-2400 .cs-title {
    text-align: inherit;
    text-wrap: balance;
    margin-bottom: 1rem;
    color: var(--bodyTextColorWhite);
    position: relative;
    z-index: 1;
  }
  #cta-2400 .cs-text {
    max-width: 28.5625rem;
    margin-bottom: 1rem;
    color: var(--bodyTextColorWhite);
  }
  #cta-2400 .cs-text:last-of-type {
    margin-bottom: 2rem;
  }
  #cta-2400 .cs-button-solid {
    --gradientmix: color-mix(in lab, var(--primary), black 49%);
    font-size: 1rem;
    line-height: clamp(2.875rem, 5.5vw, 3.5rem);
    text-decoration: none;
    font-weight: 700;
    text-align: center;
    color: #fff;
    white-space: nowrap;
    margin: 0;
    min-width: 9.375rem;
    padding: 0 1.75rem;
    background-color: var(--primary);
    background-image: -moz-linear-gradient(top, rgba(0, 0, 0, 0) 0%, var(--gradientmix) 99%);
    background-image: -webkit-linear-gradient(top, rgba(0, 0, 0, 0) 0%, var(--gradientmix) 99%);
    background-image: linear-gradient(to bottom, rgba(0, 0, 0, 0) 0%, var(--gradientmix) 99%);
    border-radius: 6.25rem;
    overflow: hidden;
    display: inline-block;
    position: relative;
    z-index: 1;
  }
  #cta-2400 .cs-button-solid:before {
    content: '';
    width: 0%;
    height: 100%;
    border-radius: 0.25rem;
    background: var(--secondary);
    position: absolute;
    top: 0;
    left: 0;
    z-index: -1;
    transition: width 0.3s;
    opacity: 1;
  }
  #cta-2400 .cs-button-solid:hover:before {
    width: 100%;
  }
  #cta-2400 .cs-graphic {
    width: 100%;
    /* changes to 914px at tablet */
    max-width: 28.5625rem;
    height: auto;
    display: block;
  }
}
/* Tablet - 768px */
@media only screen and (min-width: 48rem) {
  #cta-2400 {
    min-height: 18.8125rem;
  }
  #cta-2400 .cs-container {
    flex-direction: row;
    align-items: flex-end;
    gap: 0;
  }
  #cta-2400 .cs-content {
    text-align: left;
    width: 45%;
    max-width: 32.625rem;
    align-items: flex-start;
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
  }
  #cta-2400 .cs-graphic {
    width: 50vw;
    max-width: 57.125rem;
    max-height: 100%;
    position: relative;
    left: 50%;
    z-index: 1;
  }
}
/* Desktop - 1024px */
@media only screen and (min-width: 64rem) {
  #cta-2400 {
    min-height: 28.125rem;
  }
  #cta-2400 .cs-graphic {
    margin-left: -3.25rem;
  }
}
</style>
</head>
<body>

<!-- ============================================ -->
<!--                Call To Action                -->
<!-- ============================================ -->

<section id="cta-2400">
    <div class="cs-container">
        <div class="cs-content">
            <h2 class="cs-title">Looking to tidy up your yard?</h2>
            <p class="cs-text">
                Contact Poop Patrol Stitches today for your free estimate and see why so many pet owners trust our team.
            </p>
            <a href="" class="cs-button-solid">Get Your Free Quote</a>
        </div>
        <!--Adjust the max width of the image on tablet to change its height if you need it to be shorter-->
        <img class="cs-graphic" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Graphics/dog.svg" alt="dog graphic" loading="lazy" decoding="async" width="681" height="534">
    </div>
</section>

<script></script>
</body>
</html>
