<head>

  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>

/* Mobile - 360px */
@media only screen and (min-width: 0rem) {

  #subscribe-1717 .cs-container {

    max-width: 34.375rem;

    display: flex;
    flex-direction: column;
    align-items: center;

    gap: clamp(3rem, 6vw, 4rem);
  }
  #subscribe-1717 .cs-content {

    text-align: left;
    width: 100%;
    max-width: 39.375rem;

    flex-direction: column;
    /* centers content horizontally, set to flex-start to left align */
    align-items: flex-start;
    position: relative;
    z-index: 1;
  }
  #subscribe-1717 .cs-title {
    max-width: 20ch;
  }
  #subscribe-1717 .cs-text {

  #subscribe-1717 .cs-text:last-of-type {

  }
  #subscribe-1717 .cs-form {

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;

  }
  #subscribe-1717 .cs-input {
    font-size: 1rem;
    width: 100%;
    height: clamp(2.875rem, 5.5vw, 3.5rem);
    margin: 0;
    padding: 0;
    padding-left: 1.25rem;
    border: none;

    box-sizing: border-box;
    display: block;
  }
  #subscribe-1717 .cs-input::placeholder {
    color: #767676;
  }
  #subscribe-1717 .cs-button-solid {
    font-size: 1rem;

    line-height: clamp(2.875rem, 5.5vw, 3.5rem);
    text-decoration: none;
    font-weight: 700;
    text-align: center;
    margin: 0;
    color: #fff;
    min-width: 9.375rem;
    padding: 0 1.5rem;
    background-color: var(--primary);
    display: inline-block;
    position: relative;
    z-index: 1;
    /* prevents padding from adding to the width */
    box-sizing: border-box;
  }
  #subscribe-1717 .cs-button-solid:before {
    content: "";
    position: absolute;
    height: 100%;
    width: 0%;
    background: #000;
    opacity: 1;
    top: 0;
    left: 0;
    z-index: -1;
    transition: width 0.3s;
  }
  #subscribe-1717 .cs-button-solid:hover:before {
    width: 100%;
  }
  #subscribe-1717 .cs-submit {
    width: 100%;
    border: none;
    color: var(--bodyTextColorWhite);
  }
  #subscribe-1717 .cs-background {
    width: 100%;
    height: 100vw;
    max-height: 25rem;
    display: block;
    order: -1;
    position: relative;
    z-index: 2;
  }
  #subscribe-1717 .cs-background img {
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    width: 100%;
    object-fit: cover;
  }
  #subscribe-1717 .cs-floater {
    /* 296px - 450px */
    width: clamp(18.5rem, 35vw, 28.125rem);
    height: auto;
    mix-blend-mode: soft-light;
    position: absolute;
    right: -8.0625rem;
    top: -9.375rem;
    z-index: -1;
  }
}
/* Tablet - 768px */
@media only screen and (min-width: 48rem) {
  #subscribe-1717 {

  #subscribe-1717 .cs-container {
    max-width: 82rem;

  #subscribe-1717 .cs-content {

  }
  #subscribe-1717 .cs-background {
    width: 50%;
    max-height: 100%;
    height: 100%;
    position: absolute;
    right: 50%;
  }
}
/* Desktop - 1024px */
@media only screen and (min-width: 64rem) {
  #subscribe-1717 .cs-content {
    /* remove the positioning so the cs-floater is now absolutely positioned to the nearest parent that has a declared position relative, which is the section parent */
    position: initial;
  }
  #subscribe-1717 .cs-form {
    flex-direction: row;
  }
  #subscribe-1717 .cs-button-solid {
    width: auto;
  }
  #subscribe-1717 .cs-floater {
    top: 50%;
    right: -12.5rem;
    transform: translateY(-50%);
  }
}
/* Large Desktop - 1300px */
@media only screen and (min-width: 81.25rem) {
  #subscribe-1717 .cs-content {
    width: 100%;
  }
  #subscribe-1717 .cs-background {
    margin-right: 7.375rem;
  }
}
</style>
