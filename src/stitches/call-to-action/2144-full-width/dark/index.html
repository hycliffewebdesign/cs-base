<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>full width</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---            CTA             -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #cta-2144 {
    /* 60px - 100px on top */
    padding: clamp(3.75rem, 7.5vw, 6.25rem) calc(16/16 * 1rem) calc(64/16 * 1rem) calc(16/16 * 1rem);
    background-color: #1A1A1A;
    overflow: hidden;
    position: relative;
  }
  #cta-2144 .cs-container {
    width: 100%;
    max-width: calc(704/16 * 1rem);
    margin: auto;
    /* prevents padding from adding to height and width */
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-end;
    /* 48px - 100px */
    gap: clamp(3rem, 6vw, 6.25rem);
  }
  #cta-2144 .cs-left-section {
    width: 100%;
  }
  #cta-2144 .cs-title {
    /* 80px - 120px */
    font-size: clamp(5rem, 12vw, 7.5rem);
    line-height: 1em;
    text-transform: uppercase;
    margin: 0;
    color: var(--bodyTextColorWhite);
  }
  #cta-2144 .cs-right-section {
    width: 100%;
  }
  #cta-2144 .cs-contact {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-end;
    /* 8px - 12px */
    gap: clamp(0.5rem, 1vw, 0.75rem);
  }
  #cta-2144 .cs-social {
    display: flex;
    flex-direction: row;
    gap: calc(16/16 * 1rem);
  }
  #cta-2144 .cs-phone,
  #cta-2144 .cs-email,
  #cta-2144 .cs-address,
  #cta-2144 .cs-social-link {
    /* 14px - 16px */
    font-size: clamp(0.875rem, 1.5vw, 1rem);
    text-decoration: none;
    line-height: 1.5em;
    text-align: right;
    margin: 0;
    color: var(--bodyTextColorWhite);
    transition: color 0.3s;
  }
  #cta-2144 .cs-phone:hover,
  #cta-2144 .cs-email:hover,
  #cta-2144 .cs-address:hover,
  #cta-2144 .cs-social-link:hover {
    color: var(--primary);
  }
  #cta-2144 .cs-social-link {
    text-decoration: none;
    padding-right: calc(16/16 * 1rem);
    border-right: 1px solid var(--bodyTextColorWhite);
    transition: color 0.3s;
  }
  #cta-2144 .cs-social-link:hover {
    color: var(--primary);
  }
  #cta-2144 .cs-social-link:last-of-type {
    padding-right: 0;
    border-right: none;
  }
  #cta-2144 .cs-picture {
    width: 100%;
    height: calc(120/16 * 1rem);
    margin-top: calc(24/16 * 1rem);
    box-sizing: border-box;
    display: block;
    position: relative;
  }
  #cta-2144 .cs-picture img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    top: 0;
    left: 0;
  }
}
/* Tablet - 768px */
@media only screen and (min-width: 48rem) {
  #cta-2144 .cs-container {
    max-width: calc(1280/16 * 1rem);
    flex-direction: row;
    justify-content: space-between;
  }
  #cta-2144 .cs-right-section {
    text-align: right;
    max-width: 45%;
    /* prevents flexbox from squishing it */
    flex: none;
  }
  #cta-2144 .cs-picture {
    /* 80px - 107px */
    height: clamp(5rem, 10vw, 6.7rem);
  }
}
</style>
</head>
<body>

<!-- ============================================ -->
<!--                    CTA                       -->
<!-- ============================================ -->

<section id="cta-2144">
    <div class="cs-container">
        <div class="cs-left-section">
            <span class="cs-topper">Contact Info</span>

        </div>
        <div class="cs-right-section">
            <div class="cs-contact">
                <a class="cs-phone" href="tel:555-555-5555">

                <div class="cs-social">

            <picture class="cs-picture">

</body>
</html>
