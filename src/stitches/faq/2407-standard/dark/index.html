<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>standard</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---            FAQ             -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #faq-2407 {
    padding: var(--sectionPadding);
    position: relative;
  }
  #faq-2407:before {
    /* background color overlay */
    content: "";
    width: 100%;
    height: 100%;
    background: var(--primary);
    opacity: 0.05;
    display: block;
    position: absolute;
    top: 0;
    left: 0;
    z-index: -1;
  }
  #faq-2407 .cs-container {
    width: 100%;
    /* changes to 1280px at desktop */
    max-width: 36.5rem;
    margin: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    /* 48px - 64px */
    gap: clamp(3rem, 6vw, 4rem);
  }
  #faq-2407 .cs-content {
    /* set text align to left if content needs to be left aligned */
    text-align: center;
    width: 100%;
    display: contents;
    flex-direction: column;
    /* centers content horizontally, set to flex-start to left align */
    align-items: center;
  }
  #faq-2407 .cs-wrapper {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }
  #faq-2407 .cs-title {
    margin: 0;
  }
  #faq-2407 .cs-faq-group {
    width: 100%;
    padding: 0;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    gap: 0.75rem;
  }
  #faq-2407 .cs-faq-item {
    list-style: none;
    width: 100%;
    background-color: #fff;
    border-radius: 0.5rem;
    overflow: hidden;
    position: relative;
    z-index: 0;
  }
  #faq-2407 .cs-faq-item:before {
    /* background color overlay */
    content: "";
    width: 100%;
    height: 100%;
    background: var(--primary);
    opacity: 0;
    display: block;
    position: absolute;
    top: 0;
    left: 0;
    z-index: -1;
    transition: opacity 0.3s;
  }
  #faq-2407 .cs-faq-item.active:before {
    opacity: 0.1;
  }
  #faq-2407 .cs-faq-item.active .cs-button {
    color: var(--primary);
  }
  #faq-2407 .cs-faq-item.active .cs-icon {
    transform: rotate(180deg);
  }
  #faq-2407 .cs-faq-item.active .cs-item-p {
    height: auto;
    padding-top: 0.5rem;
    opacity: 1;
  }
  #faq-2407 .cs-button {
    font-size: 1.25rem;
    line-height: 1.2em;
    text-align: left;
    font-weight: bold;
    width: 100%;
    padding: 1.5rem;
    border: none;
    background: transparent;
    color: var(--headerColor);
    display: flex;
    justify-content: space-between;
    position: relative;
    transition: background-color 0.3s, color 0.3s;
  }
  #faq-2407 .cs-button:hover {
    cursor: pointer;
  }
  #faq-2407 .cs-button-text {
    width: 100%;
    display: flex;
  }
  #faq-2407 .cs-item-p {
    font-size: 1rem;
    line-height: 1.5em;
    font-weight: 400;
    width: 100%;
    height: 0;
    margin: 0;
    padding: 0;
    opacity: 0;
    color: var(--bodyTextColor);
    /* clips the text so it doesn't show up */
    overflow: hidden;
    transition: opacity 0.3s;
  }
  #faq-2407 .cs-icon {
    width: 1.5rem;
    height: 1.5rem;
    display: block;
    transition: transform 0.3s;
  }
  #faq-2407 .cs-picture {
    width: 100%;
    max-width: 23.6875rem;
    height: auto;
    display: block;
    order: 4;
    position: relative;
  }
  #faq-2407 .cs-picture img {
    width: 100%;
    height: auto;
    display: block;
  }
}
/* Desktop - 1024px */
@media only screen and (min-width: 64rem) {
  #faq-2407 {
    padding-bottom: 0;
  }
  #faq-2407 .cs-container {
    max-width: 80rem;
    flex-direction: row;
    /* push everything to the top */
    align-items: stretch;
    justify-content: space-between;
    gap: 2.5rem;
  }
  #faq-2407 .cs-wrapper {
    display: contents;
  }
  #faq-2407 .cs-content {
    width: 30vw;
    max-width: 25.75rem;
    display: flex;
    gap: 1rem;
    flex: none;
  }
  #faq-2407 .cs-faq-group {
    max-width: 24.625rem;
    /* 80px - 100px */
    padding-bottom: clamp(5rem, 7.82vw, 6.25rem);
    align-self: flex-start;
  }
  #faq-2407 .cs-faq-group1 {
    order: -1;
  }
  #faq-2407 .cs-picture {
    height: 100%;
    /* change max height as needed based on how tall you want the image to be so that the image is on the botto of the section by default */
    max-height: 24.5625rem;
  }
  #faq-2407 .cs-picture img {
    height: 100%;
    max-height: 100%;
    /* if using a JPG instead of PNG, set to "cover" instead of "contain" */
    object-fit: contain;
    object-position: bottom;
  }
}
</style>
</head>
