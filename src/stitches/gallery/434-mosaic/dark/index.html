<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>mosaic</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---          Gallery           -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #gallery-434 {
    padding: var(--sectionPadding);
  }
  #gallery-434 .cs-container {
    width: 100%;
    margin: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    /* 48px - 64px */
    gap: clamp(3rem, 6vw, 4rem);
  }
  #gallery-434 .cs-content {
    /* set text align to left if content needs to be left aligned */
    text-align: center;
    width: 100%;
    display: flex;
    flex-direction: column;
    /* centers content horizontally, set to flex-start to left align */
    align-items: center;
  }
  #gallery-434 .cs-grid {
    display: grid;
    /* 12 so we can have rows of 3 and rows with 2 50/50 images */
    grid-template-columns: repeat(12, 1fr);
    /* 12px - 30px */
    grid-gap: clamp(0.75rem, 1.5vw, 1.875rem);
    grid-template-rows: repeat(6, 0.34fr);
  }
  #gallery-434 .cs-picture {
    border-radius: 0.5rem;
    /* clips corners of img tags */
    overflow: hidden;
    position: relative;
    display: block;
  }
  #gallery-434 .cs-picture img {
    width: 100%;
    height: 100%;
    /* makes image behave like a background image */
    object-fit: cover;
  }
  #gallery-434 .cs-picture1 {
    display: none;
  }
  #gallery-434 .cs-picture2 {
    grid-column: 1 / 9;
    grid-row: 1 / 3;
  }
  #gallery-434 .cs-picture3 {
    grid-column: 9 / 13;
    grid-row: 1 / 1;
  }
  #gallery-434 .cs-picture4 {
    grid-column: 1 / 7;
    grid-row: 4 / 5;
  }
  #gallery-434 .cs-picture5 {
    grid-column: 7 / 13;
    grid-row: 4 / 6;
  }
  #gallery-434 .cs-picture6 {
    display: none;
  }
  #gallery-434 .cs-picture7 {
    grid-column: 1 / 5;
    grid-row: 3 / 4;
  }
  #gallery-434 .cs-picture8 {
    grid-column: 5 / 9;
    grid-row: 3 / 4;
  }
  #gallery-434 .cs-picture9 {
    grid-column: 9 / 13;
    grid-row: 2 / 4;
  }
  #gallery-434 .cs-picture10 {
    grid-column: 1 / 7;
    grid-row: 5 / 7;
  }
  #gallery-434 .cs-picture11 {
    grid-column: 7 / 13;
    grid-row: 6 / 7;
  }
}
/* Tablet - 768px */
@media only screen and (min-width: 48rem) {
  #gallery-434 {
    padding-left: 0;
    padding-right: 0;
  }
  #gallery-434 .cs-grid {
    grid-template-columns: repeat(6, 1fr);
    grid-template-rows: repeat(3, 0.45fr);
  }
  #gallery-434 .cs-picture1 {
    border-radius: 0 0.5rem 0.5rem 0;
    display: block;
    grid-column: 1 / 3;
    grid-row: 1 / 2;
  }
  #gallery-434 .cs-picture2 {
    grid-column: 3 / 5;
    grid-row: 1 / 3;
  }
  #gallery-434 .cs-picture3 {
    grid-column: 5 / 6;
    grid-row: 1 / 1;
  }
  #gallery-434 .cs-picture4 {
    border-radius: 0.5rem 0 0 0.5rem;
    grid-column: 6 / 7;
    grid-row: 1 / 1;
  }
  #gallery-434 .cs-picture5 {
    display: none;
  }
  #gallery-434 .cs-picture6 {
    border-radius: 0 0.5rem 0.5rem 0;
    display: block;
    grid-column: 1 / 3;
    grid-row: 2 / 4;
  }
  #gallery-434 .cs-picture7 {
    grid-column: 3 / 4;
    grid-row: 3 / 4;
  }
  #gallery-434 .cs-picture8 {
    grid-column: 4 / 5;
    grid-row: 3 / 4;
  }
  #gallery-434 .cs-picture9 {
    grid-column: 5 / 6;
    grid-row: 2 / 4;
  }
  #gallery-434 .cs-picture10 {
    border-radius: 0.5rem 0 0 0.5rem;
    grid-column: 6 / 7;
    grid-row: 2 / 4;
  }
  #gallery-434 .cs-picture11 {
    display: none;
  }
}
/* Large Desktop 1600px */
@media only screen and (min-width: 100rem) {
  #gallery-434 .cs-grid {
    grid-template-columns: repeat(7, 1fr);
    grid-template-rows: repeat(3, 0.4fr);
  }
  #gallery-434 .cs-picture4 {
    border-radius: 0.5rem;
  }
  #gallery-434 .cs-picture5 {
    border-radius: 0.5rem 0 0 0.5rem;
    display: block;
    grid-column: 7 / 8;
    grid-row: 1 / 3;
  }
  #gallery-434 .cs-picture10 {
    border-radius: 0.5rem;
  }
  #gallery-434 .cs-picture11 {
    border-radius: 0.5rem 0 0 0.5rem;
    display: block;
    grid-column: 7 / 8;
    grid-row: 3 / 4;
  }
}
</style>
