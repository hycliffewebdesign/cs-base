<!--                   Contact                    -->

<section id="contact-1239">
    <div class="cs-container">
        <div class="cs-content">
            <span class="cs-topper">Contact Us</span>
            <h2 class="cs-title">Make An Appointment</h2>
            <!--Form-->
            <form class="cs-form" id="cs-form-1239" name="Contact Form" method="post">
                <label class="cs-label">
                    Name
                    <input class="cs-input" required type="text" id="name-1239" name="name" placeholder="Name">
                </label>
                <label class="cs-label cs-email">
                    Email
                    <input class="cs-input" required type="email" id="email-1239" name="email" placeholder="Email">
                </label>
                <label class="cs-label cs-phone">
                    Phone
                    <input class="cs-input" required type="phone" id="phone-1239" name="phone" placeholder="Phone">
                </label>
                <label class="cs-label">
                    Message
                    <textarea class="cs-input cs-textarea" required name="Message" id="message-1239" placeholder="Write message..."></textarea>
                </label>
                <button class="cs-button-solid cs-submit" type="submit">Make an Appointment</button>
            </form>
        </div>
        <div class="cs-wrapper">
            <ul class="cs-card-group">
                <li class="cs-item">
                    <span class="cs-header">Call Us</span>
                    <p class="cs-item-text">
                        We are available for your 24/7 support.<br>
                        <a class="cs-link" href="tell:555-555-5555">(555) 555-5555</a>                    
                    </p>
                </li>
                <li class="cs-item">
                    <span class="cs-header">Email</span>
                    <p class="cs-item-text">
                        Email your questions at
                        <a class="cs-link" href="mailto:info@invetexfinance.com">info@invetexfinance.com</a>     
                    </p>
                </li>
                <li class="cs-item">
                    <span class="cs-header">Reviews</span>
                    <p class="cs-item-text">
                        See Our reviews on Google or leave a review
                        <a href="" class="cs-link">
                            <img class="cs-icon" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Icons/google-1a.svg" alt="icon" loading="lazy" decoding="async" width="16" height="16" aria-hidden="true">
                            Google Reviews
                        </a>                   
                    </p>
                </li>
            </ul>
            <!--Background image on mobile. We have to wrap the list in a wrpper div so we can place the image in the HTML as its background. It's better to insert images on your site in the HTML than the CSS as a background because it improves performance and load times being in the HTML.-->
            <picture class="cs-card-background">
                <!--Mobile Image-->
                <source media="(max-width: 600px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/HEADPHONES.jpg">
                <!--Tablet and above Image-->
                <source media="(min-width: 601px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/HEADPHONES.jpg">
                <img loading="lazy" decoding="async" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/HEADPHONES.jpg" alt="people" width="960" height="839">
            </picture>
        </div>
    </div>
    <!--Background image-->
    <picture class="cs-background">
        <!--Mobile Image-->
        <source media="(max-width: 600px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/HEADPHONES.jpg">
        <!--Tablet and above Image-->
        <source media="(min-width: 601px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/HEADPHONES.jpg">
        <img loading="lazy" decoding="async" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/HEADPHONES.jpg" alt="people" width="960" height="839">
    </picture>
</section>
