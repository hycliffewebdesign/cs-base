<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>subscribe</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---            CTA             -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #cta-1506 {
    padding: var(--sectionPadding);
    padding-bottom: 0;
    position: relative;
    overflow: hidden;
    z-index: 1;
  }
  #cta-1506 .cs-container {
    width: 100%;
    /* changes to 1280px at tablet */
    max-width: 34.375rem;
    margin: auto;
    /* 16px - 20px */
    padding: 0 clamp(1rem, 2vw, 1.25rem);
    overflow: hidden;
    /* 32px - 100px */
    border-radius: clamp(2rem, 5vw, 6.25rem);
    /* prevents padding from affecting height abd width */
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    align-items: center;
    /* 28px - 36px */
    gap: clamp(1.75rem, 4vw, 2.25rem);
    position: relative;
    z-index: 1;
  }
  #cta-1506 .cs-container:before {
    /* background-color */
    content: '';
    width: 100%;
    height: 100%;
    background: var(--primary);
    opacity: 0.1;
    position: absolute;
    display: block;
    top: 0;
    left: 0;
  }
  #cta-1506 .cs-content {
    /* set text align to left if content needs to be left aligned */
    text-align: center;
    width: 100%;
    max-width: 32.625rem;
    display: flex;
    flex-direction: column;
    /* centers content horizontally, set to flex-start to left align */
    align-items: center;
  }
  #cta-1506 .cs-title,
  #cta-1506 .cs-text {
    max-width: 31.25rem;
  }
  #cta-1506 .cs-text {
    margin-bottom: 2rem;
  }
  #cta-1506 .cs-picture {
    /* this font size scales the images down, then we set it to 1em on large desktop */
    font-size: 0.68em;
    width: 15.3125em;
    height: 16.875em;
    overflow: hidden;
    display: block;
    position: relative;
    z-index: 1;
  }
  #cta-1506 .cs-picture img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    top: 0;
    left: 0;
  }
  #cta-1506 .cs-picture1 {
    border-radius: 12.5em 12.5em 0 0;
  }
  #cta-1506 .cs-picture2 {
    border-radius: 0 0 12.5em 12.5em;
    order: -1;
  }
  #cta-1506 .cs-blob {
    --blobColor: var(--primary);
    opacity: 0.25;
    display: none;
    position: absolute;
  }
  #cta-1506 .cs-blob1 {
    width: 16.9375rem;
    height: auto;
    top: 0;
    left: 0;
  }
  #cta-1506 .cs-blob2 {
    width: 28.8125rem;
    height: auto;
    bottom: 0;
    right: 0;
  }
  #cta-1506 .cs-form {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    position: relative;
    z-index: 1;
  }
  #cta-1506 .cs-input {
    font-size: 1rem;
    width: 100%;
    /* 46px - 72px */
    height: clamp(2.875rem, 8vw, 4.5rem);
    margin: 0;
    padding: 0;
    padding-left: 1.25rem;
    border: none;
    border-radius: 5rem;
    /* prevents padding from adding to width and height */
    box-sizing: border-box;
    display: block;
  }
  #cta-1506 .cs-input::placeholder {
    color: #767676;
  }
  #cta-1506 .cs-button-solid {
    font-size: 1rem;
    /* 46px - 56px */
    line-height: clamp(2.875rem, 5.5vw, 3.5rem);
    text-decoration: none;
    font-weight: 700;
    text-align: center;
    margin: 0;
    color: #fff;
    overflow: hidden;
    min-width: 9.375rem;
    padding: 0 2rem;
    background-color: var(--primary);
    border-radius: 5rem;
    display: inline-block;
    position: relative;
    z-index: 1;
    /* prevents padding from adding to the width */
    box-sizing: border-box;
  }
  #cta-1506 .cs-button-solid:before {
    content: '';
    position: absolute;
    height: 100%;
    width: 0%;
    background: #000;
    opacity: 1;
    top: 0;
    left: 0;
    z-index: -1;
    transition: width 0.3s;
  }
  #cta-1506 .cs-button-solid:hover {
    cursor: pointer;
  }
  #cta-1506 .cs-button-solid:hover:before {
    width: 100%;
  }
  #cta-1506 .cs-submit {
    width: 100%;
    border: none;
  }
}
/* Tablet - 768px */
@media only screen and (min-width: 48rem) {
  #cta-1506 .cs-container {
    max-width: 80rem;
  }
  #cta-1506 .cs-picture1 {
    margin-right: auto;
  }
  #cta-1506 .cs-picture2 {
    margin-left: auto;
  }
  #cta-1506 .cs-blob {
    display: block;
  }
  #cta-1506 .cs-input {
    width: 100%;
  }
  #cta-1506 .cs-submit {
    width: auto;
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    right: 0.5rem;
  }
}
/* Desktop - 1024px */
@media only screen and (min-width: 64rem) {
  #cta-1506 .cs-container {
    padding: 5rem 1rem;
  }
  #cta-1506 .cs-picture1 {
    position: absolute;
    bottom: 0;
    /* 20px - 90px, manually set to 90px at larger desktop */
    left: clamp(1.25rem, 3vw, 5.625rem);
  }
  #cta-1506 .cs-picture2 {
    position: absolute;
    top: 0;
    /* 20px - 90px, manually set to 90px at larger desktop */
    right: clamp(1.25rem, 3vw, 5.625rem);
  }
}
/* Larger Desktop - 1300px */
@media only screen and (min-width: 81.25rem) {
  #cta-1506 .cs-picture {
    font-size: inherit;
  }
  #cta-1506 .cs-picture1 {
    left: 5.625rem;
  }
  #cta-1506 .cs-picture2 {
    right: 5.625rem;
  }
}
</style>
</head>
