<!-- ============================================ -->
<!--                   Contact                    -->
<!-- ============================================ -->

<section id="contact-1880">
    <div class="cs-container">
        <div class="cs-image-group">
            <picture class="cs-picture">
                <!--Mobile Image-->
                <source media="(max-width: 600px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/dermatologist1.jpeg">
                <!--Tablet and above Image-->
                <source media="(min-width: 601px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/dermatologist1.jpeg">
                <img loading="lazy" decoding="async" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/dermatologist1.jpeg" alt="dermatologist" width="324" height="467">
            </picture>
            <img class="cs-graphic cs-brown" loading="lazy" decoding="async" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Graphics/brown-lines.svg" alt="graphic" width="208" height="203" aria-hidden="true">
            <img class="cs-graphic cs-peach" loading="lazy" decoding="async" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Icons/peach-blob.svg" alt="graphic" width="56" height="42" aria-hidden="true">
            <img class="cs-graphic cs-leaf" loading="lazy" decoding="async" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Icons/leaf2.svg" alt="graphic" width="179" height="225" aria-hidden="true">
            <img class="cs-graphic cs-dots" loading="lazy" decoding="async" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Icons/beige-dots.svg" alt="graphic" width="187" height="104" aria-hidden="true">
            <img class="cs-graphic cs-lines" loading="lazy" decoding="async" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Icons/beige-lines.svg" alt="graphic" width="189" height="208" aria-hidden="true">
        </div>
        <div class="cs-content">
            <!--Form-->
            <form class="cs-form" id="cs-form-1880" name="Contact Form" method="post">
                <label class="cs-label">
                    First Name*
                    <input class="cs-input" required type="text" id="name-1880" name="name" placeholder="John">
                </label>
                <label class="cs-label">
                    Last Name*
                    <input class="cs-input" required type="text" id="phone-1880" name="phone" placeholder="Moore">
                </label>
                <label class="cs-label">
                    Email*
                    <input class="cs-input" required type="text" id="email-1880" name="email" placeholder="name@company.com">
                </label>
                <label class="cs-label">
                    Phone*
                    <input class="cs-input" required type="text" id="hear-1880" name="heat" placeholder="+1 (206) 987-6543">
                </label>
                <label class="cs-label cs-message">
                    Message*
                    <textarea class="cs-input cs-textarea" required name="Message" id="message-1880" placeholder="Hello, I am interested..."></textarea>
                </label>
                <button class="cs-button-solid cs-submit" type="submit">Send Message</button>
                <p class="cs-text">
                    By filling out this form you agree to receive email, text, and phone communications from Balanced Skin Dermatology and Aesthetics
                </p>
            </form>
        </div>
    </div>
</section>
