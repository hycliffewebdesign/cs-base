<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>contact forms</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---          Contact           -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #contact-1880 {
    padding: var(--sectionPadding);
    background-color: #F6EDDF;
    position: relative;
    z-index: 1;
  }
  #contact-1880 .cs-container {
    width: 100%;
    /* changes to 1280px at desktop */
    max-width: 44rem;
    margin: auto;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 2rem;
  }
  #contact-1880 .cs-image-group {
    font-size: min(2.24vw, 0.9em);
    width: 39.5em;
    height: 49.2em;
    display: block;
    position: relative;
    z-index: 1;
    transform: translateY(-7.375rem);
  }
  #contact-1880 .cs-picture {
    width: 34.9em;
    height: 49.6em;
    box-sizing: border-box;
    background-color: #DAB692;
    overflow: hidden;
    border: 8px solid #DAB692;
    border-radius: 16.25rem;
    position: absolute;
    z-index: -1;
  }
  #contact-1880 .cs-picture img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    top: 0;
    left: 0;
    transition: transform 0.7s;
  }
  #contact-1880 .cs-graphic {
    height: auto;
    position: absolute;
  }
  #contact-1880 .cs-brown {
    width: 10.3125em;
    top: 0em;
    right: 3em;
    z-index: -2;
  }
  #contact-1880 .cs-peach {
    width: 4.3125em;
    top: 1em;
    right: 10em;
  }
  #contact-1880 .cs-beige {
    width: 30em;
    top: 4em;
    right: 10em;
    z-index: -3;
  }
  #contact-1880 .cs-leaf {
    width: 14em;
    bottom: 0em;
    left: 1em;
    z-index: 1;
  }
  #contact-1880 .cs-dots {
    width: 16.35em;
    right: 1em;
    bottom: 1em;
    z-index: -2;
  }
  #contact-1880 .cs-lines {
    width: 15.39em;
    bottom: 0em;
  }
  #contact-1880 .cs-content {
    /* set text align to left if content needs to be left aligned */
    text-align: left;
    width: 100%;
    display: flex;
    flex-direction: column;
    /* centers content horizontally, set to flex-start to left align */
    align-items: flex-start;
  }
  #contact-1880 .cs-form {
    padding: 2rem 1rem;
    background-color: #FAF6F2;
    /* 32px - 40px */
    border-radius: clamp(2rem, 4vw, 2.5rem);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    /* 16px - 20px */
    row-gap: clamp(1rem, 2vw, 1.25rem);
  }
  #contact-1880 .cs-label {
    /* 14px - 16px */
    font-size: clamp(0.875rem, 1.5vw, 1rem);
    font-weight: 700;
    line-height: 1.2em;
    width: 100%;
    color: var(--headerColor);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    gap: 0.5rem;
  }
  #contact-1880 .cs-input {
    font-size: 1rem;
    width: 100%;
    height: 3.5rem;
    /* prevents padding from adding to height and width */
    box-sizing: border-box;
    /* 11px - 16px top & bottom */
    /* 16px - 24px left & right */
    padding: clamp(0.6875rem, 1.5vw, 1rem) clamp(1rem, 2vw, 1.5rem);
    background-color: #FFFFFF;
    color: var(--headerColor);
    border: none;
    border-radius: 1rem;
    transition: border-color 0.3s;
  }
  #contact-1880 .cs-input:hover {
    border-color: var(--secondary);
  }
  #contact-1880 .cs-input:focus {
    outline: 1px solid var(--secondary);
  }
  #contact-1880 .cs-input::placeholder {
    color: var(--bodyTextColor);
    opacity: 0.9;
  }
  #contact-1880 .cs-textarea {
    font-family: inherit;
    /* 120px - 192px */
    min-height: clamp(7.5rem, 28vw, 12rem);
    margin-bottom: 1rem;
    padding-top: 1.5rem;
  }
  #contact-1880 .cs-button-solid {
    font-size: 1rem;
    font-weight: 700;
    /* 46px - 56px */
    line-height: clamp(2.875rem, 5.5vw, 3.5rem);
    text-align: center;
    text-decoration: none;
    min-width: 9.375rem;
    margin: 0;
    /* prevents padding from adding to the width */
    box-sizing: border-box;
    padding: 0 1.5rem;
    background-color: var(--primary);
    color: #fff;
    border-radius: 0.25rem;
    display: inline-block;
    position: relative;
    z-index: 1;
  }
  #contact-1880 .cs-button-solid:before {
    content: "";
    width: 0%;
    height: 100%;
    background: #000;
    opacity: 1;
    border-radius: 6.25rem;
    position: absolute;
    top: 0;
    left: 0;
    z-index: -1;
    transition: width 0.3s;
  }
  #contact-1880 .cs-button-solid:hover:before {
    width: 100%;
  }
  #contact-1880 .cs-submit {
    line-height: 3.5rem;
    min-width: 13.375rem;
    border: none;
    border-radius: 6.25rem;
  }
}
/* Tablet - 768px */
@media only screen and (min-width: 48rem) {
  #contact-1880 .cs-image-group {
    margin-bottom: -5.625rem;
  }
  #contact-1880 .cs-form {
    /* 32px - 40px */
    padding: clamp(2rem, 4vw, 2.5rem);
    /* 16px - 20px */
    column-gap: clamp(1rem, 2vw, 1.25rem);
  }
  #contact-1880 .cs-label {
    width: 47.6%;
  }
  #contact-1880 .cs-message {
    width: 100%;
  }
}
/* Small Desktop - 1024px */
@media only screen and (min-width: 64rem) {
  #contact-1880 .cs-container {
    max-width: 80rem;
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
    /* 48px - 60px */
    gap: clamp(3rem, 6vw, 3.75rem);
  }
  #contact-1880 .cs-image-group {
    font-size: min(0.95vw, 1em);
    order: 2;
    transform: translateY(-13.375rem);
    flex: none;
  }
  #contact-1880 .cs-form {
    /* 514px - 738px */
    width: clamp(32.125rem, 50vw, 46.125rem);
  }
}
</style>
</head>
<body>

<!-- ============================================ -->
<!--                   Contact                    -->
<!-- ============================================ -->

<section id="contact-1880">
    <div class="cs-container">
        <div class="cs-image-group">
            <picture class="cs-picture">
                <!--Mobile Image-->
                <source media="(max-width: 600px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/dermatologist1.jpeg">
                <!--Tablet and above Image-->
                <source media="(min-width: 601px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/dermatologist1.jpeg">
                <img loading="lazy" decoding="async" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/dermatologist1.jpeg" alt="dermatologist" width="324" height="467">
            </picture>
            <img class="cs-graphic cs-brown" loading="lazy" decoding="async" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Graphics/brown-lines.svg" alt="graphic" width="208" height="203" aria-hidden="true">
            <img class="cs-graphic cs-peach" loading="lazy" decoding="async" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Icons/peach-blob.svg" alt="graphic" width="56" height="42" aria-hidden="true">
            <img class="cs-graphic cs-leaf" loading="lazy" decoding="async" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Icons/leaf2.svg" alt="graphic" width="179" height="225" aria-hidden="true">
            <img class="cs-graphic cs-dots" loading="lazy" decoding="async" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Icons/beige-dots.svg" alt="graphic" width="187" height="104" aria-hidden="true">
            <img class="cs-graphic cs-lines" loading="lazy" decoding="async" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Icons/beige-lines.svg" alt="graphic" width="189" height="208" aria-hidden="true">
        </div>
        <div class="cs-content">
            <!--Form-->
            <form class="cs-form" id="cs-form-1880" name="Contact Form" method="post">
                <label class="cs-label">
                    First Name*
                    <input class="cs-input" required type="text" id="name-1880" name="name" placeholder="John">
                </label>
                <label class="cs-label">
                    Last Name*
                    <input class="cs-input" required type="text" id="phone-1880" name="phone" placeholder="Moore">
                </label>
                <label class="cs-label">
                    Email*
                    <input class="cs-input" required type="text" id="email-1880" name="email" placeholder="name@company.com">
                </label>
                <label class="cs-label">
                    Phone*
                    <input class="cs-input" required type="text" id="hear-1880" name="heat" placeholder="+1 (206) 987-6543">
                </label>
                <label class="cs-label cs-message">
                    Message*
                    <textarea class="cs-input cs-textarea" required name="Message" id="message-1880" placeholder="Hello, I am interested..."></textarea>
                </label>
                <button class="cs-button-solid cs-submit" type="submit">Send Message</button>
                <p class="cs-text">
                    By filling out this form you agree to receive email, text, and phone communications from Balanced Skin Dermatology and Aesthetics
                </p>
            </form>
        </div>
    </div>
</section>

<script></script>
</body>
</html>
