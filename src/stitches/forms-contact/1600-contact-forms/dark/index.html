<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>contact forms</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---          Contact           -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #contact-1600 {
    padding: var(--sectionPadding);
    overflow: hidden;
    position: relative;
    z-index: 1;
  }
  #contact-1600 .cs-container {
    width: 100%;
    /* changes to 1280px at tablet */
    max-width: 34.375rem;
    margin: auto;
    display: flex;
    justify-content: center;
    align-items: stretch;
    flex-direction: column;
    /* 48px - 80px */
    gap: clamp(3rem, 6vw, 5rem);
  }
  #contact-1600 .cs-content {
    /* set text align to left if content needs to be left aligned */
    text-align: left;
    width: 100%;
    max-width: 37.5rem;
    /* resets to 0 at tablet */
    margin: auto;
    display: flex;
    flex-direction: column;
    /* centers content horizontally, set to flex-start to left align */
    align-items: flex-start;
  }
  #contact-1600 .cs-title {
    margin: 0 0 2rem 0;
  }
  #contact-1600 .cs-form {
    width: 100%;
    padding: 0;
    /* prevents flexbox from affecting height and width */
    box-sizing: border-box;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    align-items: center;
    gap: 0.75rem;
  }
  #contact-1600 .cs-label {
    /* 14px - 16px */
    font-size: clamp(0.875rem, 1.5vw, 1rem);
    width: 100%;
    color: var(--headerColor);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    gap: 0.25rem;
  }
  #contact-1600 .cs-label:last-of-type {
    margin-bottom: 2rem;
  }
  #contact-1600 .cs-input {
    font-size: 1rem;
    width: 100%;
    /* 46px - 56px */
    height: clamp(2.875rem, 4vw, 3.5rem);
    padding: 0;
    padding-left: 1.5rem;
    color: var(--headerColor);
    background-color: #f7f7f7;
    border: none;
    /* prevents padding from adding to height and width */
    box-sizing: border-box;
  }
  #contact-1600 .cs-input::placeholder {
    color: #7D799C;
    opacity: 0.6;
  }
  #contact-1600 .cs-textarea {
    min-height: 7.5rem;
    padding-top: 1.5rem;
    font-family: inherit;
  }
  #contact-1600 .cs-button-solid {
    font-size: 1rem;
    /* 46px - 56px */
    line-height: clamp(2.875em, 5.5vw, 3.5em);
    text-decoration: none;
    font-weight: 700;
    text-align: center;
    margin: 0;
    color: #fff;
    border: none;
    padding: 0 1.5rem;
    background-color: var(--primary);
    display: inline-block;
    position: relative;
    z-index: 1;
    /* prevents padding from adding to the width */
    box-sizing: border-box;
    transition: color 0.3s;
  }
  #contact-1600 .cs-button-solid:before {
    content: '';
    position: absolute;
    height: 100%;
    width: 0%;
    background: #000;
    opacity: 1;
    top: 0;
    left: 0;
    z-index: -1;
    transition: width 0.3s;
  }
  #contact-1600 .cs-button-solid:hover {
    color: #fff;
  }
  #contact-1600 .cs-button-solid:hover:before {
    width: 100%;
  }
  #contact-1600 .cs-submit:hover {
    cursor: pointer;
  }
  #contact-1600 .cs-wrapper {
    /* 32px - 108px */
    padding: clamp(2rem, 8vw, 6.75rem) 0;
    display: flex;
    justify-content: flex-start;
    align-items: center;
    position: relative;
    z-index: 1;
  }
  #contact-1600 .cs-card-group {
    width: 75%;
    max-width: 25.8125rem;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    /* 16px - 20px */
    gap: clamp(1rem, 2.3vw, 1.25rem);
    position: relative;
    z-index: 1;
  }
  #contact-1600 .cs-item {
    text-align: left;
    list-style: none;
    width: 100%;
    margin: 0;
    /* 16px - 40px top & Bottom */
    /* 24px - 40px left & right */
    padding: clamp(1rem, 4vw, 2.5rem) clamp(1.5rem, 5vw, 2.5rem);
    /* prevents padding from affecting height and width */
    box-sizing: border-box;
    border: 1px solid #E8E8E8;
    background-color: #fff;
    position: relative;
    z-index: 1;
  }
  #contact-1600 .cs-item:hover:before {
    opacity: 1;
  }
  #contact-1600 .cs-item:hover .cs-header {
    color: var(--primary);
  }
  #contact-1600 .cs-item:hover .cs-item-text,
  #contact-1600 .cs-item:hover .cs-link {
    color: var(--bodyTextColorWhite);
  }
  #contact-1600 .cs-item:hover .cs-text,
  #contact-1600 .cs-item:hover .cs-link {
    opacity: 0.8;
  }
  #contact-1600 .cs-item:hover .cs-link:hover {
    color: var(--primary);
  }
  #contact-1600 .cs-item:hover .cs-icon {
    filter: grayscale(1) brightness(1000%);
  }
  #contact-1600 .cs-item:before {
    /* hover border and background */
    content: '';
    width: 100%;
    height: 100%;
    background: #1a1a1a;
    opacity: 0;
    position: absolute;
    display: block;
    top: 0;
    left: 0;
    z-index: -1;
    transition: opacity 0.3s;
  }
  #contact-1600 .cs-header {
    font-size: 1.25rem;
    line-height: 1.2em;
    text-align: inherit;
    font-weight: 700;
    /* 12px - 16px */
    margin: 0 0 clamp(0.75rem, 1.6vw, 1rem);
    display: block;
    transition: color 0.3s;
  }
  #contact-1600 .cs-item-text {
    /* 14px - 16px */
    font-size: clamp(0.875rem, 1.5vw, 1rem);
    line-height: 1.5em;
    text-align: inherit;
    margin: 0;
    color: var(--bodyTextColor);
    display: block;
    transition: color 0.3s;
  }
  #contact-1600 .cs-link {
    /* 14px - 16px */
    font-size: clamp(0.875rem, 1.5vw, 1rem);
    line-height: 1.5em;
    text-align: inherit;
    margin: 0;
    color: var(--bodyTextColor);
    display: flex;
    justify-content: flex-start;
    align-items: center;
    gap: 0.25rem;
    transition: color 0.3s;
  }
  #contact-1600 .cs-icon {
    width: 1rem;
    height: auto;
  }
  #contact-1600 .cs-background {
    height: 100%;
    width: 100%;
    max-width: 32.625rem;
    position: absolute;
    /* 60px - 188px */
    left: clamp(3.75rem, 9vw, 11.75rem);
    top: 0;
    z-index: -1;
  }
  #contact-1600 .cs-background img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    top: 0;
    left: 0;
  }
}
/* Tablet - 768px */
@media only screen and (min-width: 48rem) {
  #contact-1600 .cs-container {
    max-width: 80rem;
    /* removed at large desktop. This is to clip the cs-background */
    overflow: hidden;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
  }
  #contact-1600 .cs-content {
    text-align: left;
    width: 42%;
    margin: 0;
    padding: 0;
    align-items: flex-start;
    order: 1;
  }
  #contact-1600 .cs-form {
    padding: 0;
  }
  #contact-1600 .cs-submit {
    margin-left: 0;
  }
  #contact-1600 .cs-wrapper {
    width: 50%;
    max-width: 39.375rem;
    order: 2;
  }
  #contact-1600 .cs-card-group {
    padding: 0;
  }
  #contact-1600 .cs-card-background {
    display: none;
  }
  #contact-1600 .cs-background {
    display: block;
  }
}
/* Large Desktop - 1500px */
@media only screen and (min-width: 93.75rem) {
  #contact-1600 .cs-container {
    overflow: visible;
  }
  #contact-1600 .cs-background {
    left: 11.75rem;
  }
}
</style>
</head>
<body>

<!-- ============================================ -->
<!--                   Contact                    -->
<!-- ============================================ -->

<section id="contact-1600">
    <div class="cs-container">
        <div class="cs-content">
            <span class="cs-topper">Contact Us</span>
            <h2 class="cs-title">Get In Touch</h2>
            <!--Form-->
            <form class="cs-form" id="cs-form-1600" name="Contact Form" method="post">
                <label class="cs-label">
                    Name
                    <input class="cs-input" required type="text" id="name-1600" name="name" placeholder="Name">
                </label>
                <label class="cs-label cs-email">
                    Email
                    <input class="cs-input" required type="email" id="email-1600" name="email" placeholder="Email">
                </label>
                <label class="cs-label cs-phone">
                    Phone
                    <input class="cs-input" required type="phone" id="phone-1600" name="phone" placeholder="Phone">
                </label>
                <label class="cs-label">
                    Message
                    <textarea class="cs-input cs-textarea" required name="Message" id="message-1600" placeholder="Write message..."></textarea>
                </label>
                <button class="cs-button-solid cs-submit" type="submit">Submit Now</button>
            </form>
        </div>
        <div class="cs-wrapper">
            <ul class="cs-card-group">
                <li class="cs-item">
                    <span class="cs-header">Our Support</span>
                    <p class="cs-item-text">
                        We are available for your 24/7 support.<br>
                        <a class="cs-link" href="tell:555-555-5555">(555) 555-5555</a>                    
                    </p>
                </li>
                <li class="cs-item">
                    <span class="cs-header">Email Us</span>
                    <p class="cs-item-text">
                        Email your questions at
                        <a class="cs-link" href="mailto:info@invetexfinance.com">info@invetexfinance.com</a>     
                    </p>
                </li>
                <li class="cs-item">
                    <span class="cs-header">Reviews</span>
                    <p class="cs-item-text">
                        See Our reviews on Google or leave a review
                        <a href="" class="cs-link">
                            <img class="cs-icon" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Icons/google-1a.svg" alt="icon" loading="lazy" decoding="async" width="16" height="16" aria-hidden="true">
                            Google Reviews
                        </a>                   
                    </p>
                </li>
            </ul>
            <picture class="cs-background">
                <!--Mobile Image-->
                <source media="(max-width: 600px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/model5.jpg">
                <!--Tablet and above Image-->
                <source media="(min-width: 601px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/model5.jpg">
                <img loading="lazy" decoding="async" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/model5.jpg" alt="people" width="522" height="771">
            </picture>
        </div>
    </div>
</section>

<script></script>
</body>
</html>
