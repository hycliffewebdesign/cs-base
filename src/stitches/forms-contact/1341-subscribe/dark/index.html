<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>subscribe</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---            CTA             -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #cta-1341 {
    padding: var(--sectionPadding);
    background-color: #fefbf3;
    overflow: hidden;
    position: relative;
    z-index: 1;
  }
  #cta-1341 .cs-container {
    /* 20px - 50px */
    padding: clamp(1.25rem, 3vw, 3.125rem) 0;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  #cta-1341 .cs-form {
    width: 100%;
    max-width: 52.875rem;
    display: flex;
    align-items: center;
    justify-content: center;
    /* 8px - 16px */
    gap: clamp(0.5rem, 2vw, 1rem);
    position: relative;
    z-index: 1;
  }
  #cta-1341 .cs-form:before {
    content: "";
    width: 100%;
    height: 1px;
    background: var(--primary);
    opacity: 0.8;
    position: absolute;
    display: block;
    bottom: 0;
    left: 0;
  }
  #cta-1341 .cs-input {
    font-size: 1rem;
    width: 100%;
    /* 60px - 72px */
    height: clamp(3.75rem, 5.5vw, 4.5rem);
    margin: 0;
    padding: 0;
    background-color: transparent;
    border: none;
    /* prevents padding from adding to width and height */
    box-sizing: border-box;
    display: block;
  }
  #cta-1341 .cs-input::placeholder {
    color: var(--bodyTextColor);
  }
  #cta-1341 .cs-submit {
    width: 3rem;
    height: 3rem;
    margin: 0;
    padding: 0;
    background-color: transparent;
    border: none;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  #cta-1341 .cs-icon {
    /* 32px - 40px */
    width: clamp(2rem, 2.3vw, 2.5rem);
    transform: rotate(-45deg);
  }
  #cta-1341 .cs-floater {
    /* max width 167px */
    font-size: min(20vw, 10.4375rem);
    line-height: 1.5em;
    font-weight: 900;
    margin: 0;
    color: var(--primary);
    opacity: 0.05;
    display: block;
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    z-index: -1;
  }
}
</style>
</head>
<body>

<!-- ============================================ -->
<!--                     CTA                      -->
<!-- ============================================ -->

<section id="cta-1341">
    <div class="cs-container">
        <form class="cs-form" name="Contact Form" method="post">
            <input class="cs-input" type="email" id="cs-email-1341" name="email" placeholder="Enter Your Email Address">
            <button class="cs-submit" type="submit">
                <img class="cs-icon" aria-hidden="true" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Icons/paper-plane.svg" decoding="async" alt="paper airplane" width="40" height="40">
            </button>
            <span class="cs-floater">Newsletter</span>
        </form>
    </div>
</section>

<script></script>
</body>
</html>
