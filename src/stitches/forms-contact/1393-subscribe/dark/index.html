<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>subscribe</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---            CTA             -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  @keyframes floatAnimation {
    0% {
      transform: translateY(0);
    }
    50% {
      transform: translateY(-2rem);
    }
    100% {
      transform: translateY(0);
    }
  }
  @keyframes floatAnimation2 {
    0% {
      transform: translateY(0);
    }
    50% {
      transform: translateY(3rem);
    }
    100% {
      transform: translateY(0);
    }
  }
  #cta-1393 {
    padding: var(--sectionPadding);
    padding-bottom: 0;
    position: relative;
    overflow: hidden;
    z-index: 1;
  }
  #cta-1393 .cs-container {
    width: 100%;
    /* changes to 1280px at tablet */
    max-width: calc(550 / 16 * 1rem);
    margin: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    /* 48px - 64px */
    gap: clamp(3rem, 6vw, 4rem);
    position: relative;
    z-index: 1;
  }
  #cta-1393 .cs-content {
    /* set text align to left if content needs to be left aligned */
    text-align: center;
    width: 100%;
    max-width: calc(522 / 16 * 1rem);
    display: flex;
    flex-direction: column;
    /* centers content horizontally, set to flex-start to left align */
    align-items: center;
  }
  #cta-1393 .cs-title,
  #cta-1393 .cs-text {
    max-width: calc(500 / 16 * 1rem);
    color: var(--bodyTextColorWhite);
  }
  #cta-1393 .cs-text {
    margin-bottom: calc(32 / 16 * 1rem);
    opacity: 0.8;
  }
  #cta-1393 .cs-form {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: calc(12 / 16 * 1rem);
    position: relative;
    z-index: 1;
  }
  #cta-1393 .cs-input {
    font-size: calc(16 / 16 * 1rem);
    width: 100%;
    /* 46px - 72px */
    height: clamp(2.875rem, 8vw, 4.5rem);
    margin: 0;
    padding: 0;
    padding-left: calc(20 / 16 * 1rem);
    border: none;
    border-radius: calc(80 / 16 * 1rem);
    /* prevents padding from adding to width and height */
    box-sizing: border-box;
    display: block;
  }
  #cta-1393 .cs-input::placeholder {
    color: #767676;
  }
  #cta-1393 .cs-button-solid {
    font-size: calc(16 / 16 * 1rem);
    /* 46px - 56px */
    line-height: clamp(2.875rem, 5.5vw, 3.5rem);
    text-decoration: none;
    font-weight: 700;
    text-align: center;
    margin: 0;
    color: #fff;
    overflow: hidden;
    min-width: calc(150 / 16 * 1rem);
    padding: 0 calc(32 / 16 * 1rem);
    background-color: var(--primary);
    border-radius: calc(80 / 16 * 1rem);
    display: inline-block;
    position: relative;
    z-index: 1;
    /* prevents padding from adding to the width */
    box-sizing: border-box;
  }
  #cta-1393 .cs-button-solid:before {
    content: "";
    position: absolute;
    height: 100%;
    width: 0%;
    background: #000;
    opacity: 1;
    top: 0;
    left: 0;
    z-index: -1;
    transition: width 0.3s;
  }
  #cta-1393 .cs-button-solid:hover {
    cursor: pointer;
  }
  #cta-1393 .cs-button-solid:hover:before {
    width: 100%;
  }
  #cta-1393 .cs-submit {
    width: 100%;
    border: none;
  }
  #cta-1393 .cs-picture {
    width: 85%;
    height: auto;
    /* removes empty space between the picture and the bottom of the section */
    margin-bottom: calc(-10 / 16 * 1rem);
    display: block;
    position: relative;
    z-index: 1;
  }
  #cta-1393 .cs-picture img {
    width: 100%;
    height: auto;
  }
  #cta-1393 .cs-background {
    width: 100%;
    height: 100%;
    display: block;
    position: absolute;
    top: 0;
    left: 0;
    z-index: -1;
  }
  #cta-1393 .cs-background img {
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    width: 100%;
    object-fit: cover;
  }
  #cta-1393 .cs-bubbles {
    /* this scales the children inside of it down. They're all in ems so they pull from the parent font size for their value of em, in this case, the value of em is tied to the viewwidth size and stops growing when the font size is equal to 1em, which it pulls from the nearst parent with a declred font size (which is the html tag, and that tag is 16px by default) */
    font-size: min(1.8vw, 0.65em);
    width: calc(814 / 16 * 1em);
    height: calc(742 / 16 * 1em);
    position: absolute;
    left: 50%;
    /* removed at larger desktop */
    bottom: calc(-200 / 16 * 1em);
    transform: translateX(-50%);
  }
  #cta-1393 .cs-bubbles:before {
    /* white border bubble */
    content: "";
    width: calc(591 / 16 * 1em);
    height: calc(591 / 16 * 1em);
    background: transparent;
    border: 1px solid #fff;
    border-radius: 50%;
    opacity: 1;
    position: absolute;
    display: block;
    bottom: 0;
    left: 0;
    animation-name: floatAnimation;
    animation-duration: 5s;
    animation-timing-function: ease-in-out;
    animation-fill-mode: forwards;
    animation-iteration-count: infinite;
  }
  #cta-1393 .cs-bubbles:after {
    /* orange bubble */
    content: "";
    width: calc(591 / 16 * 1em);
    height: calc(591 / 16 * 1em);
    background: var(--primary);
    border-radius: 50%;
    display: block;
    position: absolute;
    top: 0;
    right: 0;
    z-index: -1;
    animation-name: floatAnimation2;
    animation-duration: 14s;
    animation-timing-function: ease-in-out;
    animation-fill-mode: forwards;
    animation-iteration-count: infinite;
  }
}
/* Tablet - 768px */
@media only screen and (min-width: 48rem) {
  #cta-1393 .cs-container {
    max-width: calc(1280 / 16 * 1rem);
  }
  #cta-1393 .cs-input {
    width: 100%;
  }
  #cta-1393 .cs-submit {
    width: auto;
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    right: calc(8 / 16 * 1rem);
  }
  #cta-1393 .cs-picture {
    width: 50%;
  }
}
/* Desktop - 1024px */
@media only screen and (min-width: 64rem) {
  #cta-1393 {
    /* 100px - 130px */
    padding: clamp(6.25rem, 7vw, 8.125rem) 1rem;
  }
  #cta-1393 .cs-container {
    flex-direction: row;
    justify-content: flex-start;
  }
  #cta-1393 .cs-content {
    text-align: left;
    align-items: flex-start;
  }
  #cta-1393 .cs-picture {
    font-size: min(1vw, 1em);
    width: calc(685 / 16 * 1em);
    height: calc(665 / 16 * 1em);
    display: flex;
    align-items: flex-end;
    justify-content: flex-end;
    position: absolute;
    right: 0;
    /* 106px - 240px */
    bottom: calc(clamp(6.625em, 12vw, 15em) * -1);
  }
  #cta-1393 .cs-picture img {
    height: 100%;
    width: auto;
  }
  #cta-1393 .cs-bubbles {
    font-size: min(0.9vw, 1em);
    left: auto;
    /* 50px - 150px */
    right: calc(clamp(3.125em, 5vw, 9.375em) * -1);
    /* 106px - 368px */
    bottom: calc(clamp(10em, 20vw, 23em) * -1);
    transform: none;
  }
}
</style>
</head>
<body>

<!-- ============================================ -->

<section id="cta-1393">
    <div class="cs-container">
        <div class="cs-content">
            <span class="cs-topper">Subscribe</span>
            <h2 class="cs-title">Subscribe for Newsletter</h2>
            <p class="cs-text">
                Subscribe to our newsletter and stay up-to-date with the latest news, exclusive offers, and exciting updates.
            </p>
            <form class="cs-form" name="Contact Form" method="post">
                <input class="cs-input" type="email" id="cs-email-1393" name="find-us" placeholder="Email Address">
                <button class="cs-button-solid cs-submit" type="submit">Subscribe Now</button>
            </form>
        </div>
        <!--To make your own crops of people or yourself, use https://www.remove.bg/ to do so, then open the image in GIMP image editing software (free) and in the top nav click on image, then click on "crop to content" and that will remove all the extra empty space around your png person, then export as a png to your images folder -->
        <picture class="cs-picture">
            <source media="(max-width: 600px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/developer.png">
            <source media="(min-width: 601px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/developer.png">
            <img loading="lazy" decoding="async" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/developer.png" alt="developer" width="814" height="742" aria-hidden="true">
        </picture>
        <div class="cs-bubbles" aria-hidden="true"></div>
    </div>
    <!--Background Image-->
    <picture class="cs-background">
        <source media="(max-width: 600px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/MISC/abstract3-m.png">
        <source media="(min-width: 601px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/MISC/abstract3.png">
        <img loading="lazy" decoding="async" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/MISC/abstract3.png" alt="abstract" width="1920" height="486" aria-hidden="true">
    </picture>
</section>

</body>
