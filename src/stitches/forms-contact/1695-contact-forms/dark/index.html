<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>contact forms</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---          Contact           -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #contact-1695 {
    padding: var(--sectionPadding);
    background-color: #f7f7f7;
    position: relative;
    z-index: 1;
  }
  #contact-1695 .cs-container {
    width: 100%;
    /* changes to 1280px at tablet */
    max-width: 36.5rem;
    margin: auto;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: stretch;
    /* 48px - 64px */
    gap: clamp(3rem, 7vw, 4rem);
    column-gap: auto;
  }
  #contact-1695 .cs-content {
    /* set text align to left if content needs to be left aligned */
    text-align: left;
    width: 100%;
    display: flex;
    flex-direction: column;
    /* centers content horizontally, set to flex-start to left align */
    align-items: flex-start;
  }
  #contact-1695 .cs-topper {
    color: var(--secondary);
  }
  #contact-1695 .cs-title {
    max-width: 23ch;
    margin-bottom: 2.5rem;
    color: #fff;
  }
  #contact-1695 .cs-ul {
    text-align: left;
    width: 100%;
    margin: 0;
    box-sizing: border-box;
    padding: 0;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 1.5rem;
    position: relative;
  }
  #contact-1695 .cs-li {
    list-style: none;
    display: flex;
    justify-content: flex-start;
    align-items: flex-start;
    gap: 1.25rem;
  }
  #contact-1695 .cs-li:hover .cs-icon-wrapper {
    transform: scale(1.1);
  }
  #contact-1695 .cs-header {
    font-size: 1.25rem;
    font-weight: 700;
    line-height: 1.2em;
    margin-bottom: 0.75rem;
    color: #fff;
    display: block;
  }
  #contact-1695 .cs-link-text {
    font-size: 1rem;
    line-height: 1.5em;
    color: #bababa;
    display: block;
    position: relative;
  }
  #contact-1695 .cs-link {
    font-size: 1rem;
    line-height: 1.5em;
    color: #bababa;
    /* display: flex keeps any inline icons centred with the text */
    display: flex;
    gap: 0.25rem;
    position: relative;
  }
  #contact-1695 .cs-icon-wrapper {
    width: 3.75rem;
    height: 3.75rem;
    margin: 0;
    border: 1px solid var(--secondary);
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: transform 0.3s;
    /* prevents flexbox from squishing it */
    flex: none;
  }
  #contact-1695 .cs-icon {
    width: 1.5rem;
    height: auto;
    display: block;
  }
  #contact-1695 .cs-form {
    width: 100%;
    max-width: 39.375rem;
    /* prevents flexbox from affecting height and width */
    box-sizing: border-box;
    /* 24px - 48px top and bottom */
    /* 16px - 48px left and right */
    padding: clamp(1.5rem, 5.18vw, 3rem) clamp(1rem, 4vw, 3rem);
    background-color: #f7f7f7;
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    flex-wrap: wrap;
    gap: 0.75rem;
  }
  #contact-1695 .cs-label {
    font-size: 1rem;
    font-weight: 700;
    color: var(--headerColor);
    width: 100%;
    display: flex;
    grid-column: span 12;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.25rem;
  }
  #contact-1695 .cs-input {
    font-size: 1rem;
    width: 100%;
    height: 3.5rem;
    /* prevents padding from adding to height and width */
    box-sizing: border-box;
    padding: 0;
    padding-left: 1.5rem;
    color: var(--headerColor);
    background-color: #fff;
    border: none;
  }
  #contact-1695 .cs-input::placeholder {
    color: #767676;
  }
  #contact-1695 .cs-textarea {
    font-family: inherit;
    min-height: 7.5rem;
    margin: 0;
    padding-top: 1.5rem;
  }
  #contact-1695 .cs-button-solid {
    font-size: 1rem;
    font-weight: 700;
    line-height: 3.5rem;
    text-decoration: none;
    margin: 0;
    padding: 0 3rem;
    color: #fff;
    background-color: var(--secondary);
    display: inline-block;
    position: relative;
    z-index: 1;
    overflow: hidden;
    transition: color 0.3s;
  }
  #contact-1695 .cs-button-solid:before {
    content: "";
    width: 0%;
    height: 100%;
    background: #1a1a1a;
    opacity: 1;
    display: block;
    position: absolute;
    top: 0;
    left: 0;
    z-index: -1;
    transition: width 0.3s;
  }
  #contact-1695 .cs-button-solid:hover {
    color: var(--primary);
  }
  #contact-1695 .cs-button-solid:hover:before {
    width: 100%;
  }
  #contact-1695 .cs-wrapper {
    grid-column: span 12;
  }
  #contact-1695 .cs-submit {
    width: 100%;
    min-width: 12.5rem;
    /* 16px - 36px */
    margin-top: clamp(1rem, 3vw, 2.25rem);
    border: none;
  }
  #contact-1695 .cs-submit:hover {
    color: #fff;
    cursor: pointer;
  }
  #contact-1695 .cs-background {
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0;
    left: 0;
    z-index: -1;
  }
  #contact-1695 .cs-background::before {
    content: "";
    width: 100%;
    height: 100%;
    background-color: #111926;
    opacity: 0.88;
    position: absolute;
    top: 0;
    left: 0;
    z-index: 1;
  }
  #contact-1695 .cs-background img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
    position: absolute;
    top: 0;
    left: 0;
  }
}
/* Tablet - 768px */
@media only screen and (min-width: 48rem) {
  #contact-1695 .cs-container {
    max-width: 80rem;
    flex-direction: row-reverse;
    justify-content: space-between;
    align-items: center;
  }
  #contact-1695 .cs-content {
    width: 47%;
    max-width: 32.5rem;
    /* sends it to the right in the 2nd position */
    order: 2;
    /* prevents flexbox from squishing it */
    flex: none;
  }
  #contact-1695 .cs-form {
    width: 46vw;
    max-width: 39.375rem;
  }
  #contact-1695 .cs-submit {
    width: auto;
  }
}
/* Desktop - 1024px */
@media only screen and (min-width: 64rem) {
  #contact-1695 .cs-label:nth-of-type(2),
  #contact-1695 .cs-label:nth-of-type(3) {
    grid-column: span 6;
  }
  #contact-1695 .cs-submit {
    width: auto;
    grid-column: span 6;
  }
}
</style>
</head>
<body>

<!-- ============================================ -->
<!--                   Contact                    -->
<!-- ============================================ -->

<section id="contact-1695">
    <div class="cs-container">
        <div class="cs-content">
            <span class="cs-topper">Contact Us</span>
            <h2 class="cs-title">Let's Collaborate</h2>
            <ul class="cs-ul">
                <li class="cs-li">
                    <picture class="cs-icon-wrapper">
                        <img aria-hidden="true"
                                src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Icons/enterprise-call.svg"
                                alt="phone icon" class="cs-icon" width="24" height="24" decoding="async">
                    </picture>
                    <div class="cs-flex-group">
                        <span class="cs-header">Our Support</span>
                        <span class="cs-link-text">We are available for your 24/7 support. Call us at</span>
                        <a href="tel:888-4565-789" class="cs-link">+1 (888) 4565 789</a>
                    </div>
                </li>
                <li class="cs-li">
                    <picture class="cs-icon-wrapper">
                        <img class="cs-icon" aria-hidden="true"
                                src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Icons/enterprise-message.svg"
                                alt="address icon" width="24" height="24" decoding="async">
                    </picture>
                    <div class="cs-flex-group">
                        <span class="cs-header">Email Us</span>
                        <span class="cs-link-text">Email your questions at</span>
                        <a href="mailto:Email@stitch.com" class="cs-link">info@stitchconsulting.com</a>
                    </div>
                </li>
                <li class="cs-li">
                    <picture class="cs-icon-wrapper">
                        <img class="cs-icon" aria-hidden="true"
                                src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Icons/enterprise-account.svg"
                                alt="address icon" width="24" height="24" decoding="async">
                    </picture>
                    <div class="cs-flex-group">
                        <span class="cs-header">Join Our Community</span>
                        <span class="cs-link-text">Join our largest community on whatsapp</span>
                        <a href="https://www.whatsapp.com" class="cs-link">
                            <img class="cs-icon" aria-hidden="true"
                                src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Icons/whatsapp.svg"
                                alt="address icon" width="24" height="24" decoding="async">
                            Join Now
                        </a>
                    </div>
                </li>
            </ul>
        </div>
        <!--Form-->
        <form class="cs-form" name="Contact Form" method="post">
            <label class="cs-label">
                Name
                <input class="cs-input" required type="text" id="name-1695" name="name" placeholder="Name">
            </label>
            <label class="cs-label">
                Email
                <input class="cs-input" required type="email" id="email-1695" name="email" placeholder="Email">
            </label>
            <label class="cs-label">
                Phone
                <input class="cs-input" required type="tel" id="phone-1695" name="phone" placeholder="Phone">
            </label>
            <label class="cs-label">
                How Did You Find Us
                <input class="cs-input" type="text" id="find-1695" name="find-us" placeholder="How did you find us?">
            </label>
            <label class="cs-label cs-label-message">
                Message
                <textarea class="cs-input cs-textarea" required name="Message" id="message-1695" placeholder="Write message..."></textarea>
            </label>
            <p class="cs-wrapper">
                <button class="cs-button-solid cs-submit" type="submit">Schedule Consultation</button>
            </p>
        </form>
    </div>

    <picture class="cs-background">
        <!--Mobile Image-->
        <source media="(max-width: 600px)"
                srcset="https://csimages2.nyc3.digitaloceanspaces.com/Images/MISC/enterprise-form-bg-m.jpg">
        <!--Tablet and above Image-->
        <source media="(min-width: 601px)"
                srcset="https://csimages2.nyc3.digitaloceanspaces.com/Images/MISC/enterprise-form-bg.jpg">
        <img loading="lazy" decoding="async"
                src="https://csimages2.nyc3.digitaloceanspaces.com/Images/MISC/enterprise-form-bg.jpg"
                alt="wind turbine" width="650" height="613">
    </picture>
</section>

<script></script>
</body>
</html>
