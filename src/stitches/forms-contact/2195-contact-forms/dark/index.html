<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>contact forms</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---          Contact           -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #contact-2195 {
    padding: var(--sectionPadding);
    background-color: #FBF5F1;
    overflow: hidden;
    position: relative;
    z-index: 1;
  }
  #contact-2195 .cs-container {
    width: 100%;
    /* changes to 1280px at tablet */
    max-width: 48rem;
    margin: auto;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    /* 48px - 64px */
    gap: clamp(3rem, 6vw, 4rem);
  }
  #contact-2195 .cs-content {
    text-align: center;
    width: 100%;
    margin: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  #contact-2195 .cs-title {
    max-width: 27ch;
  }
  #contact-2195 .cs-form {
    width: 100%;
    max-width: 42.5rem;
    /* prevents flexbox from affecting height and width */
    box-sizing: border-box;
    padding: 0;
    display: grid;
    justify-content: center;
    align-items: center;
    grid-template-columns: repeat(12, 1fr);
    gap: 0.75rem;
  }
  #contact-2195 .cs-label {
    /* 14px - 16px */
    font-size: clamp(0.875rem, 1.5vw, 1rem);
    width: 100%;
    color: var(--headerColor);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    grid-column: span 12;
    gap: 0.25rem;
  }
  #contact-2195 .cs-label:last-of-type {
    margin-bottom: 1.25rem;
  }
  #contact-2195 .cs-input {
    font-size: 1rem;
    width: 100%;
    /* 46px - 56px */
    height: clamp(2.875rem, 6vw, 3.5rem);
    /* prevents padding from adding to height and width */
    box-sizing: border-box;
    padding: 0;
    padding-left: 1.5rem;
    background-color: #ffffff;
    color: #767676;
    border: none;
  }
  #contact-2195 .cs-input::placeholder {
    color: #767676;
  }
  #contact-2195 .cs-select {
    /* as the select arrow/date calendar icon are not affected by padding, we can use a transparent border on the select element to pad the arrow as much as we need */
    border-right: 1.5rem solid rgba(0, 0, 0, 0);
  }
  #contact-2195 .cs-textarea {
    font-family: inherit;
    min-height: 7.5rem;
    padding-top: 1rem;
  }
  #contact-2195 .cs-button-solid {
    font-size: 1rem;
    font-weight: 700;
    /* 46px - 56px */
    line-height: clamp(2.875em, 5.5vw, 3.5em);
    text-align: center;
    text-decoration: none;
    width: 100%;
    margin: 0;
    /* prevents padding from adding to the width */
    box-sizing: border-box;
    /* 32px - 48px */
    padding: 0 clamp(2rem, 4vw, 3rem);
    background-color: var(--primary);
    overflow: hidden;
    color: #fff;
    border: none;
    display: inline-block;
    position: relative;
    z-index: 1;
    transition: color 0.3s;
  }
  #contact-2195 .cs-button-solid:before {
    content: '';
    width: 0%;
    height: 100%;
    background: #000;
    opacity: 1;
    position: absolute;
    top: 0;
    left: 0;
    z-index: -1;
    transition: width 0.3s;
  }
  #contact-2195 .cs-button-solid:hover {
    color: #fff;
  }
  #contact-2195 .cs-button-solid:hover:before {
    width: 100%;
  }
  #contact-2195 .cs-submit {
    grid-column: span 12;
  }
  #contact-2195 .cs-submit:hover {
    cursor: pointer;
  }
  #contact-2195 .cs-floater {
    height: auto;
    display: none;
    position: absolute;
    z-index: -1;
  }
  #contact-2195 .cs-flower2 {
    transform: rotateY(180deg);
  }
  #contact-2195 .cs-background {
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0;
    left: 0;
    z-index: -10;
  }
  #contact-2195 .cs-background img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    top: 0;
    left: 0;
  }
}
/* Tablet - 768px */
@media only screen and (min-width: 48rem) {
  #contact-2195 .cs-container {
    max-width: 80rem;
  }
  #contact-2195 .cs-form {
    /* 464px - 680px */
    max-width: clamp(29rem, 58vw, 42.5rem);
  }
  #contact-2195 .cs-label {
    grid-column: span 6;
  }
  #contact-2195 .cs-label:last-of-type {
    grid-column: span 12;
  }
  #contact-2195 .cs-button-solid {
    width: auto;
    margin: auto;
  }
  #contact-2195 .cs-floater {
    /* 173px - 432px */
    width: clamp(10.8125rem, 25vw, 27rem);
    display: block;
    /* 54px - 08px */
    bottom: clamp(3.375rem, 6vw, 6.75rem);
    left: -2rem;
  }
  #contact-2195 .cs-flower2 {
    right: -2rem;
    bottom: 3.375rem;
    left: auto;
  }
}
/* Small Desktop - 1024px */
@media only screen and (min-width: 64rem) {
  #contact-2195 .cs-label {
    grid-column: span 12;
  }
}
</style>
</head>
<body>

<!-- ============================================ -->
<!--                   Contact                    -->
<!-- ============================================ -->

<section id="contact-2195">
    <div class="cs-container">
        <div class="cs-content">
            <span class="cs-topper">Contact Us</span>
            <h2 class="cs-title">Let’s Capture The Celebration of True Love</h2>
            <p class="cs-text">We have courses on-demand and live instructors for workshops and support. We also provide LIVE instructor-led training courses and onsite training.</p>
        </div>
        <!--Form-->
        <form class="cs-form" id="cs-form-2195" name="Contact Form" method="post">
            <label class="cs-label" aria-label="name">
                <input class="cs-input" required type="text" id="name-2195" name="name" placeholder="Name">
            </label>
            <label class="cs-label cs-email" aria-label="email">
                <input class="cs-input" required type="email" id="email-2195" name="email" placeholder="Email">
            </label>
            <label class="cs-label cs-phone" aria-label="phone">
                <input class="cs-input" required type="phone" id="phone-2195" name="phone" placeholder="Phone">
            </label>
            <label class="cs-label" aria-label="services">
                <select class="cs-input cs-select" required id="service-2195" name="Services">
                    <option value="" disabled selected>Services</option>
                    <option value="Service1">Service1</option>
                    <option value="Service2">Service2</option>
                    <option value="Service3">Service3</option>
                </select>
            </label>
            <label class="cs-label" aria-label="message">
                <textarea class="cs-input cs-textarea" required name="Message" id="message-2195" placeholder="Message"></textarea>
            </label>
            <button class="cs-button-solid cs-submit" type="submit">Schedule Consultation</button>
        </form>
    </div>
    <img class="cs-floater" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/MISC/flower12.png" alt="flower" loading="lazy" aria-hidden="true" width="432" height="680">
    <img class="cs-floater cs-flower2" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/MISC/flower12.png" alt="flower" loading="lazy" aria-hidden="true" width="432" height="680">
    <!--Background-->
    <picture class="cs-background">
        <!--Mobile Image-->
        <source media="(max-width: 600px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Graphics/abstract-gold.png">
        <!--Tablet and above Image-->
        <source media="(min-width: 601px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Graphics/abstract-gold.png">
        <img src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Graphics/abstract-gold.png" alt="background" width="1920" height="949" loading="lazy" decoding="async" aria-hidden="true">
    </picture>
</section>

<script></script>
</body>
</html>
