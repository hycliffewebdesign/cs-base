<!DOCTYPE html>

<head>
  <meta charset="UTF-8">

  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---           Video            -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #video-1492 {
    padding: var(--sectionPadding);
    overflow: hidden;
    position: relative;
    z-index: 1;
  }
  #video-1492 .cs-container {
    width: 100%;
    max-width: 80.625rem;
    margin: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    /* 48px - 64px */
    gap: clamp(3rem, 6vw, 4rem);
  }
  #video-1492 .cs-content {
    /* set text align to left if content needs to be left aligned */
    text-align: center;
    width: 100%;
    display: flex;
    flex-direction: column;
    /* centers content horizontally, set to flex-start to left align */
    align-items: center;
  }
  #video-1492 .cs-big-link {
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    z-index: 1;
  }
  #video-1492 .cs-big-link:hover .cs-picture img {
    transform: scale(1.1);
  }
  #video-1492 .cs-picture {
    font-size: min(1.1vw, 1em);
    width: 80.625em;
    height: 44.375em;
    /* clips the img from overflowing the container on hover */
    overflow: hidden;
    display: block;
    position: relative;
    top: 0;
    left: 0;
    z-index: 1;
  }
  #video-1492 .cs-picture img {
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    width: 100%;
    object-fit: cover;
    z-index: -1;
    transition: transform 0.7s;
  }
  #video-1492 .cs-icon-wrapper {
    /* 56px - 120px */
    width: clamp(3.5rem, 11vw, 7.5rem);
    height: clamp(3.5rem, 11vw, 7.5rem);
    border-radius: 50%;
    opacity: 1;
    background-color: rgba(255, 255, 255, 0.5);
    -webkit-backdrop-filter: blur(5px);
    backdrop-filter: blur(5px);
    display: flex;
    justify-content: center;
    align-items: center;
    position: absolute;
    z-index: 100;
    transition: transform 0.3s, box-shadow 0.3s;
  }
  #video-1492 .cs-icon-wrapper:hover {
    transform: scale(1.1);
    box-shadow: rgba(0, 0, 0, 0.2) 0px 7px 29px 0px;
  }
  #video-1492 .cs-link-icon {
    /* 16px - 24px */
    width: clamp(1rem, 2vw, 1.5rem);
    height: auto;
  }
  #video-1492 .cs-mask {
    /* Mask Colors */
    --maskBorder: #e8e8e8;
    --maskTopColor: #F2FAF8;
    --maskBottomColor: #fff;
    position: absolute;
    top: -1px;
    left: -3px;
    right: -1px;
    bottom: -1px;
    z-index: 10;
  }
  #video-1492 .cs-hills {
    /* hills Color */
    --hillBG: #F2FAF8;
    width: 130%;
    min-width: 120rem;
    height: auto;
    position: absolute;
    bottom: 47%;
    left: 50%;
    transform: translateX(-50%);
  }
}
</style>
</head>
