<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2 column</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---           Footer           -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #cs-footer-270 {
    padding: var(--sectionPadding);
    background-color: #1a1a1a;
  }
  #cs-footer-270 .cs-container {
    width: 100%;
    max-width: calc(1280 / 16 * 1rem);
    margin: auto;
  }
  #cs-footer-270 .cs-logo-group {
    /* takes up all the space, lets the other ul's wrap below it */
    width: 100%;
    position: relative;
  }
  #cs-footer-270 .cs-logo {
    /* 210px - 240px */
    width: clamp(13.125rem, 8vw, 15rem);
    height: auto;
    display: block;
    /* 28px - 44px */
    margin-bottom: clamp(1.75rem, 4.17vw, 2.75rem);
  }
  #cs-footer-270 .cs-logo-img {
    width: 100%;
    height: auto;
  }
  #cs-footer-270 .cs-nav {
    padding: 0;
    padding-left: calc(16 / 16 * 1rem);
    margin: 0;
    /* 32px - 40px */
    margin-bottom: clamp(2rem, 5.3vw, 2.5rem);
  }
  #cs-footer-270 .cs-nav-li {
    list-style: none;
    line-height: 1.5em;
  }
  #cs-footer-270 .cs-nav-li:last-of-type {
    margin-bottom: 0;
  }
  #cs-footer-270 .cs-header {
    font-size: calc(16 / 16 * 1rem);
    line-height: 1.5em;
    font-weight: 700;
    margin-bottom: calc(20 / 16 * 1rem);
    color: var(--bodyTextColorWhite);
    position: relative;
    display: block;
  }
  #cs-footer-270 .cs-nav-link {
    font-size: calc(16 / 16 * 1rem);
    text-decoration: none;
    line-height: 1.5em;
    color: var(--bodyTextColorWhite);
    position: relative;
  }
  #cs-footer-270 .cs-nav-link:before {
    /* underline */
    content: "";
    width: 0%;
    height: calc(2 / 16 * 1rem);
    /* current color of the parent */
    background: currentColor;
    opacity: 1;
    position: absolute;
    display: block;
    bottom: -0.125rem;
    left: 0;
    transition: width 0.3s;
  }
  #cs-footer-270 .cs-nav-link:hover:before {
    width: 100%;
  }
  #cs-footer-270 .cs-bottom {
    width: 100%;
    position: relative;
    padding-left: calc(16 / 16 * 1rem);
  }
  #cs-footer-270 .cs-copyright {
    font-size: calc(16 / 16 * 1rem);
    line-height: 1.5em;
    color: #b4b2c7;
    display: block;
  }
  #cs-footer-270 .cs-social {
    display: inline-flex;
    justify-content: flex-start;
    flex-direction: column;
    gap: calc(12 / 16 * 1rem);
    position: absolute;
    right: calc(12 / 16 * 1rem);
    bottom: 0;
  }
  #cs-footer-270 .cs-social-link {
    width: calc(24 / 16 * 1rem);
    height: calc(24 / 16 * 1rem);
    background-color: #4e4b66;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    z-index: 1;
    transition: transform 0.3s, background-color 0.3s;
  }
  #cs-footer-270 .cs-social-link:hover {
    background-color: var(--primary);
    transform: translateY(-0.1875rem);
  }
  #cs-footer-270 .cs-social-img {
    height: calc(13 / 16 * 1rem);
    width: auto;
    display: block;
  }
}
/* Inbetween - 600px */
@media only screen and (min-width: 37.5rem) {
  #cs-footer-270 .cs-container {
    display: flex;
    justify-content: flex-start;
    align-items: flex-start;
    flex-wrap: wrap;
    /* 48px - 60px */
    column-gap: clamp(3rem, 5.9vw, 3.75rem);
  }
}
/* Tablet - 768px */
@media only screen and (min-width: 48rem) {
  #cs-footer-270 .cs-logo-group {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    /* 20px - 60px */
    margin-bottom: clamp(1.25rem, 4vw, 3.75rem);
  }
  #cs-footer-270 .cs-logo {
    margin: 0;
  }
  #cs-footer-270 .cs-text {
    text-align: right;
    width: 50%;
    max-width: calc(521 / 16 * 1rem);
    margin: 0;
  }
  #cs-footer-270 .cs-nav {
    padding: 0;
  }
  #cs-footer-270 .cs-bottom {
    padding: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  #cs-footer-270 .cs-social {
    flex-direction: row;
    position: relative;
    /* reset these positions */
    bottom: auto;
    right: auto;
  }
}
</style>
</head>
<body>

<!-- ============================================ -->
<!--                  Footer                      -->
<!-- ============================================ -->

<footer id="cs-footer-270">
    <div class="cs-container">
        <!-- Logo Group -->
        <div class="cs-logo-group">
            <a aria-label="go back to home" class="cs-logo" href="">
                <img class="cs-logo-img" aria-hidden="true" loading="lazy" decoding="async" src="https://csimg.nyc3.digitaloceanspaces.com/Footer/logo-light.svg" alt="logo" width="240" height="32">
            </a>
            <p class="cs-text">
                Cursus habitant elementum malesuada at id viverra augue eleifend diam. Etiam varius massa placerat et nibh in quis.
            </p>
        </div>
        <!-- Address Info -->
        <ul class="cs-nav">
            <li class="cs-nav-li">
                <span class="cs-header">Address</span>
            </li>
            <li class="cs-nav-li">
                <a class="cs-nav-link" href="">123 Avenue Street <br>Oak Harbor, WA 98101</a>
            </li>
        </ul>
        <!-- Contact Info -->
        <ul class="cs-nav">
            <li class="cs-nav-li">
                <span class="cs-header">Contact</span>
            </li>
            <li class="cs-nav-li">
                <a class="cs-nav-link" href="tel: 123-456-7890">(123) 456-7890</a>
            </li>
        </ul>
        <!-- Social and Credit -->
        <div class="cs-bottom">
            <span class="cs-copyright">© 2022 Copyright</span>
            <div class="cs-social">
                <a class="cs-social-link" aria-label="visit google profile" href="">
                    <img class="cs-social-img" aria-hidden="true" loading="lazy" decoding="async" src="https://csimg.nyc3.digitaloceanspaces.com/Social/google.svg" alt="google" width="11" height="11">
                </a>
                <a class="cs-social-link" aria-label="visit facebook profile" href="">
                    <img class="cs-social-img" aria-hidden="true" loading="lazy" decoding="async" src="https://csimg.nyc3.digitaloceanspaces.com/Social/Facebook.svg" alt="facebook" width="6" height="11">
                </a>
                <a class="cs-social-link" aria-label="visit instagram profile" href="">
                    <img class="cs-social-img" aria-hidden="true" loading="lazy" decoding="async" src="https://csimg.nyc3.digitaloceanspaces.com/Social/instagram.svg" alt="instagram" width="11" height="11">
                </a>
            </div>
        </div>
    </div>
</footer>

<script></script>
</body>
</html>
