<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>simple</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---           Footer           -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #cs-footer-106 {
    padding: calc(40 / 16 * 1rem) calc(16 / 16 * 1rem) calc(20 / 16 * 1rem);
    background: #1a1a1a;
  }
  #cs-footer-106 .cs-container {
    width: 100%;
    max-width: calc(1080 / 16 * 1rem);
    margin: auto;
  }
  #cs-footer-106 .cs-ul {
    padding: 0 0 calc(40 / 16 * 1rem);
    margin: auto;
    border-bottom: 1px solid #eff0f6;
  }
  #cs-footer-106 .cs-li {
    list-style: none;
    text-align: center;
    margin-bottom: calc(20 / 16 * 1rem);
  }
  #cs-footer-106 .cs-li:last-of-type {
    margin-bottom: 0;
  }
  #cs-footer-106 .cs-link {
    /* 15px - 17px */
    font-size: clamp(0.9375rem, 2vw, 1.0625rem);
    line-height: 1.5em;
    text-decoration: none;
    font-weight: 700;
    color: var(--bodyTextColorWhite);
    position: relative;
  }
  #cs-footer-106 .cs-link:hover:before {
    width: 100%;
  }
  #cs-footer-106 .cs-link:before {
    /* top right box */
    content: "";
    width: 0%;
    height: calc(3 / 16 * 1rem);
    background: var(--bodyTextColorWhite);
    opacity: 1;
    position: absolute;
    display: block;
    bottom: calc(-2 / 16 * 1rem);
    left: 0;
    transition: width 0.3s;
  }
  #cs-footer-106 .cs-bottom {
    margin-top: calc(20 / 16 * 1rem);
    display: flex;
    /* set everyone to position on the left side */
    justify-content: flex-start;
    align-items: center;
  }
  #cs-footer-106 .cs-copyright {
    font-size: calc(15 / 16 * 1rem);
    text-align: center;
    color: #a0a3bd;
    display: block;
    /* margin right auto on a flexbox pushes everyone else to the right */
    margin: 0 auto 0 0;
  }
  #cs-footer-106 .cs-social-link {
    width: calc(20 / 16 * 1rem);
    height: calc(20 / 16 * 1rem);
    margin-left: calc(12 / 16 * 1rem);
    background: #a0a3bd;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  #cs-footer-106 .cs-social-link img {
    height: calc(11 / 16 * 1rem);
    width: auto;
  }
}
/* Tablet - 700px */
@media only screen and (min-width: 43.75rem) {
  #cs-footer-106 .cs-ul {
    display: flex;
    /* push everything to the left */
    justify-content: flex-start;
    align-items: center;
  }
  #cs-footer-106 .cs-li {
    /* 45px - 88px */
    margin: 0 clamp(2.8125rem, 7vw, 5.5rem) 0 0;
  }
  #cs-footer-106 .cs-li:last-of-type {
    margin: 0;
    /* margin-left auto will push everything away and force it to the farthest 
                   right edge */
    margin-left: auto;
  }
}
</style>
</head>
<body>
