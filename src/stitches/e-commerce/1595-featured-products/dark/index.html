<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>featured products</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---        Collection          -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #collection-1595 {
    padding: var(--sectionPadding);
  }
  #collection-1595 .cs-container {
    width: 100%;
    max-width: 80rem;
    margin: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    /* 48px - 64px */
    gap: clamp(3rem, 6vw, 4rem);
  }
  #collection-1595 .cs-content {
    /* set text align to left if content needs to be left aligned */
    text-align: left;
    width: 100%;
    max-width: 31.25rem;
    /* pushes it to the left */
    margin-right: auto;
    display: flex;
    flex-direction: column;
    /* centers content horizontally, set to flex-start to left align */
    align-items: flex-start;
  }
  #collection-1595 .cs-tag {
    font-size: 0.8125rem;
    line-height: 1.5rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    margin: 0 0 1rem 0;
    padding: 0 0.5rem;
    color: var(--bodyTextColorWhite);
    background-color: var(--secondary);
    display: block;
  }
  #collection-1595 .cs-text {
    margin-bottom: 1rem;
  }
  #collection-1595 .cs-text:last-of-type {
    margin-bottom: 2rem;
  }
  #collection-1595 .cs-button-solid {
    font-size: 1rem;
    /* 46px - 56px */
    line-height: clamp(2.875rem, 5.5vw, 3.5rem);
    text-decoration: none;
    font-weight: 700;
    text-align: center;
    margin: 0;
    color: #fff;
    min-width: 9.375rem;
    padding: 0 1.5rem;
    background-color: var(--primary);
    display: inline-block;
    position: relative;
    z-index: 1;
    /* prevents padding from adding to the width */
    box-sizing: border-box;
  }
  #collection-1595 .cs-button-solid:before {
    content: '';
    position: absolute;
    height: 100%;
    width: 0%;
    background: #000;
    opacity: 1;
    top: 0;
    left: 0;
    z-index: -1;
    transition: width 0.3s;
  }
  #collection-1595 .cs-button-solid:hover:before {
    width: 100%;
  }
  #collection-1595 .cs-card-group {
    width: 100%;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    /* 16px - 20px */
    column-gap: clamp(1rem, 3vw, 1.25rem);
    /* 16px - 40px */
    row-gap: clamp(1rem, 3vw, 2.5rem);
  }
  #collection-1595 .cs-item {
    list-style: none;
    width: 100%;
    margin: 0;
    padding: 0;
  }
  #collection-1595 .cs-item:hover .cs-picture {
    background-color: rgba(0, 0, 0, 0.1);
  }
  #collection-1595 .cs-item:hover .cs-picture img {
    transform: scale(1.05);
  }
  #collection-1595 .cs-link {
    text-decoration: none;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }
  #collection-1595 .cs-picture {
    width: 100%;
    height: 100vw;
    min-height: 21.25rem;
    max-height: 25rem;
    /* 12px - 20px */
    margin: 0 0 clamp(0.75rem, 2vw, 1.25rem);
    background-color: #f9f9f9;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    z-index: 1;
    transition: background-color 0.3s;
  }
  #collection-1595 .cs-picture img {
    width: 100%;
    max-width: 15.625rem;
    height: auto;
    max-height: 80%;
    object-fit: contain;
    transition: transform 0.3s;
  }
  #collection-1595 .cs-product-name {
    /* 20px - 25px */
    font-size: clamp(1.25rem, 2.5vw, 1.5625rem);
    line-height: 1.2em;
    font-weight: 700;
    margin: 0 0 0.25rem 0;
    color: var(--headerColor);
  }
  #collection-1595 .cs-price {
    font-size: 1rem;
    line-height: 1.2em;
    font-weight: 700;
    margin: 0;
    color: var(--primary);
    display: block;
  }
}
/* Tablet - 768px */
@media only screen and (min-width: 48rem) {
  #collection-1595 .cs-container {
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
  }
  #collection-1595 .cs-card-group {
    width: 56%;
    flex-direction: row;
    align-items: stretch;
    /* prevents flexbox from squishing it */
    flex: none;
  }
  #collection-1595 .cs-item:last-of-type .cs-picture {
    /* 160px - 320px */
    height: clamp(10rem, 26vw, 20rem);
    min-height: 10rem;
  }
  #collection-1595 .cs-item:last-of-type .cs-picture img {
    width: 80%;
  }
  #collection-1595 .cs-link {
    height: 100%;
    justify-content: center;
  }
  #collection-1595 .cs-picture {
    /* 400px - 520px */
    height: clamp(25rem, 50vw, 32.5rem);
    min-height: auto;
    max-height: 100%;
  }
}
</style>
</head>
<body>

<!-- ============================================ -->
<!--                 Collection                   -->
<!-- ============================================ -->

<section id="collection-1595">
    <div class="cs-container">
        <div class="cs-content">
            <span class="cs-tag">Only $20</span>
            <h2 class="cs-title">Featured Products</h2>
            <p class="cs-text">
                Dive into the exhilarating world of fishing with Gill Rush, a dynamic and electrifying apparel brand designed exclusively for those who live for the rush of the catch.
            </p>
            <a href="" class="cs-button-solid">Shop Now</a>
        </div>
        <div class="cs-card-group">
            <li class="cs-item">
                <a href="" class="cs-link">
                    <picture class="cs-picture">
                        <!--Mobile Image-->
                        <source media="(max-width: 600px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/ecommerce/shirt4.png">
                        <!--Tablet and above Image-->
                        <source media="(min-width: 601px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/ecommerce/shirt4.png">
                        <img loading="lazy" decoding="async" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/ecommerce/shirt4.png" alt="hats" width="1280" height="568">
                    </picture>
                    <h3 class="cs-product-name">Crossback Halter Dress</h3>
                    <span class="cs-price">$7.00</span>
                </a>
            </li>
            <li class="cs-item">
                <a href="" class="cs-link">
                    <picture class="cs-picture">
                        <!--Mobile Image-->
                        <source media="(max-width: 600px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/ecommerce/shirt5.png">
                        <!--Tablet and above Image-->
                        <source media="(min-width: 601px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/ecommerce/shirt5.png">
                        <img loading="lazy" decoding="async" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/ecommerce/shirt5.png" alt="hats" width="1280" height="568">
                    </picture>
                    <h3 class="cs-product-name">Diesel V1 Hoodie</h3>
                    <span class="cs-price">$7.00</span>
                </a>
            </li>
        </div>
    </div>
</section>

<script></script>
</body>
</html>
