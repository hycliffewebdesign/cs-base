<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>promotional cta</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---        Promotions          -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #promotions-1559 {
    padding: var(--sectionPadding);
    position: relative;
    z-index: 1;
    overflow: hidden;
  }
  #promotions-1559 .cs-container {
    width: 100%;
    /* changes to 1280px at desktop */
    max-width: 56.25rem;
    margin: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }
  #promotions-1559 .cs-promotion1,
  #promotions-1559 .cs-promotion2 {
    text-align: left;
    list-style: none;
    width: 100%;
    /* 16px - 24px */
    padding: 1.5rem clamp(1rem, 2.4vw, 1.5rem);
    box-sizing: border-box;
    /* 40px - 60px */
    display: flex;
    align-items: stretch;
    justify-content: space-between;
    position: relative;
    gap: 1rem;
    z-index: 1;
  }
  #promotions-1559 .cs-promotion1:before,
  #promotions-1559 .cs-promotion2:before {
    content: '';
    width: 100%;
    height: 100%;
    background: linear-gradient(180deg, #FDF7EB 0%, #FEFAEE 48.36%, #FAEDDD 100%);
    opacity: 1;
    position: absolute;
    display: block;
    top: 0;
    left: 0;
    z-index: -1;
  }
  #promotions-1559 .cs-promotion2:before {
    background: linear-gradient(180deg, #F1F0EB 0%, #F8F7F5 28.69%, #F5F5F3 65.04%, #F2F2F0 80.92%, #DDE1E0 100%);
  }
  #promotions-1559 .cs-flex {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    align-self: center;
  }
  #promotions-1559 .cs-offer {
    width: 85%;
    max-width: 11.8125rem;
    height: auto;
    margin: 0 0 1rem 0;
  }
  #promotions-1559 .cs-picture {
    width: 50%;
    height: auto;
    max-height: 18.75rem;
    display: flex;
    justify-content: center;
    align-items: center;
    max-width: 20rem;
  }
  #promotions-1559 .cs-picture img {
    width: 100%;
    max-width: 100%;
    height: auto;
    max-height: 100%;
    object-fit: contain;
  }
  #promotions-1559 .cs-h3-offer {
    /* 20px - 25px */
    font-size: clamp(1.25rem, 2.3vw, 1.5625rem);
    line-height: 1.2em;
    font-weight: 700;
    margin: 0 0 1.5rem 0;
    /* prevents padding and border from affecting height and width */
    box-sizing: border-box;
    color: var(--headerColor);
    max-width: 17ch;
  }
  #promotions-1559 .cs-link {
    font-size: 1rem;
    text-decoration: none;
    text-align: inherit;
    line-height: 1.2em;
    font-weight: 700;
    color: var(--primary);
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    z-index: 1;
  }
  #promotions-1559 .cs-link:hover:before {
    width: 100%;
  }
  #promotions-1559 .cs-link:before {
    content: '';
    width: 0%;
    height: 1px;
    background: var(--primary);
    opacity: 1;
    position: absolute;
    display: block;
    bottom: 0;
    left: 0;
    transition: width 0.3s;
  }
}
/* Tablet - 768px */
@media only screen and (min-width: 48rem) {
  #promotions-1559 .cs-container {
    max-width: 80rem;
    flex-direction: row;
    align-items: stretch;
  }
}
</style>
</head>
<body>

<!-- ============================================ -->
<!--                 Promotions                   -->
<!-- ============================================ -->

<section id="promotions-1559">
    <div class="cs-container">
        <div class="cs-promotion1">
            <div class="cs-flex">
                <!--Limited Offer-->
                <img class="cs-offer" aria-hidden="true" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Graphics/limited-offer.png" decoding="async" alt="quote icon" width="189" height="90">
                <h3 class="cs-h3-offer">Check Out Our Fall Collection</h3>
                <a href="" class="cs-link">Explore Now</a>
            </div>
            <picture class="cs-picture">
                <!--Mobile Image-->
                <source media="(max-width: 600px)"
                    srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/MISC/hoodies.png"/>
                <!--Tablet and above Image-->
                <source media="(min-width: 601px)"
                    srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/MISC/hoodies.png"/>
                <img loading="lazy" decoding="async"
                    src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/MISC/hoodies.png" alt="kids"
                    width="220" height="220" aria-hidden="true"/>
            </picture>
        </div>
        <div class="cs-promotion2">
            <div class="cs-flex">
                <!--Limited Offer-->
                <img class="cs-offer" aria-hidden="true" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Graphics/limited-offer.png" decoding="async" alt="quote icon" width="189" height="90">
                <h3 class="cs-h3-offer">Find Your Perfect Shoes</h3>
                <a href="" class="cs-link">Explore Now</a>
            </div>
            <picture class="cs-picture">
                <!--Mobile Image-->
                <source media="(max-width: 600px)"
                    srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/ecommerce/shoe.png"/>
                <!--Tablet and above Image-->
                <source media="(min-width: 601px)"
                    srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/ecommerce/shoe.png"/>
                <img loading="lazy" decoding="async"
                    src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/ecommerce/shoe.png" alt="kids"
                    width="220" height="220" aria-hidden="true"/>
            </picture>
        </div>
    </div>
</section>

<script></script>
</body>
</html>
