<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>promotional cta</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---        Promotions          -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #promotions-1555 {
    padding: var(--sectionPadding);
    position: relative;
    z-index: 1;
    overflow: hidden;
  }
  #promotions-1555 .cs-container {
    width: 100%;
    /* changes to 1280px at desktop */
    max-width: 56.25rem;
    margin: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    /* 16px - 20px */
    gap: clamp(1rem, 2vw, 1.25rem);
    position: relative;
  }
  #promotions-1555 .cs-promotion {
    text-align: left;
    list-style: none;
    width: 100%;
    /* 16px - 24px */
    padding: 1.5rem clamp(1rem, 2.4vw, 1.5rem);
    /* prevents padding from affecting height and width */
    box-sizing: border-box;
    border: 1px solid #E8E8E8;
    /* 40px - 60px */
    display: flex;
    align-items: stretch;
    justify-content: space-between;
    position: relative;
    gap: 1rem;
    z-index: 1;
  }
  #promotions-1555 .cs-promotion:before {
    content: '';
    width: 100%;
    height: 100%;
    background: linear-gradient(180deg, #FDF7EB 0%, #FEFAEE 48.36%, #FAEDDD 100%);
    opacity: 1;
    position: absolute;
    display: block;
    top: 0;
    left: 0;
    z-index: -1;
  }
  #promotions-1555 .cs-flex {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    align-self: center;
  }
  #promotions-1555 .cs-offer {
    width: 85%;
    max-width: 11.8125rem;
    height: auto;
    margin: 0 0 1rem 0;
  }
  #promotions-1555 .cs-picture {
    width: 50%;
    height: auto;
    max-height: 18.75rem;
    display: flex;
    justify-content: center;
    align-items: center;
    max-width: 20rem;
  }
  #promotions-1555 .cs-picture img {
    width: 100%;
    max-width: 100%;
    height: auto;
    max-height: 100%;
    object-fit: contain;
  }
  #promotions-1555 .cs-card-group {
    margin: 0;
    width: 100%;
    padding: 0;
    display: flex;
    flex-direction: column;
    /* 16px - 20px */
    gap: 1rem;
    justify-content: stretch;
  }
  #promotions-1555 .cs-item {
    text-align: left;
    list-style: none;
    height: 100%;
    /* 16px - 24px top & Bottom, changes to 62px at large desktop, left and right changes to 24px */
    padding: clamp(1rem, 2vw, 1.5rem) 1rem;
    /* prevents padding from affecting height and width */
    box-sizing: border-box;
    background-color: #fff;
    border: 1px solid #E8E8E8;
    /* 40px - 60px */
    display: flex;
    flex-direction: row;
    align-items: flex-start;
    position: relative;
    z-index: 1;
    gap: 1rem;
  }
  #promotions-1555 .cs-icon-wrapper {
    /* 60px - 80px */
    width: clamp(3.75rem, 8vw, 5rem);
    height: clamp(3.75rem, 8vw, 5rem);
    border: 1px solid var(--primary);
    background: #fff;
    box-sizing: border-box;
    border-radius: 6.25rem;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
    overflow: hidden;
  }
  #promotions-1555 .cs-icon-wrapper:before {
    content: '';
    width: 100%;
    height: 100%;
    background: var(--primary);
    opacity: 0.1;
    position: absolute;
    display: block;
    top: 0;
    left: 0;
  }
  #promotions-1555 .cs-icon {
    /* 24px - 36px */
    width: clamp(1.5rem, 3vw, 2.25rem);
    height: auto;
    box-sizing: content-box;
  }
  #promotions-1555 .cs-info {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }
  #promotions-1555 .cs-h3 {
    /* 20px - 25px */
    text-align: inherit;
    line-height: 1.5em;
    font-weight: 700;
    width: 100%;
    margin: 0 0 0.5rem 0;
    /* prevents padding and border from affecting height and width */
    box-sizing: border-box;
    color: var(--headerColor);
    max-width: 17ch;
  }
  #promotions-1555 .cs-h3-offer {
    /* 20px - 25px */
    font-size: clamp(1.25rem, 2.3vw, 1.5625rem);
    line-height: 1.2em;
    font-weight: 700;
    margin: 0 0 1.5rem 0;
    /* prevents padding and border from affecting height and width */
    box-sizing: border-box;
    color: var(--headerColor);
    max-width: 17ch;
  }
  #promotions-1555 .cs-item-text {
    /* 14px - 16px */
    font-size: clamp(0.875rem, 1.5vw, 1rem);
    text-align: inherit;
    line-height: 1.5em;
    max-width: 50ch;
    margin: 0;
    width: 100%;
    color: var(--bodyTextColor);
  }
  #promotions-1555 .cs-link {
    font-size: 1rem;
    text-decoration: none;
    text-align: inherit;
    line-height: 1.2em;
    font-weight: 700;
    color: var(--primary);
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    z-index: 1;
  }
  #promotions-1555 .cs-link:hover:before {
    width: 100%;
  }
  #promotions-1555 .cs-link:before {
    content: '';
    width: 0%;
    height: 1px;
    background: var(--primary);
    opacity: 1;
    position: absolute;
    display: block;
    bottom: 0;
    left: 0;
    transition: width 0.3s;
  }
}
/* Tablet - 768px */
@media only screen and (min-width: 48rem) {
  #promotions-1555 .cs-container {
    max-width: 80rem;
    flex-direction: row;
    align-items: stretch;
  }
}
/* Small Desktop - 1024px */
@media only screen and (min-width: 64rem) {
  #promotions-1555 .cs-promotion {
    width: 60%;
    max-width: 39.375rem;
  }
  #promotions-1555 .cs-card-group {
    flex-direction: row;
    gap: 1.25rem;
    width: 66%;
  }
  #promotions-1555 .cs-item {
    text-align: center;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
  }
  #promotions-1555 .cs-info {
    align-items: center;
  }
}
/* Small Desktop - 1024px */
@media only screen and (min-width: 64rem) {
  #promotions-1555 .cs-item {
    padding: 3.875rem 1.5rem;
  }
}
</style>
</head>
