<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>promotional cta</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---         Promotions         -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #promotions-2463 {
    padding: var(--sectionPadding);
    overflow: hidden;
    position: relative;
    z-index: 1;
  }
  #promotions-2463 .cs-container {
    width: 100%;
    max-width: calc(1280/16 * 1rem);
    margin: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    /* 48px - 64px */
    gap: clamp(3rem, 6vw, 4rem);
  }
  #promotions-2463 .cs-content {
    /* set text align to left if content needs to be left aligned */
    text-align: center;
    width: 100%;
    max-width: calc(720/16 * 1rem);
    display: flex;
    flex-direction: column;
    /* centers content horizontally, set to flex-start to left align */
    align-items: center;
  }
  #promotions-2463 .cs-topper {
    color: var(--secondary);
  }
  #promotions-2463 .cs-title {
    max-width: 100%;
    color: var(--bodyTextColorWhite);
  }
  #promotions-2463 .cs-text {
    margin-bottom: calc(16/16 * 1rem);
    color: var(--bodyTextColorWhite);
    opacity: 0.9;
  }
  #promotions-2463 .cs-text:last-of-type {
    margin-bottom: calc(32/16 * 1rem);
  }
  #promotions-2463 .cs-button-solid {
    font-size: calc(16/16 * 1rem);
    font-weight: 700;
    /* 46px - 56px */
    line-height: clamp(2.875rem, 5.5vw, 3.5rem);
    text-align: center;
    text-decoration: none;
    min-width: calc(200/16 * 1rem);
    margin: 0;
    /* prevents padding from adding to the width */
    box-sizing: border-box;
    padding: 0 calc(24/16 * 1rem);
    background-color: var(--secondary);
    overflow: hidden;
    color: #1a1a1a;
    border-radius: calc(8/16 * 1rem);
    display: inline-block;
    position: relative;
    z-index: 1;
    transition: color 0.3s;
  }
  #promotions-2463 .cs-button-solid:before {
    content: "";
    width: 0%;
    height: 100%;
    background: #000;
    opacity: 1;
    border-radius: calc(8/16 * 1rem);
    position: absolute;
    top: 0;
    left: 0;
    z-index: -1;
    transition: width 0.3s;
  }
  #promotions-2463 .cs-button-solid:hover {
    color: #fff;
  }
  #promotions-2463 .cs-button-solid:hover:before {
    width: 100%;
  }
  #promotions-2463 .cs-picture {
    /* 121px - 534px */
    width: clamp(7.5625rem, 28vw, 33.375rem);
    height: auto;
    max-height: 100%;
    display: block;
    position: absolute;
    bottom: 0;
    z-index: -1;
  }
  #promotions-2463 .cs-picture img {
    width: 100%;
    height: auto;
    object-fit: cover;
    position: relative;
    top: 0;
    left: 0;
  }
  #promotions-2463 .cs-picture1 {
    left: 0;
  }
  #promotions-2463 .cs-picture2 {
    right: 0;
  }
  #promotions-2463 .cs-background {
    width: 100%;
    height: 100%;
    display: block;
    position: absolute;
    top: 0;
    left: 0;
    z-index: -2;
  }
  #promotions-2463 .cs-background:before {
    /* background color overlay */
    content: "";
    width: 100%;
    height: 100%;
    background: #000;
    opacity: 0.64;
    display: block;
    position: absolute;
    top: 0;
    left: 0;
    z-index: 1;
  }
  #promotions-2463 .cs-background img {
    width: 100%;
    height: 100%;
    /* Makes img tag act as a background image */
    object-fit: cover;
    position: absolute;
    top: 0;
    left: 0;
  }
}
</style>
</head>
<body>

	</picture>
