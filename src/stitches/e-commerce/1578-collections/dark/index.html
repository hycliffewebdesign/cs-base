<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>collections</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---         Collection         -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #collection-1578 {
    padding: var(--sectionPadding);
  }
  #collection-1578 .cs-container {
    width: 100%;
    max-width: 80rem;
    margin: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    /* 48px - 64px */
    gap: clamp(3rem, 6vw, 4rem);
  }
  #collection-1578 .cs-content {
    /* set text align to left if content needs to be left aligned */
    text-align: center;
    width: 100%;
    display: flex;
    flex-direction: column;
    /* centers content horizontally, set to flex-start to left align */
    align-items: center;
  }
  #collection-1578 .cs-title {
    margin: 0;
  }
  #collection-1578 .cs-topper {
    color: var(--secondary);
  }
  #collection-1578 .cs-card-group {
    list-style: none;
    width: 100%;
    /* changes to 1280px on tablet */
    max-width: 34.375rem;
    margin: auto;
    padding: 0;
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: clamp(1rem, 3vw, 1.25rem);
  }
  #collection-1578 .cs-item {
    max-width: 100%;
    grid-column: span 12;
    position: relative;
  }
  #collection-1578 .cs-item:hover .cs-background img {
    opacity: 0.5;
    transform: scale(1.4);
  }
  #collection-1578 .cs-link {
    text-decoration: none;
    /* changes at tablet */
    height: 60vw;
    max-height: 21.75rem;
    padding: 2.5rem 1.5rem;
    /* prevents padding from affecting height and width */
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }
  #collection-1578 .cs-background {
    width: 100%;
    height: 100%;
    background-color: #000;
    overflow: hidden;
    position: absolute;
    top: 0;
    left: 0;
    /* set to -2 so the gradient overlay (z-index: -1) appears in front of the images, but behind the text */
    z-index: -2;
  }
  #collection-1578 .cs-background img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.6s, opacity 0.3s;
  }
  #collection-1578 .cs-category {
    font-size: 1.25rem;
    font-weight: 700;
    line-height: 4rem;
    text-align: center;
    text-decoration: none;
    width: 85%;
    /* 12px - 20px top & bottom, 16px - 24px sides*/
    padding: 0 clamp(1rem, 3vw, 1.5rem);
    color: var(--bodyTextColorWhite);
    position: relative;
    transition: color 0.3s;
    /* blurred background - done as a pseudo element so backdrop-filter won't distort the text */
  }
  #collection-1578 .cs-category:hover {
    color: var(--headerColor);
  }
  #collection-1578 .cs-category:hover:before {
    background-color: #ffffff;
  }
  #collection-1578 .cs-category:before {
    content: "";
    width: 100%;
    height: 100%;
    backdrop-filter: blur(8px);
    --webkit-backdrop-filter: blur(8px);
    background-color: rgba(255, 255, 255, 0.2);
    position: absolute;
    top: 0;
    left: 0;
    z-index: -1;
    transition: background-color 0.3s;
  }
}
/* Tablet - 768px */
@media only screen and (min-width: 48rem) {
  #collection-1578 .cs-container {
    flex-direction: row;
    justify-content: space-between;
    align-items: center;
  }
  #collection-1578 .cs-content {
    width: 30%;
    max-width: 19.0625rem;
    text-align: left;
    align-items: flex-start;
  }
  #collection-1578 .cs-card-group {
    max-width: 80rem;
  }
  #collection-1578 .cs-item {
    /* 180px - 348px */
    height: clamp(11.75rem, 25vw, 21.75rem);
    grid-column: span 4;
  }
}
</style>
</head>
<body>

<!-- ============================================ -->
<!--                  Collection                  -->
<!-- ============================================ -->

<section id="collection-1578">
    <div class="cs-container">
        <div class="cs-content">
            <span class="cs-topper">Categories</span>
            <h2 class="cs-title">Shop By Categories</h2>
        </div>
        <ul class="cs-card-group">
            <li class="cs-item">
                <a href="" class="cs-link">
                    <span class="cs-category">T-Shirts</span>
                    <picture class="cs-background" aria-hidden="true">
                        <source media="(max-width: 600px)"
                                srcset="https://csimages2.nyc3.digitaloceanspaces.com/Images/MISC/ecomm-offer-tshirts.jpg">
                        <source media="(min-width: 601px)"
                                srcset="https://csimages2.nyc3.digitaloceanspaces.com/Images/MISC/ecomm-offer-tshirts.jpg">
                        <img loading="lazy" decoding="async"
                                src="https://csimages2.nyc3.digitaloceanspaces.com/Images/MISC/ecomm-offer-tshirts.jpg"
                                width="365" height="201" alt="t-shirt">
                    </picture>
                </a>
            </li>
            <li class="cs-item">
                <a href="" class="cs-link">
                    <span class="cs-category">Bags</span>
                    <picture class="cs-background" aria-hidden="true">
                        <source media="(max-width: 600px)"
                                srcset="https://csimages2.nyc3.digitaloceanspaces.com/Images/MISC/ecomm-offer-bags.jpg">
                        <source media="(min-width: 601px)"
                                srcset="https://csimages2.nyc3.digitaloceanspaces.com/Images/MISC/ecomm-offer-bags.jpg">
                        <img loading="lazy" decoding="async"
                                src="https://csimages2.nyc3.digitaloceanspaces.com/Images/MISC/ecomm-offer-bags.jpg" width="365"
                                height="201" alt="purse">
                    </picture>
                </a>
            </li>
            <li class="cs-item">
                <a href="" class="cs-link">
                    <span class="cs-category">Shoes</span>
                    <picture class="cs-background" aria-hidden="true">
                        <source media="(max-width: 600px)"
                                srcset="https://csimages2.nyc3.digitaloceanspaces.com/Images/MISC/ecomm-offer-shoes.jpg">
                        <source media="(min-width: 601px)"
                                srcset="https://csimages2.nyc3.digitaloceanspaces.com/Images/MISC/ecomm-offer-shoes.jpg">
                        <img loading="lazy" decoding="async"
                                src="https://csimages2.nyc3.digitaloceanspaces.com/Images/MISC/ecomm-offer-shoes.jpg"
                                width="365" height="201" alt="shoes">
                    </picture>
                </a>
            </li>
        </ul>
    </div>
</section>

<script></script>
</body>
</html>
