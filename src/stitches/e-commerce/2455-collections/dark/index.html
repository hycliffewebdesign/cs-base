  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>

/* Mobile - 360px */
@media only screen and (min-width: 0rem) {

    text-align: center;

    display: flex;
    flex-direction: column;
    align-items: center;
  }

    max-width: 100%;
    margin: 0;
  }
  #collection-2455 .cs-wrapper {

    list-style: none;
    width: 100%;
    margin: 0;
    padding: 0;
    overflow: hidden;
  }
  #collection-2455 .cs-slideshow {
    display: flex;
    /* 16px - 20px */
    gap: clamp(1rem, 3vw, 1.25rem);
    transition: transform 0.5s ease-in-out;
  }
  #collection-2455 .cs-item {
    text-align: center;
    /* Each item is 1/3 of container minus gaps */
    width: calc((100% - (clamp(1rem, 3vw, 1.25rem) * 2)) / 3);
    flex-shrink: 0;
    position: relative;
  }
  #collection-2455 .cs-item:hover img {
    opacity: 0.6;
    transform: scale(1.2);
  }
  #collection-2455 .cs-link {
    text-decoration: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }
  #collection-2455 .cs-h3 {
    /* 20px - 24px */
    font-size: clamp(1.25rem, 3vw, 1.5rem);
    font-weight: 700;
    line-height: 1.2em;
    margin: 0;
    color: var(--headerColor);
  }
  #collection-2455 .cs-picture {

    display: block;
    position: relative;
    aspect-ratio: 1;
  }

  #collection-2455 .cs-button-group {

    display: flex;
    align-items: center;
    order: 2;
    gap: 1rem;
  }
  #collection-2455 .cs-button {
    width: 3rem;
    height: 3rem;
    padding: 0.75rem;

    cursor: pointer;
    border: 1px solid #cfd0d1;

  }
  #collection-2455 .cs-button:hover .cs-button-arrow {

  }

    width: 1.5rem;
    height: auto;

  }
}
/* Tablet - 768px */

  }
}

<script>class CollectionCarousel {
	constructor() {
		this.slideshow = document.querySelector("#collection-2455 .cs-slideshow");
		this.items = Array.from(document.querySelectorAll("#collection-2455 .cs-item"));
		this.prevButton = document.querySelector("#collection-2455 .cs-button:first-of-type");
		this.nextButton = document.querySelector("#collection-2455 .cs-button:last-of-type");

		this.currentIndex = 0;
		this.isMoving = false;

		this.desktopQuery = window.matchMedia("(min-width: 48rem)");

		this.init();
	}

	init() {
		this.prevButton?.addEventListener("click", () => this.moveSlide("prev"));
		this.nextButton?.addEventListener("click", () => this.moveSlide("next"));

		this.desktopQuery.addEventListener("change", () => {
			this.currentIndex = 0;
			this.updateSlidePosition(false);
		});
	}

	getItemsPerView() {
		return this.desktopQuery.matches ? 6 : 3;
	}

	moveSlide(direction) {
		if (this.isMoving) return;
		this.isMoving = true;

		const itemsPerView = this.getItemsPerView();
		const maxIndex = this.items.length - itemsPerView;

		if (direction === "next") {
			this.currentIndex++;
			if (this.currentIndex > maxIndex) {
				this.currentIndex = 0;
			}
		} else {
			this.currentIndex--;
			if (this.currentIndex < 0) {
				this.currentIndex = maxIndex;
			}
		}

		this.updateSlidePosition(true);

		setTimeout(() => {
			this.isMoving = false;
		}, 500);
	}

	updateSlidePosition(animate = true) {
		if (!this.slideshow || !this.items.length) return;

		const itemWidth = this.items[0].offsetWidth;
		const gap = parseFloat(getComputedStyle(this.slideshow).gap);
		const moveDistance = (itemWidth + gap) * this.currentIndex;

		this.slideshow.style.transform = `translateX(-${moveDistance}px)`;
	}
}

document.addEventListener("DOMContentLoaded", () => {
	new CollectionCarousel();
});</script>
