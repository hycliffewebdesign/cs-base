<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>promotional cta</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---         Promotions         -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #promotions-2456 {
    padding: var(--sectionPadding);
    overflow: hidden;
    position: relative;
    z-index: 1;
  }
  #promotions-2456 .cs-container {
    width: 100%;
    max-width: 44rem;
    margin: auto;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    /* 48px - 64px */
    gap: clamp(3rem, 6vw, 4rem);
  }
  #promotions-2456 .cs-content {
    text-align: center;
    width: 100%;
    display: contents;
    flex-direction: column;
    align-items: center;
  }
  #promotions-2456 .cs-topper {
    color: var(--secondary);
  }
  #promotions-2456 .cs-title {
    margin: 0;
  }
  #promotions-2456 .cs-button-solid {
    font-size: 1rem;
    font-weight: 700;
    /* 46px - 56px */
    line-height: clamp(2.875em, 5.5vw, 3.5em);
    text-align: center;
    text-decoration: none;
    min-width: 9.375rem;
    /* prevents padding from adding to the width */
    box-sizing: border-box;
    padding: 0 1.5rem;
    background-color: var(--primary);
    color: #fff;
    border-radius: 0.25rem;
    display: inline-block;
    order: 3;
    position: relative;
    z-index: 1;
  }
  #promotions-2456 .cs-button-solid:before {
    content: "";
    width: 0%;
    height: 100%;
    background: #000;
    opacity: 1;
    border-radius: 0.25rem;
    position: absolute;
    top: 0;
    left: 0;
    z-index: -1;
    transition: width 0.3s;
  }
  #promotions-2456 .cs-button-solid:hover:before {
    width: 100%;
  }
  #promotions-2456 .cs-image-group {
    /* scales donw the font size of the cursive text because the text is in ems, so a font size on the parent container will affect its size */
    font-size: min(1.94vw, 1rem);
    width: 100%;
    max-width: 53.4375rem;
    height: auto;
    display: flex;
    flex-direction: column;
    gap: clamp(1rem, 2vw, 1.25rem);
    position: relative;
    z-index: 1;
  }
  #promotions-2456 .cs-picture {
    width: 100%;
    height: 100vw;
    max-height: 28.125rem;
    display: block;
    position: relative;
  }
  #promotions-2456 .cs-picture img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    top: 0;
    left: 0;
  }
  #promotions-2456 .cs-seal {
    display: block;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
  #promotions-2456 .cs-badge {
    width: 12.125rem;
    height: 12.125rem;
    display: block;
  }
  #promotions-2456 .cs-info {
    text-align: center;
    text-transform: uppercase;
    width: 100%;
    max-width: 4.875rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: absolute;
    top: 52.5%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-15deg);
  }
  #promotions-2456 .cs-info:before {
    content: '';
    width: 6.25rem;
    height: 6.25rem;
    background: var(--secondary);
    border-radius: 50%;
    opacity: 1;
    display: block;
    position: absolute;
    top: 42%;
    left: 50%;
    z-index: -1;
    transform: translate(-50%, -50%);
  }
  #promotions-2456 .cs-desc {
    font-size: 0.875rem;
    line-height: 1.5em;
    font-weight: 700;
    color: var(--bodyTextColorWhite);
  }
  #promotions-2456 .cs-number {
    font-size: 2.4375rem;
    line-height: 1.2em;
    font-weight: 700;
    margin-top: -7px;
    color: var(--bodyTextColorWhite);
    display: block;
  }
  #promotions-2456 .cs-floater {
    /* swap with font family name or variable you create after downloading the font */
    font-family: "Great Vibes", cursive;
    white-space: nowrap;
    /* done in ems so the font size scaling on the parent can make it smaller on mobile and grow with the screen size */
    font-size: 8.875em;
    display: block;
    position: absolute;
    bottom: -2rem;
    left: 50%;
    z-index: 1;
    transform: translate(-50%, 0%) rotate(-12.54deg);
  }
  #promotions-2456 .cs-background {
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0;
    left: 0;
    z-index: -2;
  }
  #promotions-2456 .cs-background:before {
    content: "";
    width: 100%;
    height: 100%;
    background-color: #fff;
    opacity: 0.84;
    position: absolute;
    top: 0;
    left: 0;
    z-index: 1;
  }
  #promotions-2456 .cs-background img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
}
/* Tablet - 768px */
@media only screen and (min-width: 48rem) {
  #promotions-2456 .cs-image-group {
    font-size: min(1.6vw, 1rem);
    width: 53.4375em;
    min-height: 39.4375em;
  }
  #promotions-2456 .cs-picture {
    max-height: 100%;
    width: 49%;
    height: auto;
    position: absolute;
  }
  #promotions-2456 .cs-picture1 {
    top: 0;
    bottom: 5rem;
    left: 0;
  }
  #promotions-2456 .cs-picture2 {
    top: 5rem;
    right: 0;
    bottom: 0;
  }
  #promotions-2456 .cs-floater {
    bottom: 0;
  }
}
/* Desktop - 1024px */
@media only screen and (min-width: 64rem) {
  #promotions-2456 .cs-container {
    max-width: 80rem;
    flex-direction: row;
    align-items: stretch;
    justify-content: space-between;
  }
  #promotions-2456 .cs-content {
    text-align: left;
    padding: 6.5rem 0;
    max-width: 19.0625rem;
    display: flex;
    align-items: flex-start;
    align-self: center;
    gap: 2.5rem;
    flex: none;
  }
  #promotions-2456 .cs-image-group {
    height: auto;
    max-height: 100%;
    order: -1;
  }
}
</style>
</head>
