<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>featured products</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---         Featured           -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #featured-1551 {
    padding: var(--sectionPadding);
  }
  #featured-1551 .cs-container {
    width: 100%;
    /* changes to 1280px on tablet */
    max-width: calc(550 / 16 * 1rem);
    margin: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  #featured-1551 .cs-card-group {
    list-style: none;
    width: 100%;
    margin: auto;
    padding: 0;
    display: grid;
    grid-auto-flow: row;
  }
  #featured-1551 .cs-item {
    max-width: 100%;
    /* 240px - 348px */
    height: clamp(15rem, 34vw, 21.75rem);
    /* 16px - 40px */
    padding: clamp(1rem, 3vw, 2.5rem);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: flex-start;
    position: relative;
  }
  #featured-1551 .cs-item:hover .cs-picture img {
    opacity: 0.7;
    transform: scale(1.3);
  }
  #featured-1551 .cs-item::before {
    content: "";
    width: 100%;
    height: 100%;
    background: linear-gradient(180deg, rgba(0, 0, 0, 0) 41.52%, #000 87.93%);
    position: absolute;
    top: 0;
    left: 0;
    z-index: -1;
  }
  #featured-1551 .cs-offer-tag {
    font-size: calc(13 / 16 * 1rem);
    font-weight: 700;
    line-height: 1.2em;
    text-transform: uppercase;
    width: fit-content;
    padding: calc(4 / 16 * 1rem) calc(8 / 16 * 1rem);
    color: #f7f7f7;
    background-color: var(--primary);
  }
  #featured-1551 .cs-text-wrapper {
    margin: calc(8 / 16 * 1rem) 0 0;
    display: flex;
    flex-direction: column;
    gap: calc(4 / 16 * 1rem);
  }
  #featured-1551 .cs-h3 {
    /* 20px - 25px */
    font-size: clamp(1.25rem, 3vw, 1.5625rem);
    font-weight: 700;
    line-height: 1.2em;
    max-width: 20ch;
    margin: 0;
    color: #fff;
  }
  #featured-1551 .cs-item-text {
    font-size: calc(16 / 16 * 1rem);
    line-height: 1.5em;
    margin: 0;
    color: #f7f7f7;
  }
  #featured-1551 .cs-link {
    font-size: calc(16 / 16 * 1rem);
    font-weight: 700;
    line-height: 1.2em;
    /* 16px - 24px */
    margin-top: clamp(1rem, 3vw, 1.5rem);
    color: #fff;
    position: relative;
    z-index: 1;
    transition: color 0.3s;
  }
  #featured-1551 .cs-link:before {
    content: '';
    width: 0%;
    height: 1px;
    background-color: currentColor;
    opacity: 1;
    position: absolute;
    display: block;
    bottom: -3px;
    left: 0;
    transition: width 0.3s;
  }
  #featured-1551 .cs-link:hover {
    color: var(--primary);
  }
  #featured-1551 .cs-link:hover:before {
    width: 100%;
  }
  #featured-1551 .cs-background {
    width: 100%;
    height: 100%;
    background-color: #000;
    overflow: hidden;
    position: absolute;
    top: 0;
    left: 0;
    /* set to -2 so the gradient overlay (z-index: -1) appears in front of the images, but behind the text */
    z-index: -2;
  }
  #featured-1551 .cs-background img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: opacity 0.3s, transform 0.6s;
  }
  #featured-1551 .cs-item-offer {
    padding: calc(20 / 16 * 1rem);
    background-color: var(--primary);
  }
  #featured-1551 .cs-offer-wrapper {
    text-align: center;
    width: 100%;
    height: 100%;
    color: #fff;
    border: 1px dashed #fff;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: calc(24 / 16 * 1rem);
  }
  #featured-1551 .cs-logo {
    /* 162px - 246px */
    width: clamp(10.125rem, 24vw, 15.375rem);
    height: auto;
  }
  #featured-1551 .cs-offer-label {
    font-size: clamp(0.8125rem, 2vw, 1rem);
    font-weight: 700;
    line-height: 1.2em;
    text-transform: uppercase;
    margin: 0;
    color: var(--secondary);
  }
}
/* Tablet - 768px */
@media only screen and (min-width: 48rem) {
  #featured-1551 .cs-container {
    max-width: calc(1280 / 16 * 1rem);
  }
  #featured-1551 .cs-card-group {
    grid-template-columns: repeat(6, 1fr);
    grid-template-rows: repeat(2, 1fr);
  }
  #featured-1551 .cs-item {
    grid-column: span 2;
  }
  #featured-1551 .cs-item:nth-of-type(4),
  #featured-1551 .cs-item:nth-of-type(5) {
    grid-column: span 3;
  }
}
</style>
</head>
