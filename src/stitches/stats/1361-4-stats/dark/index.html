<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4 stats</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---           Stats            -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #stats-1361 {
    padding: var(--sectionPadding);
    /* 370px - 445px */
    padding-top: clamp(23.125rem, 30vw, 29.375rem);
    position: relative;
    z-index: 1;
  }
  #stats-1361 .cs-container {
    width: 100%;
    max-width: calc(1280 / 16 * 1rem);
    margin: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    /* 48px - 64px */
    gap: clamp(3rem, 6vw, 4rem);
  }
  #stats-1361 .cs-card-group {
    width: 100%;
    margin: 0;
    padding: 0;
    display: grid;
    grid-template-columns: repeat(12, 1fr);
  }
  #stats-1361 .cs-item {
    list-style: none;
    text-align: center;
    grid-column: span 12;
    display: flex;
    justify-content: center;
    align-items: stretch;
    flex-direction: column;
    gap: calc(16 / 16 * 1rem);
    position: relative;
  }
  #stats-1361 .cs-item:last-of-type:after {
    display: none;
  }
  #stats-1361 .cs-item:after {
    /* grey lines */
    content: "";
    width: 100%;
    height: 1px;
    margin: calc(24 / 16 * 1rem) 0;
    background: #484848;
    opacity: 1;
    position: relative;
    display: block;
  }
  #stats-1361 .cs-header {
    font-size: calc(16 / 16 * 1rem);
    line-height: 1.2em;
    font-weight: 700;
    margin: 0;
    color: #fff;
    display: block;
  }
  #stats-1361 .cs-number {
    /* 72px - 100px */
    font-size: clamp(4.5rem, 10vw, 6.25rem);
    line-height: 1em;
    font-weight: 300;
    margin: 0;
    color: var(--primary);
    display: block;
  }
  #stats-1361 .cs-background {
    width: 100%;
    height: 100%;
    display: block;
    position: absolute;
    top: 0;
    left: 0;
    z-index: -1;
  }
  #stats-1361 .cs-background:before {
    /* background color overlay */
    content: "";
    position: absolute;
    display: block;
    height: 100%;
    width: 100%;
    background: #1a1a1a;
    opacity: 0.72;
    top: 0;
    left: 0;
    z-index: 1;
  }
  #stats-1361 .cs-background img {
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    width: 100%;
    /* Makes img tag act as a background image */
    object-fit: cover;
  }
}
/* Tablet - 768px */
@media only screen and (min-width: 48rem) {
  #stats-1361 .cs-card-group {
    row-gap: calc(40 / 16 * 1rem);
  }
  #stats-1361 .cs-item {
    grid-column: span 6;
  }
  #stats-1361 .cs-item:nth-of-type(2):after {
    display: none;
  }
  #stats-1361 .cs-item:after {
    width: 1px;
    height: 100%;
    position: absolute;
    top: 0;
    right: 0;
  }
}
/* Small Desktop - 1024px */
@media only screen and (min-width: 64rem) {
  #stats-1361 {
    /* clips the lines on the cs-items so we can make them 100% the height of the section */
    overflow: hidden;
  }
  #stats-1361 .cs-item {
    grid-column: span 3;
  }
  #stats-1361 .cs-item:nth-of-type(2):after {
    display: block;
  }
  #stats-1361 .cs-item:after {
    /* make them really tall to cover the height of the section */
    height: 200vw;
    top: auto;
    /* send them below so the lines at least overflow the section container */
    bottom: calc(-300 / 16 * 1rem);
  }
}
/* Large Desktop 1600px - Parallax Effect */
@media only screen and (min-width: 100rem) {
  #stats-1361 .cs-background {
    background: url("https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/meeting6.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
  }
  #stats-1361 .cs-background img {
    display: none;
  }
}
</style>
</head>
<body>

<!-- ============================================ -->
<!--                   Stats                      -->
<!-- ============================================ -->

<section id="stats-1361">
    <div class="cs-container">
        <ul class="cs-card-group">
            <li class="cs-item">
                <span class="cs-header">Projects Completed</span>
                <span class="cs-number">886</span>
            </li>
            <li class="cs-item">
                <span class="cs-header">Satisfied Customers</span>
                <span class="cs-number">2K</span>
            </li>
            <li class="cs-item">
                <span class="cs-header">Repeat Customers</span>
                <span class="cs-number">475</span>
            </li>
            <li class="cs-item">
                <span class="cs-header">Professional Team</span>
                <span class="cs-number">37</span>
            </li>
        </ul>
    </div>
    <!--Background image, at 1600px we added the image in the css as a background image so we can create a parallax effect-->
    <picture class="cs-background">
        <!--Mobile Image-->
        <source media="(max-width: 600px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/meeting6-m.jpg">
        <!--Tablet and above Image-->
        <source media="(min-width: 601px)" srcset="https://csimages2.nyc3.digitaloceanspaces.com/Contact-Page/generic-map.jpghttps://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/meeting6.jpg">
        <img loading="lazy" decoding="async" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/meeting6.jpg" alt="meeting" width="1280" height="568">
    </picture>
</section>

<script></script>
</body>
</html>
