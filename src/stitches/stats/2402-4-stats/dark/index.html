<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4 stats</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---           Stats            -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #stats-2402 {
    padding: var(--sectionPadding);
    position: relative;
    z-index: 1;
  }
  #stats-2402 .cs-container {
    width: 100%;
    max-width: 80rem;
    margin: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    /* 48px - 64px */
    gap: clamp(3rem, 6vw, 4rem);
  }
  #stats-2402 .cs-card-group {
    width: 100%;
    margin: 0;
    padding: 0;
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    /* 16px - 20px */
    gap: clamp(1rem, 2.5vw, 1.25rem);
  }
  #stats-2402 .cs-item {
    list-style: none;
    text-align: left;
    /* 32px - 40px and 24 - 40px */
    padding: clamp(2rem, 4vw, 2.5rem) clamp(1.25rem, 4vw, 2.5rem);
    grid-column: span 12;
    display: flex;
    justify-content: flex-start;
    align-items: flex-start;
    flex-direction: column;
    position: relative;
  }
  #stats-2402 .cs-item:before {
    /* pseudo element for border */
    content: "";
    position: absolute;
    display: block;
    height: 100%;
    width: 100%;
    border: 1px solid var(--primary);
    border-radius: 0.75rem;
    opacity: 0.2;
    top: 0;
    left: 0;
    z-index: -1;
  }
  #stats-2402 .cs-item:after {
    content: "";
    position: absolute;
    height: 2.5rem;
    width: 0.375rem;
    background-color: var(--primary);
    border-radius: 0 0.5rem 0.5rem 0;
    top: 2.1875rem;
    left: 0;
  }
  #stats-2402 .cs-number {
    font-size: 2.4375rem;
    line-height: 1.2em;
    font-weight: 900;
    margin: 0 0 0.75rem 0;
    color: var(--headerColor);
    display: block;
  }
  #stats-2402 .cs-small {
    font-size: 1.5625rem;
  }
  #stats-2402 .cs-header {
    font-size: 1.25rem;
    line-height: 1.2em;
    font-weight: 900;
    margin-bottom: 0.25rem;
    color: var(--bodyTextColor);
  }
  #stats-2402 .cs-item-text {
    line-height: 1.5em;
    color: var(--bodyTextColor);
  }
}
/* Tablet - 700px */
@media only screen and (min-width: 700px) {
  #stats-2402 .cs-item {
    grid-column: span 6;
  }
}
/* Desktop - 1024px */
@media only screen and (min-width: 64rem) {
  #stats-2402 .cs-item {
    grid-column: span 3;
  }
}
</style>
</head>
<body>

<!-- ============================================ -->
<!--                   Stats                      -->
<!-- ============================================ -->        

<div id="stats-2402">
    <div class="cs-container">
        <ul class="cs-card-group">
            <li class="cs-item">
                <span class="cs-number">100<span class="cs-small">%</span></span>
                <span class="cs-header">Satisfaction Guaranteed</span>
                <span class="cs-item-text">We stand behind our work.</span>
            </li>
            <li class="cs-item">
                <span class="cs-number">100<span class="cs-small">%</span></span>
                <span class="cs-header">Eco-Friendly Products</span>
                <span class="cs-item-text">Safe for pets and the planet.</span>
            </li>
            <li class="cs-item">
                <span class="cs-number">20<span class="cs-small">+</span></span>
                <span class="cs-header">Years of Experience</span>
                <span class="cs-item-text">A decade of trusted service.</span>
            </li>
            <li class="cs-item">
                <span class="cs-number">5K<span class="cs-small">+</span></span>
                <span class="cs-header">Happy Clients</span>
                <span class="cs-item-text">Countless satisfied pet owners.</span>
            </li>
        </ul>
    </div>
</div>

<script></script>
</body>
</html>
