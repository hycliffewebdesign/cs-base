<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4 stats</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---         Services           -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #stats-1312 {
    padding: var(--sectionPadding);
    background-color: #f7f7f7;
  }
  #stats-1312 .cs-container {
    width: 100%;
    /* changes to 1920px at desktop */
    max-width: 25rem;
    margin: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    /* 48px - 64px */
    gap: clamp(3rem, 6vw, 4rem);
  }
  #stats-1312 .cs-content {
    width: 100%;
    display: flex;
    flex-direction: column;
    /* centers content horizontally, set to flex-start to left align */
    align-items: center;
    /* set text align to left if content needs to be left aligned */
    text-align: center;
  }
  #stats-1312 .cs-quote {
    /* 31px - 49px */
    font-size: clamp(1.9375rem, 5.1vw, 3.0625rem);
    line-height: 1.2em;
    font-weight: bold;
    margin: 0;
    margin-bottom: 1.5rem;
    color: #1a1a1a;
    text-align: inherit;
  }
  #stats-1312 .cs-name {
    /* 20px - 25px */
    font-size: clamp(1.25rem, 3.25vw, 1.5625rem);
    line-height: 1.2em;
    font-weight: 700;
    margin: 0;
    margin-bottom: 0.5rem;
    color: var(--primary);
    display: block;
    text-align: inherit;
  }
  #stats-1312 .cs-job {
    font-size: 1rem;
    line-height: 1.5em;
    margin: 0;
    color: var(--bodyTextColor);
    text-align: inherit;
  }
  #stats-1312 .cs-card-group {
    width: 100%;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    position: relative;
    row-gap: 4rem;
    /* horizontal line */
  }
  #stats-1312 .cs-card-group::after {
    content: "";
    width: 100%;
    height: 1px;
    background-color: #e8e8e8;
    position: absolute;
    top: 50%;
  }
  #stats-1312 .cs-flex-group {
    display: flex;
    flex-direction: row;
    justify-content: space-between;
    position: relative;
    /* vertical line */
  }
  #stats-1312 .cs-flex-group::before {
    content: "";
    width: 1px;
    height: 100%;
    background-color: #e8e8e8;
    position: absolute;
    right: 50%;
  }
  #stats-1312 .cs-item {
    /* as the child .cs-number is absolutely positioned, it won't contribute to the size of the box */
    /* we can set the height equal to the font-size which works around this */
    /* 100px - 120px */
    height: clamp(6.25rem, 11vw, 10rem);
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
  }
  #stats-1312 .cs-number {
    /* 100px - 120px */
    font-size: clamp(6.25rem, 11vw, 10rem);
    line-height: 1.2em;
    font-weight: 900;
    margin: 0;
    color: #e8e8e8;
    display: block;
  }
  #stats-1312 .cs-stat {
    /*20px - 25pxx */
    font-size: clamp(1.25rem, 1.8vw, 1.5625rem);
    line-height: 1.5em;
    font-weight: bold;
    margin: 1rem 0 0 0;
    color: var(--headerColor);
    display: block;
    position: absolute;
    z-index: 2;
  }
}
/* Tablet - 768px */
@media only screen and (min-width: 48rem) {
  #stats-1312 .cs-container {
    max-width: 120rem;
  }
  #stats-1312 .cs-card-group {
    flex-direction: row;
    /* turn horizontal line into vertical*/
  }
  #stats-1312 .cs-card-group::after {
    width: 1px;
    height: 100%;
    top: initial;
    right: 50%;
  }
  #stats-1312 .cs-flex-group {
    justify-content: space-around;
    flex: 1;
  }
}
/* Desktop - 1024px */
@media only screen and (min-width: 64rem) {
  #stats-1312 .cs-content {
    max-width: 53.125rem;
  }
}
</style>
</head>
<body>

<!-- ============================================ -->
<!--                    Stats                     -->
<!-- ============================================ -->

<section id="stats-1312">
    <div class="cs-container">
        <div class="cs-content">
            <p class="cs-quote">Creating long-term value with entrepreneurial intelligence! Our main goal is Growth.</p>
            <p class="cs-name">Piter Bowman</p>
            <p class="cs-job">Creative Director</p>
        </div>
        <ul class="cs-card-group">
            <div class="cs-flex-group">
                <div class="cs-item">
                    <p class="cs-number">15</p>
                    <p class="cs-stat">Offices</p>
                </div>
                <div class="cs-item">
                    <p class="cs-number">10</p>
                    <p class="cs-stat">Years</p>
                </div>
            </div>
            <div class="cs-flex-group">
                <div class="cs-item">
                    <p class="cs-number">65</p>
                    <p class="cs-stat">People</p>
                </div>
                <div class="cs-item">
                    <p class="cs-number">98</p>
                    <p class="cs-stat">Projects</p>
                </div>
            </div>
        </ul>
    </div>
</section>

<script></script>
</body>
</html>
