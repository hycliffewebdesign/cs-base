<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4 stats</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---           Stats            -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #stats-963 {
    padding: var(--sectionPadding);
    position: relative;
    z-index: 1;
  }
  #stats-963 .cs-container {
    width: 100%;
    max-width: calc(1280 / 16 * 1rem);
    margin: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-wrap: wrap;
    /* 48px - 100px */
    gap: clamp(3rem, 8vw, 6.25rem);
  }
  #stats-963 .cs-card-group {
    width: 100%;
    /* changes to 100% at large desktop */
    max-width: calc(624 / 16 * 1rem);
    padding: 0;
    margin: 0;
    display: flex;
    justify-content: space-around;
    flex-wrap: wrap;
    align-items: center;
    row-gap: calc(30 / 16 * 1rem);
    position: relative;
  }
  #stats-963 .cs-card-group:before {
    /* long center line */
    content: "";
    width: 100%;
    height: 1px;
    background: var(--primary);
    opacity: 0.4;
    position: absolute;
    display: block;
    top: 50%;
    left: 0;
    transform: translateY(-50%);
  }
  #stats-963 .cs-item {
    text-align: center;
    list-style: none;
    width: 50%;
    display: block;
    position: relative;
  }
  #stats-963 .cs-item:nth-of-type(odd) {
    /* short vertical loines */
  }
  #stats-963 .cs-item:nth-of-type(odd):before {
    content: "";
    width: 1px;
    height: calc(80 / 16 * 1rem);
    background: var(--primary);
    opacity: 0.4;
    position: absolute;
    display: block;
    top: 50%;
    right: 0;
    transform: translateY(-50%);
  }
  #stats-963 .cs-number {
    /* 64px - 120px */
    font-size: clamp(4rem, 16vw, 7.5rem);
    font-weight: 900;
    line-height: 1.2em;
    -webkit-text-stroke: 2px var(--primary);
    -webkit-text-fill-color: transparent;
    margin: 0;
    color: var(--bodyTextColorWhite);
    display: block;
  }
  #stats-963 .cs-desc {
    /* 13px -25px */
    font-size: clamp(0.8125rem, 3.5vw, 1.5625rem);
    line-height: 1.2em;
    text-transform: uppercase;
    font-weight: 700;
    margin: 0;
    color: var(--bodyTextColorWhite);
  }
  #stats-963 .cs-picture {
    width: 100%;
    /* 328px - 640px */
    height: clamp(20.5rem, 45vw, 38.75rem);
    display: block;
    position: relative;
  }
  #stats-963 .cs-picture img {
    height: 100%;
    width: 100%;
    position: absolute;
    top: 0;
    left: 0;
    object-fit: cover;
  }
  #stats-963 .cs-background {
    position: absolute;
    display: block;
    top: 0;
    left: 0;
    width: 100%;
    height: 80%;
    z-index: -1;
  }
  #stats-963 .cs-background img {
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    width: 100%;
    object-fit: cover;
  }
}
/* Large Desktop - 1300px */
@media only screen and (min-width: 81.25rem) {
  #stats-963 .cs-card-group {
    max-width: 100%;
    flex-wrap: nowrap;
  }
  #stats-963 .cs-card-group:before {
    display: none;
  }
  #stats-963 .cs-card-group .cs-item {
    /* short vertical loines */
  }
  #stats-963 .cs-card-group .cs-item:last-of-type:before {
    display: none;
  }
  #stats-963 .cs-card-group .cs-item:before {
    content: "";
    width: 1px;
    height: calc(80 / 16 * 1rem);
    background: var(--primary);
    opacity: 0.4;
    position: absolute;
    display: block;
    top: 50%;
    right: 0;
    transform: translateY(-50%);
  }
}
/* Big Desktop Parallax Effect - 1500px */
@media only screen and (min-width: 93.75rem) {
  #stats-963 .cs-background {
    background: url("https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/MISC/marble.jpg");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
  }
  #stats-963 .cs-background img {
    display: none;
  }
}
</style>
</head>
<body>

<!-- ============================================ -->
<!--                   Stats                      -->
<!-- ============================================ -->

<section id="stats-963">
    <div class="cs-container">
        <ul class="cs-card-group">
            <li class="cs-item">
                <span class="cs-number">100</span>
                <span class="cs-desc">Natural Styles</span>
            </li>
            <li class="cs-item">
                <span class="cs-number">25+</span>
                <span class="cs-desc">Products</span>
            </li>
            <li class="cs-item">
                <span class="cs-number">5K+</span>
                <span class="cs-desc">Clients</span>
            </li>
            <li class="cs-item">
                <span class="cs-number">15</span>
                <span class="cs-desc">Color Shades</span>
            </li>
        </ul>
        <picture class="cs-picture">
            <source media="(max-width: 600px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/MISC/salon3-m.jpg">
            <source media="(min-width: 601px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/MISC/salon3.jpg">
            <img loading="lazy" decoding="async" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/MISC/salon3.jpg" alt="brick Wall" width="1920" height="1282" aria-hidden="true">
        </picture>
    </div>
    <!--Background Image-->
    <picture class="cs-background">
        <source media="(max-width: 600px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/MISC/marble-m.jpg">
        <source media="(min-width: 601px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/MISC/marble.jpg">
        <img loading="lazy" decoding="async" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/MISC/marble.jpg" alt="brick Wall" width="1920" height="1282" aria-hidden="true">
    </picture>
</section>

<script></script>
</body>
</html>
