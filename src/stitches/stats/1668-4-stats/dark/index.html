<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4 stats</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---           Stats            -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #stats-1668 {
    padding: var(--sectionPadding);
    position: relative;
    z-index: 1;
  }
  #stats-1668 .cs-container {
    width: 100%;
    max-width: 80rem;
    margin: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    /* 48px - 64px */
    gap: clamp(3rem, 6vw, 4rem);
  }
  #stats-1668 .cs-card-group {
    width: 100%;
    margin: 0;
    padding: 0rem;
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 0.5rem;
  }
  #stats-1668 .cs-item {
    list-style: none;
    text-align: left;
    /* 20px - 40px */
    padding: clamp(1.25rem, 2vw, 2.5rem) 1rem;
    grid-column: span 6;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    flex-direction: column;
    gap: 1rem;
    position: relative;
  }
  #stats-1668 .cs-item:after {
    /* grey lines */
    content: "";
    width: 1px;
    height: 100%;
    top: 0;
    right: 0;
    margin: 0;
    background: #e8e8e8;
    opacity: 1;
    position: absolute;
    display: block;
  }
  #stats-1668 .cs-item:nth-of-type(2):after {
    display: none;
  }
  #stats-1668 .cs-item:last-of-type:after {
    display: none;
  }
  #stats-1668 .cs-header {
    font-size: 1rem;
    line-height: 1.2em;
    font-weight: 700;
    margin: 0;
    color: var(--primary);
    display: block;
  }
  #stats-1668 .cs-number {
    /* 60px - 400px */
    font-size: clamp(3.75rem, 9.8vw, 6.25rem);
    line-height: 1em;
    font-weight: 300;
    margin: 0;
    color: var(--headerColor);
    display: block;
  }
}
/* Tablet - 768px */
@media only screen and (min-width: 48rem) {
  #stats-1668 .cs-card-group {
    display: flex;
    justify-content: space-between;
  }
  #stats-1668 .cs-item {
    width: 100%;
    max-width: 16.25rem;
    padding-left: 0;
  }
  #stats-1668 .cs-item:nth-of-type(1) {
    padding-left: 0;
  }
  #stats-1668 .cs-item:nth-of-type(2):after {
    display: block;
  }
}
</style>
</head>
<body>

<!-- ============================================ -->
<!--                   Stats                      -->
<!-- ============================================ -->

<section id="stats-1668">
    <div class="cs-container">
        <ul class="cs-card-group">
            <li class="cs-item">
                <span class="cs-header">Projects Completed</span>
                <span class="cs-number">886</span>
            </li>
            <li class="cs-item">
                <span class="cs-header">Satisfied Customers</span>
                <span class="cs-number">2k</span>
            </li>
            <li class="cs-item">
                <span class="cs-header">Repeat Customers</span>
                <span class="cs-number">475</span>
            </li>
            <li class="cs-item">
                <span class="cs-header">Professional Team</span>
                <span class="cs-number">37</span>
            </li>
        </ul>
    </div>
</section>

<script></script>
</body>
</html>
