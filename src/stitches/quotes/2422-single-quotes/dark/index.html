<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>single quotes</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<!--           Quote            -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #quote-2422 {
    padding: var(--sectionPadding);
    /* padding-top resets at 768px */
    padding-top: 30rem;
    position: relative;
    overflow: hidden;
  }
  #quote-2422 .cs-container {
    max-width: 80rem;
    margin: 0 auto;
  }
  #quote-2422 .cs-card {
    text-align: center;
    width: 100%;
    margin: 0;
    margin-right: auto;
    /* 24px - 40px */
    padding: clamp(1rem, 4.8vw, 2.5rem);
    padding-top: clamp(5rem, 8.8vw, 6.25rem);
    background-color: #fff;
    border-radius: 1rem;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: flex-start;
    position: relative;
    z-index: 1;
  }
  #quote-2422 .cs-card:before {
    /* background color */
    content: '';
    width: 100%;
    height: 100%;
    background-color: var(--primary);
    border-radius: 1rem;
    opacity: 0.05;
    display: block;
    position: absolute;
    top: 0;
    left: 0;
    z-index: -1;
  }
  #quote-2422 .cs-title {
    margin-bottom: 3rem;
  }
  #quote-2422 .cs-blockquote {
    width: 100%;
    margin: 0;
  }
  #quote-2422 .cs-quote {
    /* blockquote */
    font-size: 1.25rem;
    line-height: 1.5em;
    margin: 0 0 1rem;
    color: var(--bodyTextColor);
    z-index: 1;
  }
  #quote-2422 .cs-info {
    /* figcaption */
    width: 100%;
    gap: 0.75rem;
    position: relative;
  }
  #quote-2422 .cs-name {
    font-size: 1.25rem;
    line-height: 1.5rem;
    font-weight: 700;
    margin: 0;
  }
  #quote-2422 .cs-desc {
    font-size: 1rem;
    font-weight: 400;
    line-height: 1.5rem;
    margin-top: 4px;
    color: var(--bodyTextColor);
    display: block;
  }
  #quote-2422 .cs-wrapper {
    width: 7.5rem;
    height: 7.5rem;
    margin: 0 auto;
    background-color: #fff;
    overflow: hidden;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    position: absolute;
    top: -3.75rem;
    right: 0;
    left: 0;
    z-index: -1;
  }
  #quote-2422 .cs-wrapper:before {
    content: '';
    width: 100%;
    height: 100%;
    background: var(--primary);
    opacity: 0.2;
    display: block;
    position: absolute;
    top: 0;
    left: 0;
  }
  #quote-2422 .cs-background {
    width: 100%;
    height: 100%;
    display: block;
    position: absolute;
    top: 0;
    left: 0;
    z-index: -1;
  }
  #quote-2422 .cs-background img {
    width: 100%;
    height: 100%;
    /* makes image act as a background image */
    object-fit: cover;
    object-position: center;
  }
}
/* Tablet - 768px */
@media only screen and (min-width: 48rem) {
  #quote-2422 {
    /* resetting top padding */
    padding-top: clamp(7.5rem, 10vw, 11.25rem);
  }
  #quote-2422 .cs-card {
    width: 62%;
    max-width: 34.5rem;
  }
}
</style>
</head>
<body>

<!-- ============================================ -->
<!--                    Quote                     -->
<!-- ============================================ -->

<section id="quote-2422">
    <div class="cs-container">
        <figure class="cs-card">
            <blockquote class="cs-blockquote">   
                <p class="cs-quote">
                    A clean yard isn’t just about appearances; it’s about creating a safe, healthy space where pets can play freely and families can relax with peace of mind. That’s why we take pride in every cleanup—because happy yards make happy homes. 
                </p>
            </blockquote>
            <figcaption class="cs-info">
                <span class="cs-name">
                    Jordan Lee
                    <span class="cs-desc">Founder of Poop Patrol</span>
                </span>
            </figcaption>
            <div class="cs-wrapper">
                <img src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Graphics/Quote5.svg" alt="icon" width="65" height="52" loading="lazy" aria-hidden="true" decoding="async">
            </div>
        </figure>
    </div>
    <picture class="cs-background">
        <source media="(min-width: 1300px)" srcset="https://nyc3.digitaloceanspaces.com/csimages2/Images/People/quotebg-pet-services-1800x1348.jpg">
        <source media="(min-width: 768px) and (max-width: 1299px)"  srcset="https://nyc3.digitaloceanspaces.com/csimages2/Images/People/quotebg-pet-services-1577x1348.jpg">
        <source media="(max-width: 767px)" srcset="https://nyc3.digitaloceanspaces.com/csimages2/Images/People/quotebg-pet-services-948x948.jpg">
        <img loading="lazy" decoding="async" src="https://nyc3.digitaloceanspaces.com/csimages2/Images/People/quotebg-pet-services-1800x1348.jpg" alt="" width="1800" height="1348">
    </picture>
</section>

<script></script>
</body>
</html>
