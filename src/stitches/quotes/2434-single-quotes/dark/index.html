<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>single quotes</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---            Quote           -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #quote-2434 {
    padding: var(--sectionPadding);
    position: relative;
    overflow: hidden;
  }
  #quote-2434 .cs-container {
    width: 100%;
    max-width: 80rem;
    margin: auto;
    display: flex;
    flex-direction: column;
  }
  #quote-2434 .cs-content {
    text-align: left;
    width: 100%;
    max-width: 39.375rem;
    padding-top: 11.25rem;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }
  #quote-2434 .cs-title {
    /* 31px - 39px */
    font-size: clamp(1.9375rem, 3.9vw, 2.4375rem);
    font-style: italic;
    /* 16px - 48px */
    margin: 0 0 clamp(1rem, 6vw, 3rem);
    color: var(--bodyTextColorWhite);
  }
  #quote-2434 .cs-quote {
    /* 118px - 200px */
    width: clamp(7.375rem, 20vw, 12.5rem);
    height: auto;
    /* 48px - 160px */
    margin-bottom: clamp(3rem, 13vw, 10rem);
    display: block;
    position: relative;
  }
  #quote-2434 .cs-name {
    /* 20px - 25px */
    font-size: clamp(1.25rem, 3vw, 1.5625rem);
    line-height: 1.2em;
    font-weight: 700;
    color: var(--primary);
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
  }
  #quote-2434 .cs-desc {
    font-size: 1rem;
    line-height: 1.5em;
    font-weight: 400;
    color: var(--bodyTextColorWhite);
  }
  #quote-2434 .cs-background {
    width: 100%;
    height: 100%;
    display: block;
    position: absolute;
    top: 0;
    left: 0;
    z-index: -1;
  }
  #quote-2434 .cs-background:before {
    /* background color overlay */
    content: "";
    width: 100%;
    height: 80%;
    background: linear-gradient(to bottom, rgba(3, 7, 17, 0) 0%, rgba(3, 7, 17, 0.84) 21%, #030711 79%);
    display: block;
    position: absolute;
    bottom: 0;
    right: 0;
    z-index: 1;
  }
  #quote-2434 .cs-background video,
  #quote-2434 .cs-background img {
    width: 100%;
    height: 100%;
    /* Makes img tag act as a background image */
    object-fit: cover;
    position: absolute;
    top: 0;
    left: 0;
  }
  #quote-2434 .cs-floater {
    width: 9.5rem;
    height: auto;
    display: block;
    position: absolute;
    left: 92vw;
    top: 50%;
    margin-top: -14.5rem;
  }
}
/* Tablet - 768px */
@media only screen and (min-width: 48rem) {
  #quote-2434 .cs-container {
    align-items: flex-end;
  }
  #quote-2434 .cs-content {
    width: 40vw;
    padding-top: 0;
  }
  #quote-2434 .cs-background:before {
    width: 65%;
    height: 100%;
    background: linear-gradient(to right, rgba(3, 7, 17, 0) 0%, rgba(3, 7, 17, 0.84) 13%, #030711 100%);
  }
}
</style>
</head>
<body>

<!-- ============================================ -->
<!--                     Quote                    -->
<!-- ============================================ -->

<section id="quote-2434">
	<div class="cs-container">
		<div class="cs-content">
			<img src="https://nyc3.digitaloceanspaces.com/csimages2/Images/Graphics/quote-outline.svg" class="cs-quote" alt="icon" width="200" height="200" loading="lazy" aria-hidden="true" decoding="async" />
			<h2 class="cs-title">To wear art is to carry spirit. To paint the body is to honor the soul.</h2>
			<span class="cs-name">
				Michelle Delio
				<span class="cs-desc">CEO of ArtiStitch</span>
			</span>
		</div>
	</div>
	<!-- You can remove the picture tag and uncomment the video tag to use a video instead of a tag. Compress your video and upload it to a CDN like Digital Oceans Spaces so the video file doesn't cause load time issues.-->
	<picture class="cs-background">
		<source media="(max-width: 600px)" srcset="https://nyc3.digitaloceanspaces.com/csimages2/Videos/face-paint.jpg" />
		<source media="(min-width: 601px)" srcset="https://nyc3.digitaloceanspaces.com/csimages2/Videos/face-paint.jpg" />
		<img loading="lazy" decoding="async" src="https://nyc3.digitaloceanspaces.com/csimages2/Videos/face-paint.jpg" alt="face painting" width="1920" height="768" aria-hidden="true" />
		<!-- <video loading="lazy" src="https://nyc3.digitaloceanspaces.com/csimages2/Videos/face-paint.mp4" muted autoplay loop></video> -->
	</picture>
	<!-- Graphic -->
	<img class="cs-floater" src="https://nyc3.digitaloceanspaces.com/csimages2/Icons/tattoo.svg" alt="tattoo decal" aria-hidden="true" decoding="async" loading="lazy" width="152" height="513" />
</section>

<script></script>
</body>
</html>
