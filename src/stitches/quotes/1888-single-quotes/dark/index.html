<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>single quotes</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<!--           Quote            -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #quote-1888 {
    padding: var(--sectionPadding);
    /* 340px - 660px */
    padding-top: clamp(21.25rem, 49vw, 41.25rem);
    background-color: #FAF6F2;
    overflow-x: clip;
    position: relative;
  }
  #quote-1888 .cs-container {
    width: 100%;
    /* changes to 1280px at desktop */
    max-width: 44rem;
    margin: auto;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }
  #quote-1888 .cs-item {
    width: 100%;
    /* prevents padding from adding to height and width */
    box-sizing: border-box;
    /* 32px - 80px top & bottom */
    /* 24px - 80px left & right */
    padding: clamp(2rem, 6vw, 5rem) clamp(1.5rem, 6vw, 5rem);
    background-color: #FFFFFF;
    border-radius: 2.5rem;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    /* 32px - 40px */
    gap: clamp(2rem, 4vw, 2.5rem);
    position: relative;
    z-index: 1;
  }
  #quote-1888 .cs-review {
    /* 31px - 39px */
    font-size: clamp(1.9375rem, 4vw, 2.4375rem);
    font-weight: 900;
    line-height: 1.2em;
    margin: 0;
    color: var(--headerColor);
    z-index: 1;
  }
  #quote-1888 .cs-flex-group {
    /* this margin top auto will push everything up and force the cs-flex-group to the bottom of the container. This is to account for review cards with different heights because of more or less text and makes the cards more responsive to changing text */
    margin-top: auto;
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
  }
  #quote-1888 .cs-profile {
    width: 3.25rem;
    height: auto;
    border-radius: 50%;
    display: block;
    position: relative;
  }
  #quote-1888 .cs-profile img {
    width: 100%;
    height: 100%;
    /* makes the image behave like a background image */
    object-fit: cover;
    position: absolute;
    top: 0;
    left: 0;
  }
  #quote-1888 .cs-name {
    /* 20px - 25px */
    font-size: clamp(1.25rem, 2.5vw, 1.5625rem);
    font-weight: 700;
    line-height: 1.2em;
    margin: 0;
    /* in case one card has more text than the other, this pushes up against the review text so the name and title are always at the bottom. Only works if parent is a flexbox */
    margin-top: auto;
    color: var(--secondary);
    display: block;
  }
  #quote-1888 .cs-job {
    font-size: 1rem;
    font-weight: 400;
    line-height: 1.5em;
    margin: 0;
    color: var(--bodyTextColor);
    display: block;
  }
  #quote-1888 .cs-quote {
    width: 5.375rem;
    height: auto;
    position: absolute;
    right: 0rem;
    bottom: 7.25rem;
    z-index: -1;
  }
  #quote-1888 .cs-video-wrapper {
    width: 100%;
    height: 45%;
    min-height: 26.25rem;
    display: block;
    position: absolute;
    top: 0;
    left: 0;
  }
  #quote-1888 .cs-video-wrapper:hover {
    cursor: pointer;
  }
  #quote-1888 .cs-video-wrapper:hover .cs-play {
    transform: translate(-50%, -50%) scale(1.2);
  }
  #quote-1888 .cs-video-wrapper video,
  #quote-1888 .cs-video-wrapper .cs-picture {
    width: 100%;
    height: 100%;
    /* makes image act as a background image */
    object-fit: cover;
    position: absolute;
    top: 0;
    left: 0;
  }
  #quote-1888 .cs-video-wrapper video img,
  #quote-1888 .cs-video-wrapper .cs-picture img {
    width: 100%;
    height: 100%;
    /* makes image act as a background image */
    object-fit: cover;
    position: absolute;
    top: 0;
    left: 0;
  }
  #quote-1888 .cs-play {
    /* 100px - 140px */
    width: clamp(6.25rem, 19vw, 8.75rem);
    /* 100px - 140px */
    height: clamp(6.25rem, 19vw, 8.75rem);
    background-color: rgba(255, 255, 255, 0.2);
    pointer-events: none;
    border: none;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    transition: transform 0.3s, opacity 0.3s;
    backdrop-filter: blur(8px);
  }
  #quote-1888 .cs-play.cs-hide {
    opacity: 0;
    transform: translate(-50%, -50%) scale(0) !important;
  }
}
/* Tablet - 768px */
@media only screen and (min-width: 48rem) {
  #quote-1888 .cs-container {
    max-width: 80rem;
  }
  #quote-1888 .cs-quote {
    /* 64px - 80px */
    right: clamp(4rem, 8vw, 5rem);
    /* 64px - 80px */
    bottom: clamp(4rem, 8vw, 5rem);
  }
  #quote-1888 .cs-video-wrapper {
    height: clamp(56.7%, 60vw, 65%);
  }
}
</style>
</head>
<body>

<!-- ============================================ -->
<!--                    Quote                     -->
<!-- ============================================ -->

<section id="quote-1888">
    <div class="cs-container">
        <div class="cs-item">
            <p class="cs-review">
            We’ll start small then build, giving your body a to really what you’re doing,” says Sylvia. “Each class will be exciting, always moving you forward.
            </p>
            <div class="cs-flex-group">
                <picture class="cs-picture">
                    <img class="cs-profile" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/MISC/ecomm-headshot1.jpeg" decoding="async" alt="profile" width="52" height="52" aria-hidden="true" loading="lazy">
                </picture>
                <span class="cs-name">
                    Preeti Paul
                    <span class="cs-job">Software Engineer at Google</span>
                </span>
            </div>
            <!--Quote Icon-->
            <img class="cs-quote" aria-hidden="true" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Graphics/beige-quote.svg" decoding="async" alt="quote icon" width="86" height="72">
        </div>
    </div>
    <div class="cs-video-wrapper">
        <!--Compress your video and upload it to a CDN like Digital Oceans Spaces so the video file doesn't cause load time issues. You can also remove the video tag and uncomment the picture tag to use a image instead of a video. Don't forget to remove the cs-play button!-->
        <video loading="lazy" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Videos/skincare.mp4" muted loop></video>
        <button class="cs-play" aria-label="click to play video">
            <img src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Icons/play-right.svg" alt="play icon" class="cs-icon" width="24" height="24" aria-hidden="true" decoding="async">
        </button>
    </div>
</section>

<script>function togglePlayButton() {
    // Select all elements with the .cs-picture class
    const pictures = document.querySelectorAll('#quote-1888.cs-video-wrapper');
  
    // Add a click event listener to each .cs-picture element
    pictures.forEach(picture => {
      picture.addEventListener('click', () => {
        // Select all elements with the .cs-play class
        const playButtons = document.querySelectorAll('#quote-1888 .cs-play');
        
        // Toggle the .cs-hide class on each .cs-play element
        playButtons.forEach(button => {
          button.classList.toggle('cs-hide');
        });
      });
    });
  }
  
  // Call the function to activate the event listeners
  togglePlayButton();
  
  function toggleVideoPlayback() {
    // Select the video element
    const video = document.querySelector('#quote-1888 video');
  
    // Add a click event listener to the video
    video.addEventListener('click', () => {
      // Check if the video is paused
      if (video.paused) {
        video.play(); // Play the video if it is paused
      } else {
        video.pause(); // Pause the video if it is playing
      }
    });
  }
  
  // Call the function to activate the event listener
  toggleVideoPlayback();</script>
</body>
</html>
