<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>single quotes</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---            Quote           -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #quote-2138 {
    padding: var(--sectionPadding);
    padding-bottom: 0;
    /* clips anything overflowing */
    overflow: hidden;
    position: relative;
    z-index: 1;
  }
  #quote-2138 .cs-container {
    width: 100%;
    /* changes to 1280px at tablet */
    max-width: 44rem;
    margin: auto;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    /* 48px - 64px */
    gap: clamp(3rem, 6vw, 4rem);
  }
  #quote-2138 .cs-image-group {
    /* scales the whole section down and ties the font size to the vw and stops at 75% of the vale of 1em, changes at desktop */
    font-size: min(2.3vw, .75rem);
    /* everything inside this box is in ems so we can scale it all down proportionally with a font size */
    width: 39.375em;
    height: 47.3125em;
    order: 2;
    position: relative;
    z-index: 1;
  }
  #quote-2138 .cs-picture {
    width: 33.8125em;
    height: 47.3125em;
    display: block;
    position: absolute;
    right: 0;
    bottom: 0;
    transform: rotateY(180deg);
  }
  #quote-2138 .cs-picture img {
    width: auto;
    height: 100%;
    object-fit: contain;
  }
  #quote-2138 .cs-wheel {
    width: 35.75em;
    height: 35.75em;
    object-fit: cover;
    position: absolute;
    top: 3.4375em;
    left: 0;
    z-index: -2;
  }
  #quote-2138 .cs-content {
    /* set text align to center if content needs to be centered */
    text-align: center;
    width: 100%;
    max-width: 36.625rem;
    display: flex;
    flex-direction: column;
    /* left aligns content, set to center to align content horizontally */
    align-items: center;
    /* 32px - 64px */
    gap: clamp(2rem, 4vw, 4rem);
    position: relative;
  }
  #quote-2138 .cs-review {
    /* 25px - 49px */
    font-size: clamp(1.5625rem, 3.8vw, 3.0625rem);
    font-weight: 900;
    line-height: 1.2em;
    margin: 0;
    color: var(--headerColor);
  }
  #quote-2138 .cs-flex-group {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  #quote-2138 .cs-name {
    /* 20px - 25px */
    font-size: clamp(1.25rem, 2.5vw, 1.5625rem);
    font-weight: 700;
    line-height: 1.2em;
    color: var(--secondary);
  }
  #quote-2138 .cs-job {
    font-size: 1rem;
    font-weight: 400;
    line-height: 1.5em;
    color: var(--bodyTextColor);
  }
  #quote-2138 .cs-quote1 {
    width: 6.125rem;
    height: auto;
    display: block;
    position: absolute;
    top: -2rem;
    z-index: -1;
  }
  #quote-2138 .cs-quote2 {
    width: 10.0625rem;
    height: auto;
    display: none;
    position: absolute;
    right: 2.5rem;
    bottom: 0;
    z-index: -1;
  }
}
/* Tablet - 768px */
@media only screen and (min-width: 48rem) {
  #quote-2138 .cs-container {
    max-width: 80rem;
  }
  #quote-2138 .cs-image-group {
    /* set to inherit at Large Desktop */
    font-size: min(1.4vw, .7rem);
  }
  #quote-2138 .cs-picture {
    right: 0;
  }
  #quote-2138 .cs-wheel {
    top: 4.5em;
    left: 0;
  }
}
/* Desktop - 1024px */
@media only screen and (min-width: 64rem) {
  #quote-2138 {
    padding: var(--sectionPadding);
  }
  #quote-2138 .cs-container {
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
  }
  #quote-2138 .cs-image-group {
    margin-top: auto;
    order: -1;
    position: relative;
    bottom: calc(clamp(3.75rem, 7.82vw, 6.25rem)*-1);
  }
  #quote-2138 .cs-content {
    text-align: left;
    width: 50%;
    align-items: flex-start;
  }
  #quote-2138 .cs-review {
    max-width: 23ch;
  }
  #quote-2138 .cs-quote1 {
    display: none;
  }
  #quote-2138 .cs-quote2 {
    display: block;
  }
}
/* Large Desktop - 1440px */
@media only screen and (min-width: 90rem) {
  #quote-2138 .cs-container {
    align-items: center;
  }
  #quote-2138 .cs-image-group {
    font-size: inherit;
  }
  #quote-2138 .cs-quote2 {
    width: 13.875rem;
    right: 5rem;
  }
}
</style>
</head>
<body>

<!-- ============================================ -->
<!--                    Quote                     -->
<!-- ============================================ -->

<section id="quote-2138">
    <div class="cs-container">
        <div class="cs-image-group">
            <!--Main Image-->
            <picture class="cs-picture">
                <!--Mobile Image-->
                <source media="(max-width: 600px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/bride.png">
                <!--Tablet and above Image-->
                <source media="(min-width: 601px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/bride.png">
                <img loading="lazy" decoding="async" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/bride.png" alt="wedding bride" width="525" height="757">
            </picture>
            <!--Color Wheel-->
            <img class="cs-wheel" loading="lazy" decoding="async" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Graphics/color-wheel.png" alt="color wheel" width="572" height="572" aria-hidden="true">
        </div>
        <div class="cs-content">
            <p class="cs-review">
                "We're not just photographers, we're dream weavers, transforming your visions into tangible memories you'll cherish forever."
                </p>
            <div class="cs-flex-group">
                <span class="cs-name">
                    Elisa Morgan
                </span>
                <span class="cs-job">
                    CEO of Stitchography
                </span>
            </div>
            <img class="cs-quote1" loading="lazy" decoding="async" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Graphics/beige-quote.svg" alt="quote" width="98" height="82" aria-hidden="true">
        </div>
    </div>
    <!--Background Quote-->
    <img class="cs-quote2" loading="lazy" decoding="async" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Graphics/beige-quote.svg" alt="quote" width="222" height="186" aria-hidden="true">
</section>

<script></script>
</body>
</html>
