<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>single quotes</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---           Quote            -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #quote-1688 {
    padding: var(--sectionPadding);
    position: relative;
    z-index: 1;
  }
  #quote-1688 .cs-container {
    width: 100%;
    max-width: calc(1720 / 16 * 1rem);
    /* 463px - 700px */
    height: clamp(28.9375rem, 50vw, 43.75rem);
    margin: auto;
    box-sizing: border-box;
    /* 24px - 40px */
    padding: clamp(1.5rem, 3vw, 2.5rem);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    position: relative;
  }
  #quote-1688 .cs-content {
    /* set text align to center if content needs to be centrally aligned */
    text-align: left;
    width: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    /* aligns content to the left, set to center to centrally align */
    align-items: flex-start;
    /* 16px - 48px */
    gap: clamp(1rem, 4vw, 3rem);
  }
  #quote-1688 .cs-icon {
    /* 80px - 120px */
    width: clamp(5rem, 9vw, 7.5rem);
    /* 66px - 99px */
    height: clamp(4.125rem, 8vw, 6.1875rem);
  }
  #quote-1688 .cs-quote {
    /* 16px - 25px */
    font-size: clamp(1rem, 2vw, 1.5625rem);
    font-weight: 700;
    line-height: 1.2em;
    max-width: calc(1248 / 16 * 1rem);
    margin: 0;
    color: #fff;
  }
  #quote-1688 .cs-name {
    /* 20px - 25px */
    font-size: clamp(1.25rem, 3.25vw, 1.5625rem);
    font-weight: 700;
    line-height: 1.2em;
    text-align: inherit;
    margin: 0;
    margin-bottom: calc(8 / 16 * 1rem);
    color: var(--primary);
    display: block;
  }
  #quote-1688 .cs-job {
    font-size: calc(16 / 16 * 1rem);
    line-height: 1.5em;
    text-align: inherit;
    margin: 0;
    color: #f7f7f7;
  }
  #quote-1688 .cs-background {
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0;
    left: 0;
    z-index: -1;
    /* darkened overlay */
  }
  #quote-1688 .cs-background::before {
    content: "";
    width: 100%;
    height: 100%;
    background: linear-gradient(0deg, #000000 0%, rgba(255, 255, 255, 0) 60%);
    position: absolute;
    bottom: 0;
    left: 0;
    z-index: 1;
  }
  #quote-1688 .cs-background img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    top: 0;
    left: 0;
  }
}
/* Tablet - 768px */
@media only screen and (min-width: 48rem) {
  #quote-1688 .cs-content {
    flex-direction: row;
  }
}
</style>
</head>
<body>

<!-- ============================================ -->
<!--                    Quote                     -->
<!-- ============================================ -->

<section id="quote-1688">
    <div class="cs-container">
        <div class="cs-content">
            <img class="cs-icon"
                    src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Icons/enterprise-quotemark.svg"
                    alt="quote" width="120" height="99" loading="lazy" decoding="async">
            <p class="cs-quote">
                Stitch Consulting transformed our business strategy Their expert consultants provided ingenious insights that propelled us towards success. Their dedication and innovative solutions are truly commendable.
            </p>
        </div>
        <!--Background Image-->
        <picture class="cs-background">
            <source media="(max-width: 600px)"
                    srcset="https://csimages2.nyc3.digitaloceanspaces.com/Images/MISC/enterprise-quote.jpg">
            <source media="(min-width: 601px)"
                    srcset="https://csimages2.nyc3.digitaloceanspaces.com/Images/MISC/enterprise-quote.jpg">
            <img aria-hidden="true" loading="lazy" decoding="async"
                    src="https://csimages2.nyc3.digitaloceanspaces.com/Images/MISC/enterprise-quote.jpg"
                    alt="banking cityscape" width="360" height="316">
        </picture>
    </div>
</section>

<script></script>
</body>
</html>
