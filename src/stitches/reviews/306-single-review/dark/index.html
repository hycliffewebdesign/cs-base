<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>single review</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---          Reviews           -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #reviews-306 {
    background-color: #f7f7f7;
    /* prevents overflow from overlapping quote icon */
    overflow: hidden;
    position: relative;
  }
  #reviews-306 .cs-image {
    width: 100%;
    max-height: 28.125rem;
    display: block;
    position: relative;
    aspect-ratio: 0.94736842;
  }
  #reviews-306 .cs-image img {
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    width: 100%;
    object-fit: cover;
  }
  #reviews-306 .cs-content {
    max-width: 39.375rem;
    padding: var(--sectionPadding);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    flex-direction: column;
    position: relative;
  }
  #reviews-306 .cs-review {
    /* 25px - 39px */
    font-size: clamp(1.5625rem, 3.9vw, 2.4375rem);
    text-align: left;
    margin: 0;
    /* 28px - 40px */
    margin-bottom: clamp(1.75rem, 3vw, 2.5rem);
    color: var(--bodyTextColor);
  }
  #reviews-306 .cs-quote {
    width: 2.5rem;
    height: auto;
    margin-bottom: 2rem;
    display: block;
  }
  #reviews-306 .cs-info {
    display: flex;
    justify-content: auto;
    align-items: center;
  }
  #reviews-306 .cs-flex {
    display: inline-flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: flex-start;
    flex-basis: content;
  }
  #reviews-306 .cs-profile {
    width: 3.125rem;
    height: auto;
    margin-right: 0.75rem;
    border-radius: 50%;
    display: block;
  }
  #reviews-306 .cs-name {
    /* 20px - 25px */
    font-size: clamp(1.25rem, 2vw, 1.5625rem);
    font-weight: 700;
    line-height: 1.2em;
    color: var(--headerColor);
    display: block;
    flex-basis: content;
  }
  #reviews-306 .cs-job {
    font-size: 1rem;
    line-height: 1.5em;
    font-weight: 400;
    width: 12.5rem;
    color: var(--bodyTextColor);
    display: block;
    flex-basis: content;
  }
  #reviews-306 .cs-watermark {
    /* 87px - 136px */
    width: clamp(5.4375rem, 12.2vw, 8.5rem);
    height: auto;
    opacity: 0.09;
    position: absolute;
    bottom: 0;
    right: 1.25rem;
  }
}
/* Tablet - 768px */
@media only screen and (min-width: 48rem) {
  #reviews-306 {
    display: flex;
    justify-content: flex-start;
    align-items: stretch;
  }
  #reviews-306 .cs-image {
    width: 44%;
    height: auto;
    max-height: 100%;
    /* prevent flexbox from squishing it */
    flex: none;
    aspect-ratio: initial;
  }
  #reviews-306 .cs-content {
    /* 76px - 128px */
    padding-left: clamp(4.75rem, 10vw, 8rem);
    padding-right: 2rem;
  }
  #reviews-306 .cs-watermark {
    /* 16px - 175px */
    right: calc(clamp(1rem, 9.5vw, 10.9375rem)*-1);
  }
}
</style>
</head>
<body>

<!-- ============================================ -->
<!--                  Reviews                     -->
<!-- ============================================ -->

<section id="reviews-306">
    <picture class="cs-image">
        <source media="(max-width: 600px)" srcset="https://csimg.nyc3.digitaloceanspaces.com/Reviews/old-building-m.jpg">
        <source media="(min-width: 601px)" srcset="https://csimg.nyc3.digitaloceanspaces.com/Reviews/old-building.jpg">
        <img aria-hidden="true" loading="lazy" decoding="async" src="https://csimg.nyc3.digitaloceanspaces.com/Reviews/old-building.jpg" alt="building" width="842" height="548">
    </picture>
    <div class="cs-content">
        <img class="cs-quote" aria-hidden="true" loading="lazy" decoding="async" src="https://csimg.nyc3.digitaloceanspaces.com/Reviews/top-quote.svg" alt="quote" width="40" height="33">
        <p class="cs-review">
            Their knowledge, expertise, advice and confidence gave me courage, belief and strength needed to help me go through my divorce. 
        </p>
        <div class="cs-info">
            <img class="cs-profile" aria-hidden="true" loading="lazy" decoding="async" src="https://csimg.nyc3.digitaloceanspaces.com/Reviews/profile2.jpg" alt="profile" width="50" height="50">
            <div class="cs-flex">
                <span class="cs-name">Sarah</span>
                <span class="cs-job">CEO, HK Traders</span>
            </div>
        </div>
        <!--Bottom watermark quote-->
        <img class="cs-watermark" aria-hidden="true" loading="lazy" decoding="async" src="https://csimg.nyc3.digitaloceanspaces.com/Reviews/top-quote.svg" alt="quote" width="136" height="120">
    </div>
</section>

<script></script>
</body>
</html>
