<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>single review</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---          Reviews           -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #reviews-545 {
    padding: var(--sectionPadding);
  }
  #reviews-545 .cs-container {
    width: 100%;
    max-width: calc(1080 / 16 * 1rem);
    margin: auto;
  }
  #reviews-545 .cs-review-group {
    /* padding left and right change to a clamp at tablet */
    padding: calc(64 / 16 * 1rem) calc(20 / 16 * 1rem);
    background-color: var(--primary);
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: calc(40 / 16 * 1rem);
    position: relative;
    z-index: 1;
  }
  #reviews-545 .cs-picture {
    display: block;
    position: relative;
    /* 144px - 256px */
    width: clamp(9rem, 21vw, 16rem);
    /* prevents flexbox from squishing it */
    flex: none;
    /* makes it square */
    aspect-ratio: 1;
  }
  #reviews-545 .cs-picture img {
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    width: 100%;
    object-fit: cover;
  }
  #reviews-545 .cs-content {
    max-width: calc(550 / 16 * 1rem);
  }
  #reviews-545 .cs-review {
    /* 16px - 20px */
    font-size: clamp(1rem, 2vw, 1.25rem);
    line-height: 1.5em;
    text-align: left;
    font-weight: 400;
    /* 20px - 36px */
    margin: 0 0 clamp(1.25rem, 4vw, 2.25rem) 0;
    color: var(--bodyTextColorWhite);
  }
  #reviews-545 .cs-name {
    /* 20px - 25px */
    font-size: clamp(1.25rem, 3vw, 1.5625rem);
    line-height: 1.2em;
    text-align: left;
    font-weight: 700;
    margin: 0 0 calc(8 / 16 * 1rem) 0;
    color: var(--bodyTextColorWhite);
    display: block;
  }
  #reviews-545 .cs-desc {
    /* 16px - 20px */
    font-size: clamp(1rem, 3vw, 1.25rem);
    line-height: 1.2em;
    text-align: left;
    font-weight: 400;
    margin: 0;
    color: var(--bodyTextColorWhite);
    display: block;
  }
  #reviews-545 .cs-pattern {
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    /* makes it act like a background image */
    object-fit: cover;
    z-index: -1;
  }
}
/* Tablet - 768px */
@media only screen and (min-width: 48rem) {
  #reviews-545 .cs-review-group {
    /* 60px - 92px left & right */
    padding: calc(64 / 16 * 1rem) clamp(3.75rem, 8vw, 5.75rem);
    flex-direction: row;
    justify-content: flex-start;
  }
  #reviews-545 .cs-picture {
    /* sends it to the right in the 2nd position */
    order: 2;
  }
}
</style>
</head>
<body>

<!-- ============================================ -->
<!--                  Reviews                     -->
<!-- ============================================ -->

<section id="reviews-545">
    <div class="cs-container">
        <div class="cs-review-group">
            <picture class="cs-picture">
                <source media="(max-width: 600px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Reviews/woman-smile-m.jpg">
                <source media="(min-width: 601px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Reviews/woman-smile.jpg">
                <img loading="lazy" decoding="async" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Reviews/woman-smile.jpg" alt="person smiling" width="256" height="256">
            </picture>
            <div class="cs-content">
                <p class="cs-review">
                    Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur.Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum. 
                </p>
                <span class="cs-name">Arlene Howard</span>
                <span class="cs-desc">Finance Manager</span>
            </div>
            <!--SVG Greek Pattern-->
            <img class="cs-pattern" loading="lazy" decoding="async" aria-hidden="true" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Reviews/greek-pattern.svg" alt="pattern" width="256" height="256">
        </div>
    </div>
</section>

<script></script>
</body>
</html>
