<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>single review</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---          Reviews           -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #reviews-1604 {
    background-color: #f7f7f7;
    position: relative;
    z-index: 1;
  }
  #reviews-1604 .cs-container {
    width: 100%;
    /* changes to 1024px at tablet */
    max-width: 36.5rem;
    margin: auto;
    margin-bottom: -5.75rem;
    padding: var(--sectionPadding);
    padding-bottom: 0;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    align-items: center;
    /* 48px - 64px */
    gap: clamp(3rem, 6vw, 4rem);
  }
  #reviews-1604 .cs-content {
    /* set text align to left if content needs to be left aligned */
    text-align: center;
    width: 100%;
    display: flex;
    flex-direction: column;
    /* centers content horizontally, set to flex-start to left align */
    align-items: center;
  }
  #reviews-1604 .cs-title {
    max-width: 20ch;
    margin: 0;
  }
  #reviews-1604 .cs-review {
    list-style: none;
    text-align: left;
    width: 100%;
    max-width: 39.375rem;
    /* 24px - 40px */
    padding: clamp(1.5rem, 4vw, 2.5rem);
    background-color: #fff;
    /* prevents padding from adding to height and width */
    box-sizing: border-box;
    /* clips the pseudo box from overflowing */
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    /* prevents flexbox from squishing it */
    flex: none;
    flex-direction: column;
    position: relative;
    z-index: 1;
  }
  #reviews-1604 .cs-quote {
    --quoteColor: var(--primary);
    width: 6.25rem;
    height: auto;
    margin: 0;
    opacity: 0.1;
    display: block;
    position: absolute;
    /* changes to 40px at tablet */
    right: 0;
    bottom: 0;
  }
  #reviews-1604 .cs-review-text {
    /* 16px - 25px */
    font-size: clamp(1rem, 2vw, 1.25rem);
    line-height: 1.5em;
    margin: 0 0 2rem 0;
    color: var(--bodyTextColor);
  }
  #reviews-1604 .cs-flex-group {
    /* in case one card has more text than the other, this pushes up against the review text so the name and title are always at the bottom. Only works if parent is a flexbox */
    margin-top: auto;
    display: flex;
    justify-content: flex-start;
    align-items: center;
    gap: 0.75rem;
  }
  #reviews-1604 .cs-profile {
    width: 3.25rem;
    height: 3.25rem;
    margin: 0;
    border-radius: 50%;
    box-sizing: border-box;
    /* clips image corners to make circle */
    overflow: hidden;
    position: relative;
    display: block;
  }
  #reviews-1604 .cs-profile img {
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    width: 100%;
    /* makes the image behave like a background image */
    object-fit: cover;
  }
  #reviews-1604 .cs-name {
    font-size: 1.25rem;
    line-height: 1.2em;
    font-weight: 700;
    margin: 0;
    color: var(--headerColor);
    display: block;
  }
  #reviews-1604 .cs-job {
    /* 14px - 16px */
    font-size: clamp(0.875rem, 1.5vw, 1rem);
    line-height: 1.5em;
    font-weight: 400;
    margin: 0.25rem 0 0 0;
    color: var(--secondary);
    display: block;
  }
  #reviews-1604 .cs-img {
    width: 100%;
    max-width: 80rem;
    /* reduced to 60vw at tablet */
    height: 100vw;
    /* changed to 640px at tablet */
    max-height: 28.125rem;
    margin: auto;
    display: block;
    position: relative;
    z-index: -1;
  }
  #reviews-1604 .cs-img img {
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    width: 100%;
    /* Makes img tag act as a background image */
    object-fit: cover;
  }
}
/* Tablet - 768px */
@media only screen and (min-width: 48rem) {
  #reviews-1604 {
    padding: var(--sectionPadding);
  }
  #reviews-1604 .cs-container {
    max-width: 80rem;
    padding: 0;
    flex-direction: row;
    align-items: flex-start;
    justify-content: space-between;
  }
  #reviews-1604 .cs-content {
    text-align: left;
    align-items: flex-start;
  }
  #reviews-1604 .cs-item {
    grid-column: span 6;
  }
  #reviews-1604 .cs-review {
    width: 67%;
  }
  #reviews-1604 .cs-quote {
    right: 2.5rem;
  }
  #reviews-1604 .cs-img {
    height: 60vw;
    max-height: 40rem;
  }
}
</style>
</head>
<body>

<!-- ============================================ -->
<!--                   Reviews                    -->
<!-- ============================================ -->

<section id="reviews-1604">
    <div class="cs-container">
        <div class="cs-content">
            <span class="cs-topper">Testimonials</span>
            <h2 class="cs-title">What Our Client’s Say</h2>
        </div>
        <div class="cs-review">
            <!--Quote-->
            <svg class="cs-quote" viewBox="0 0 120 84" preserveAspectRatio="none" width="100" height="84" fill="none" xmlns="http://www.w3.org/2000/svg"><g clip-path="url(#a)" fill="var(--quoteColor)"><path d="M27.528 99H0L21.966 0H66L27.528 99ZM81.528 99H54L75.966 0H120L81.528 99Z"/></g><defs><clipPath id="a-1604"><path fill="var(--quoteColor)" d="M0 0h120v99H0z"/></clipPath></defs></svg>
            <p class="cs-review-text">
                This is due to their excellent service, competitive pricing and customer support. It’s throughly refresing to get such a personal touch. Duis aute lorem ipsum is simply free text irure dolor in reprehenderit in esse nulla pariatur
            </p>
            <div class="cs-flex-group">
                <picture class="cs-picture">
                    <img class="cs-profile" src="https://csimages2.nyc3.digitaloceanspaces.com/Reviews/profile3.jpg" decoding="async" alt="profile" width="50" height="50" aria-hidden="true">
                </picture>
                <span class="cs-name">
                    Jessica Jonson
                    <span class="cs-job">CTO Of Meriette</span>
                </span>
            </div>
        </div>
    </div>
    <picture class="cs-img">
        <!--Mobile Image-->
        <source media="(max-width: 600px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/models.jpg">
        <!--Tablet and above Image-->
        <source media="(min-width: 601px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/models.jpg">
        <img loading="lazy" decoding="async" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/models.jpg" alt="people" width="1280" height="640">
    </picture>
</section>

<script></script>
</body>
</html>
