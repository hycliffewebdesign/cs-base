<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>single review</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---          Review            -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #reviews-1714 {
    position: relative;
    z-index: 1;
  }
  #reviews-1714 .cs-container {
    width: 100%;
    max-width: 82rem;
    margin: auto;
    padding: var(--sectionPadding);
    padding-bottom: 0;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    position: relative;
  }
  #reviews-1714 .cs-content {
    /* set text align to center if content needs to be centrally aligned */
    text-align: left;
    width: 100%;
    /* -88px top -150px */
    margin-bottom: calc(clamp(5.5rem, 13vw, 9.375rem)*-1);
    /* 40px - 100px top & bottom */
    /* 16px - 80px left & right */
    padding: clamp(2.5rem, 9vw, 6.25rem) clamp(1rem, 7vw, 5rem);
    box-sizing: border-box;
    background-color: #111926;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    /* aligns content to the left, set to center to centrally align */
    align-items: flex-start;
    /* 16px - 40px */
    gap: clamp(1rem, 4vw, 2.5rem);
    position: relative;
    z-index: 10;
  }
  #reviews-1714 .cs-icon {
    width: 5rem;
    height: auto;
  }
  #reviews-1714 .cs-quote {
    /* 20px - 31px */
    font-size: clamp(1.25rem, 2vw, 1.9375rem);
    font-weight: 700;
    line-height: 1.2em;
    max-width: 62.5rem;
    margin: 0;
    color: #fff;
  }
  #reviews-1714 .cs-graphic {
    width: 14.5625rem;
    height: auto;
    opacity: 0.08;
    position: absolute;
    right: -1rem;
    bottom: -4.375rem;
    z-index: -1;
  }
  #reviews-1714 .cs-background {
    width: 100%;
    /* 340px - 620px */
    height: clamp(21.25rem, 47vw, 38.75rem);
    display: block;
    position: relative;
    z-index: 1;
  }
  #reviews-1714 .cs-background img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    top: 0;
    left: 0;
  }
}
/* Tablet - 768px */
@media only screen and (min-width: 48rem) {
  #reviews-1714 .cs-content {
    flex-direction: row;
    justify-content: flex-start;
  }
}
</style>
</head>
<body>

<!-- ============================================ -->
<!--                   Reviews                    -->
<!-- ============================================ -->

<div id="reviews-1714">
    <div class="cs-container">
        <div class="cs-content">
            <img class="cs-icon"
                    src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Icons/enterprise-quotemark.svg"
                    alt="quote" width="120" height="99" loading="lazy" decoding="async">
            <p class="cs-quote">
                Stitch Consulting transformed our business strategy Their expert consultants provided ingenious insights that propelled us towards success. Their dedication and innovative solutions are truly commendable.
            </p>
            <img class="cs-graphic"
                    src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Graphics/spiral.svg"
                    alt="quote" width="233" height="233" loading="lazy" decoding="async">
        </div>
    </div>
    <!--Background Image-->
    <picture class="cs-background">
        <source media="(max-width: 600px)"
                srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/meeting13.jpg">
        <source media="(min-width: 601px)"
                srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/meeting13.jpg">
        <img aria-hidden="true" loading="lazy" decoding="async"
                src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/meeting13.jpg"
                alt="meeting" width="360" height="316">
    </picture>
</div>

<script></script>
</body>
</html>
