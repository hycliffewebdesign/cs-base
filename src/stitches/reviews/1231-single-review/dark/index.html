<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>single review</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---          Reviews           -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #reviews-1231 {
    background-color: #f7f7f7;
    /* prevents padding and border from affecting height and width */
    box-sizing: border-box;
    overflow: hidden;
    position: relative;
    z-index: 1;
  }
  #reviews-1231 .cs-container {
    width: 100%;
    max-width: 80rem;
    margin: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2rem;
  }
  #reviews-1231 .cs-content {
    /* set text align to left if content needs to be left aligned */
    text-align: left;
    width: 100%;
    max-width: 29.875rem;
    padding: var(--sectionPadding);
    padding-top: 0;
    /* prevents padding and border from affecting height and width */
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    /* centers content horizontally, set to flex-start to left align */
    align-items: flex-start;
  }
  #reviews-1231 .cs-review {
    /* 25px - 39px */
    font-size: clamp(1.5625rem, 4.1vw, 2.4375rem);
    font-weight: 900;
    line-height: 1.2em;
    /* 20px - 40px */
    margin: 0 0 clamp(1.25rem, 3vw, 2.5rem);
  }
  #reviews-1231 .cs-name {
    /* 20px - 25px */
    font-size: clamp(1.25rem, 2vw, 1.5625rem);
    line-height: 1.2em;
    text-align: inherit;
    font-weight: 700;
    margin: 0 0 0.25rem;
    color: var(--primary);
    display: block;
  }
  #reviews-1231 .cs-desc {
    /* 14px - 16px */
    font-size: clamp(0.875rem, 1.5vw, 1rem);
    line-height: 1.5em;
    text-align: inherit;
    margin: 0;
    color: var(--bodyTextColor);
    display: block;
  }
  #reviews-1231 .cs-background {
    width: 100%;
    height: 67vw;
    max-height: 18.75rem;
    display: block;
    position: relative;
  }
  #reviews-1231 .cs-background img {
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    width: 100%;
    /* Makes img tag act as a background image */
    object-fit: cover;
  }
  #reviews-1231 .cs-floater {
    /* 304px - 587px */
    width: clamp(19rem, 30vw, 36.6875rem);
    height: auto;
    position: absolute;
    right: -6.25rem;
    bottom: -6.25rem;
    z-index: -1;
  }
}
/* Tablet - 768px */
@media only screen and (min-width: 48rem) {
  #reviews-1231 {
    /* moved section padding back to the section */
    padding: var(--sectionPadding);
  }
  #reviews-1231 .cs-container {
    flex-direction: row;
    justify-content: flex-end;
  }
  #reviews-1231 .cs-content {
    text-align: left;
    width: 45%;
    padding: 0;
    align-items: flex-start;
  }
  #reviews-1231 .cs-background {
    height: auto;
    max-height: 100%;
    width: 50vw;
    position: absolute;
    left: auto;
    top: 0;
    bottom: 0;
    right: 50%;
    margin: 0 0.625rem 0 0;
  }
}
/* Desktop - 1200px */
@media only screen and (min-width: 75rem) {
  #reviews-1231 {
    min-height: 37.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #reviews-1231 .cs-background {
    width: 60vw;
    /* 48px - 98px */
    margin-right: calc(clamp(3rem, 6.6vw, 6.125rem)*-1);
  }
}
</style>
</head>
<body>

<!-- ============================================ -->
<!--                 Reviews                      -->
<!-- ============================================ -->

<section id="reviews-1231">
    <div class="cs-container">
        <picture class="cs-background">
            <!--Mobile Image-->
            <source media="(max-width: 600px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/playing-game.jpg">
            <!--Tablet and above Image-->
            <source media="(min-width: 601px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/playing-game.jpg">
            <img loading="lazy" decoding="async" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/playing-game.jpg" alt="group at a table" width="1058" height="595">
        </picture>
        <div class="cs-content">
            <p class="cs-review">
                “Creating long-term value with entrepreneurial intelligence! Our main goal is Growth.”
            </p>
            <span class="cs-name">Piter Bowman</span>
            <span class="cs-desc">Creative Director</span>
        </div>
    </div>
    <img class="cs-floater" loading="lazy" decoding="async" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Graphics/grey-swirl.svg" alt="swirl" width="587" height="587">
</section>

<script></script>
</body>
</html>
