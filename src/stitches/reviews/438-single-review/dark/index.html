<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>single review</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---          Reviews           -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #reviews-438 {
    /* change width to make sure there is 16px gap left and right */
    width: 91.112%;
    /* changes at tablet */
    max-width: 34.375rem;
    /* using margin instead of padding so the green bar can rest at the true bottom of the section, without padding interrupting it */
    margin: var(--sectionPadding);
    margin-left: auto;
    margin-right: auto;
    box-sizing: border-box;
    border-radius: 1.5rem;
    /* clips corners of green border */
    overflow: hidden;
    position: relative;
  }
  #reviews-438:before {
    /* green bar */
    content: "";
    width: 100%;
    height: 0.5rem;
    background: var(--primaryLight);
    opacity: 1;
    position: absolute;
    display: block;
    bottom: 0;
    left: 0;
    z-index: 10;
  }
  #reviews-438 .cs-container {
    width: 100%;
    margin: auto;
    /* pushes down the same amount as the picture is pulled up */
    margin-top: 5.8125rem;
    /* 20px - 108px left & right, clamp changes at desktop */
    /* 48px - 100px bottom */
    padding: 0 clamp(1.25rem, 6vw, 6.75rem) clamp(2.5rem, 8vw, 6.25rem);
    border-radius: 1.5rem;
    /* prevents padding and border from affecting height and width */
    box-sizing: border-box;
    background-color: #14142b;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    flex-direction: column;
    position: relative;
  }
  #reviews-438 .cs-review {
    /* 16px - 25px */
    font-size: clamp(1rem, 2vw, 1.5625rem);
    line-height: 1.5em;
    /* 24px - 48px changes at tablet */
    margin: 0 0 clamp(1.5rem, 3vw, 3rem) 0;
    color: #dad9e3;
    position: relative;
    z-index: 1;
  }
  #reviews-438 .cs-quote {
    /* 40px - 120px , clamp changes at tablet */
    width: clamp(2.5rem, 11vw, 7.5rem);
    height: auto;
    display: block;
    position: absolute;
    left: 0;
    /* changes at tablet */
    top: -3.75rem;
    z-index: -1;
  }
  #reviews-438 .cs-author {
    /* 16px - 31px */
    font-size: clamp(1rem, 2.6vw, 1.9375rem);
    font-weight: 700;
    line-height: 1.2em;
    color: #fafbfc;
  }
  #reviews-438 .cs-picture {
    /* 116px - 328px */
    width: clamp(7.25rem, 24vw, 20.5rem);
    margin-top: -5.8125rem;
    margin-bottom: 2.25rem;
    border-radius: 8.75rem;
    border: clamp(8px, 1vw, 12px) solid #fff;
    background-color: #fff;
    box-sizing: content-box;
    /* clips the img tag corners */
    overflow: hidden;
    /* width divided by height */
    aspect-ratio: 0.65079365;
    display: block;
    /* sends it to the top of the flexbox */
    order: -1;
    position: relative;
  }
  #reviews-438 .cs-picture img {
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    width: 100%;
    /* makes it act like a background image */
    object-fit: cover;
    /* makes the top of the image line up at the top of the container */
    object-position: top;
  }
}
/* Tablet - 768px */
@media only screen and (min-width: 48rem) {
  #reviews-438 {
    max-width: 80rem;
  }
  #reviews-438 .cs-container {
    padding-top: 6.75rem;
    flex-direction: row;
    justify-content: space-between;
  }
  #reviews-438 .cs-content {
    width: 57%;
  }
  #reviews-438 .cs-review {
    /* 48px - 96px, clamp changes at desktop */
    margin-bottom: clamp(3rem, 7vw, 6rem);
  }
  #reviews-438 .cs-quote {
    /* 80px - 120px , clamp changes at tablet */
    width: clamp(5rem, 8vw, 7.5rem);
    top: -3.3125rem;
    /* 20px - 64px */
    left: calc(clamp(1.25rem, 2vw, 4rem) *-1);
  }
  #reviews-438 .cs-picture {
    margin: 0;
    /* reset its order */
    order: initial;
    position: absolute;
    /* 50px - 108px - wrapped in calc function turn multiple value by negative 1 and get a negative clamp value*/
    top: calc(clamp(3.125rem, 8vw, 6.75rem) *-1);
    /* 52px - 100px */
    right: clamp(3.25rem, 7vw, 6.25rem);
  }
}
/* Small Desktop - 1024px */
@media only screen and (min-width: 64rem) {
  #reviews-438 .cs-container {
    /* 60px - 108px left & right */
    /* 48px - 100px bottom */
    padding: 6.75rem clamp(3.75rem, 4.6vw + 2rem, 6.75rem) clamp(2.5rem, 8vw, 6.25rem);
  }
  #reviews-438 .cs-review {
    /* 48px - 96px changes at tablet */
    margin: 0 0 clamp(3rem, 4.2vw + 2rem, 6rem) 0;
  }
}
</style>
</head>
<body>

<!-- ============================================ -->
<!--                   Reviews                    -->
<!-- ============================================ -->

<section id="reviews-438">
    <div class="cs-container">
        <div class="cs-content">
            <p class="cs-review">
                <!--Placed inside p tag for more consistent positioning-->
                <img class="cs-quote" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Reviews/quote-left.svg" alt="quote icon" width="120" height="106" loading="lazy" decoding="async" aria-hidden="true">
                “We purchased our property in Katoomba from Landscape  about 7 years ago. Landscape’s made the process so easy that when it came time to sell we knew immediately where to turn”
            </p>
            <span class="cs-author">Dany Olmo - Customer of Landscape</span>
        </div>
        <picture class="cs-picture">
            <source media="(max-width: 600px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Reviews/man-m.jpg">
            <source media="(min-width: 601px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Reviews/man.jpg">
            <img loading="lazy" decoding="async" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Reviews/man.jpg" alt="person looking left" width="328" height="540" aria-hidden="true">
        </picture>
    </div>
</section>

<script></script>
</body>
</html>
