<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>full width</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<!--          Reviews           -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #reviews-2418 {
    padding: var(--sectionPadding);
    /* padding-top resets at 768px */
    padding-top: 25rem;
    position: relative;
    overflow: hidden;
    /* figure */
    /* blockquote */
    /* figcaption */
    /* ornamental 'quote' graphic  */
    /* background image */
  }
  #reviews-2418 .cs-container {
    max-width: 80rem;
    margin: 0 auto;
  }
  #reviews-2418 .cs-card {
    width: 100%;
    margin: 0;
    margin-left: auto;
    /* 24px - 40px */
    padding: clamp(1.5rem, 6.66vw, 2.5rem);
    background-color: #fff;
    border-radius: 1rem;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: flex-start;
    position: relative;
    z-index: 1;
  }
  #reviews-2418 .cs-card:before {
    /* background color */
    content: '';
    width: 100%;
    height: 100%;
    background: var(--primary);
    opacity: 0.1;
    display: block;
    position: absolute;
    top: 0;
    left: 0;
    z-index: -1;
  }
  #reviews-2418 .cs-title {
    margin-bottom: 3rem;
  }
  #reviews-2418 .cs-blockquote {
    width: 100%;
    margin: 0;
  }
  #reviews-2418 .cs-stars {
    width: 8.5rem;
    height: auto;
    margin-bottom: 1rem;
    display: block;
  }
  #reviews-2418 .cs-review {
    /* 16px - 20px */
    font-size: clamp(1rem, 2.5vw, 1.25rem);
    line-height: 1.5em;
    margin: 0 0 1rem;
    color: var(--bodyTextColor);
    z-index: 1;
  }
  #reviews-2418 .cs-review:last-of-type {
    margin-bottom: 2.5rem;
  }
  #reviews-2418 .cs-info {
    width: 100%;
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    position: relative;
  }
  #reviews-2418 .cs-profile {
    width: 3.25rem;
    height: 3.25rem;
    border-radius: 50%;
    overflow: hidden;
    object-fit: cover;
    display: block;
    position: relative;
    z-index: 1;
  }
  #reviews-2418 .cs-name {
    font-size: 1.25rem;
    line-height: 1.2em;
    font-weight: 700;
    margin: 0;
  }
  #reviews-2418 .cs-desc {
    font-size: 1rem;
    font-weight: 400;
    line-height: 1.5em;
    color: var(--bodyTextColor);
    display: block;
  }
  #reviews-2418 .cs-profile-graphic {
    width: 27vw;
    max-width: 7.8125rem;
    height: auto;
    /* controls fill color */
    color: var(--primary);
    opacity: 0.2;
    pointer-events: none;
    position: absolute;
    top: 0;
    right: 0;
    z-index: -1;
  }
  #reviews-2418 .cs-background {
    width: 100%;
    height: 100%;
    display: block;
    position: absolute;
    top: 0;
    left: 0;
    z-index: -1;
  }
  #reviews-2418 .cs-background img {
    width: 100%;
    height: 100%;
    /* makes image act as a background image */
    object-fit: cover;
    object-position: center;
  }
}
/* Tablet - 768px */
@media only screen and (min-width: 48rem) {
  #reviews-2418 {
    /* resetting the padding */
    padding: var(--sectionPadding);
  }
  #reviews-2418 .cs-card {
    width: 62%;
    max-width: 46.125rem;
  }
}
</style>
</head>
<body>

<!-- ============================================ -->
<!--                   Reviews                    -->
<!-- ============================================ -->

<section id="reviews-2418">
    <div class="cs-container">
        <figure class="cs-card">
            <div class="cs-content">
                <h2 class="cs-topper">Happy Clients Speak</h2>
                <p class="cs-title">What They Say</p>
            </div>
            <blockquote class="cs-blockquote">   
                <img class="cs-stars" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Graphics/stars5.svg" decoding="async" alt="" width="136" height="20" loading="lazy">
                <p class="cs-review">
                    Poop Patrol Stitches has been a game-changer for us! The team is always punctual, professional, and leaves our yard spotless. Highly recommend their services to every pet owner.
                </p>
            </blockquote>
            <figcaption class="cs-info">
                <img class="cs-profile" src="https://nyc3.digitaloceanspaces.com/csimages2/Images/People/reviewbg-pet-services-840x840.jpg" decoding="async" alt="" width="52" height="52" loading="lazy">
            
                <span class="cs-name">
                    Jenny Y.
                    <span class="cs-desc">Home Owner</span>
                </span>
                <!--Quote Icon-->
                <svg class="cs-profile-graphic" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="125" height="100" viewBox="0 0 125 100"><path fill="var(--primary)" d="M68.8 0 28.7 100H0L22.9 0h45.9Zm10.3 0L56.2 100h28.7L125 0H79.1Z"/></svg>
            </figcaption>
        </figure>
    </div>
    <picture class="cs-background">
        <!-- coincides with css Custom mid Mobile/Tablet breakpoint -->
         <!-- update media max and min below if css changes -->
        <source media="(max-width: 767px)" srcset="https://nyc3.digitaloceanspaces.com/csimages2/Images/People/reviewbg-pet-services-840x840.jpg">
        <source media="(min-width: 768px)" srcset="https://nyc3.digitaloceanspaces.com/csimages2/Images/People/reviewbg-pet-services-1800x1350.jpg">
        <img loading="lazy" decoding="async" src="https://nyc3.digitaloceanspaces.com/csimages2/Images/People/reviewbg-pet-services-1800x1350.jpg" alt="" width="630" height="877">
    </picture>
</section>

<script></script>
</body>
</html>
