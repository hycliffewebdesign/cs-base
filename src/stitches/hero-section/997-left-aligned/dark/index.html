<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>left aligned</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---           Hero             -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #hero-997 {
    /* 200px - 300px - leaving extra space for the navigation */
    padding: clamp(12.5rem, 25.95vw, 18.75rem) calc(16 / 16 * 1rem) 0;
    /* 100px - 250px */
    padding-bottom: clamp(6.25rem, 25.95vw, 15.625rem);
    position: relative;
    z-index: 1;
    /* prevents overflow from the lines extending past the screen width */
    overflow: hidden;
  }
  #hero-997 .cs-container {
    max-width: calc(1280 / 16 * 1rem);
    width: 100%;
    margin: auto;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    position: relative;
    /* 100px - 200px */
    gap: clamp(6.25rem, 25vw, 12.5rem);
  }
  #hero-997 .cs-content {
    max-width: calc(955 / 16 * 1rem);
    width: 100%;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: flex-start;
  }
  #hero-997 .cs-topper {
    /* 13px - 16px */
    font-size: clamp(0.8125rem, 1.6vw, 1rem);
    line-height: 1.2em;
    font-weight: 700;
    text-align: left;
    width: 100%;
    margin-bottom: calc(28 / 16 * 1rem);
    color: var(--bodyTextColorWhite);
    white-space: nowrap;
    text-transform: uppercase;
    letter-spacing: 0.1rem;
    display: flex;
    justify-content: flex-start;
    align-items: center;
    position: relative;
    gap: calc(20 / 16 * 1rem);
  }
  #hero-997 .cs-topper:after {
    /* white line */
    content: "";
    max-width: calc(120 / 16 * 1rem);
    width: 50%;
    height: 1px;
    background: currentColor;
    opacity: 1;
    display: block;
    position: relative;
  }
  #hero-997 .cs-title {
    /* 39px - 80px */
    font-size: clamp(2.4375rem, 6.4vw, 5rem);
    line-height: 1.2em;
    font-weight: 900;
    text-align: left;
    max-width: 20ch;
    width: 100%;
    margin: 0 0 calc(32 / 16 * 1rem) 0;
    color: var(--bodyTextColorWhite);
    position: relative;
  }
  #hero-997 .cs-color {
    color: var(--primary);
  }
  #hero-997 .cs-text {
    /* 16px - 20px */
    font-size: clamp(1rem, 1.95vw, 1.25rem);
    line-height: 1.5em;
    text-align: left;
    max-width: calc(630 / 16 * 1rem);
    width: 100%;
    margin: 0 0 calc(32 / 16 * 1rem) 0;
    color: var(--bodyTextColorWhite);
  }
  #hero-997 .cs-button-box {
    display: flex;
    justify-content: flex-start;
    align-items: center;
    flex-wrap: wrap;
    gap: calc(20 / 16 * 1rem);
  }
  #hero-997 .cs-button-solid {
    font-size: calc(16 / 16 * 1rem);
    /* 46px - 56px */
    line-height: clamp(2.875rem, 5.5vw, 3.5rem);
    font-weight: 700;
    text-align: center;
    width: calc(180 / 16 * 1rem);
    margin: 0;
    padding: 0;
    color: #fff;
    background-color: var(--primary);
    text-decoration: none;
    display: inline-block;
    position: relative;
    z-index: 1;
    transition: color 0.3s;
  }
  #hero-997 .cs-button-solid:before {
    content: "";
    width: 0%;
    height: 100%;
    background: #fff;
    opacity: 1;
    display: block;
    position: absolute;
    top: 0;
    left: 0;
    z-index: -1;
    transition: width 0.3s;
  }
  #hero-997 .cs-button-solid:hover {
    color: #1a1a1a;
  }
  #hero-997 .cs-button-solid:hover:before {
    width: 100%;
  }
  #hero-997 .cs-button-transparent {
    font-size: calc(16 / 16 * 1rem);
    /* 46px - 56px */
    line-height: clamp(2.875rem, 5.5vw, 3.5rem);
    font-weight: 700;
    width: calc(180 / 16 * 1rem);
    /* 46px - 56px */
    height: clamp(2.875rem, 5.5vw, 3.5rem);
    margin: 0;
    box-sizing: border-box;
    padding: 0;
    color: #fff;
    background-color: transparent;
    border: 1px solid var(--bodyTextColorWhite);
    text-decoration: none;
    display: inline-flex;
    justify-content: center;
    align-items: center;
    position: relative;
    z-index: 1;
    transition: color / 3s;
  }
  #hero-997 .cs-button-transparent:before {
    content: "";
    background: #fff;
    opacity: 1;
    display: block;
    position: absolute;
    /* so it sits on top of the border */
    top: -1px;
    right: -1px;
    bottom: -1px;
    left: -1px;
    z-index: -1;
    /* this is what creates the grow affect on hover */
    transform: scaleX(0);
    transition: transform 0.3s;
    transform-origin: left;
  }
  #hero-997 .cs-button-transparent:hover {
    color: #1a1a1a;
  }
  #hero-997 .cs-button-transparent:hover:before {
    transform: scaleX(1);
  }
  #hero-997 .cs-background {
    /* Background Image */
    width: 100%;
    height: 100%;
    display: block;
    position: absolute;
    top: 0;
    left: 0;
    z-index: -2;
  }
  #hero-997 .cs-background:before {
    /* Black Color Overlay */
    content: "";
    width: 100%;
    height: 100%;
    background: linear-gradient(41deg, rgba(26, 26, 26, 0.9) 30%, rgba(26, 26, 26, 0.3) 100%);
    opacity: 1;
    display: block;
    position: absolute;
    top: 0;
    left: 0;
    z-index: 1;
    /* prevents the cursor from interacting with it */
    pointer-events: none;
  }
  #hero-997 .cs-background img {
    width: 100%;
    height: 100%;
    /* Makes image act like a background-image */
    object-fit: cover;
    position: absolute;
    top: 0;
    left: 0;
  }
}
/* Large Desktop Parallax Effect - 1300px */
@media only screen and (min-width: 81.25rem) {
  #hero-997 {
    background: url("https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/landing.jpg");
    background-position: center;
    background-size: cover;
    background-repeat: no-repeat;
    /* creates parallax effect on background image */
    background-attachment: fixed;
    /* remove img tag so we can make parallax work */
  }
  #hero-997 .cs-background img {
    display: none;
  }
}
</style>
</head>
<body>

<!-- ============================================ -->
<!--                    Hero                      -->
<!-- ============================================ -->

<section id="hero-997">
    <div class="cs-container">
        <div class="cs-content">
            <span class="cs-topper">Stitch Restaurant</span>
            <h1 class="cs-title"><span class="cs-color">#1</span> Breakfast Restaurant in Oak Harbor</h1>
            <p class="cs-text">
                Stitch Restaurant serves the best quality food templates for web developers in the world. Our attention to detail and quality is second to none and the customer service to match!
            </p>
            <div class="cs-button-box">
                <a href="" class="cs-button-solid">Explore More</a>
                <a href="" class="cs-button-transparent">Learn More</a>
            </div>
        </div>
    </div>
    <!-- Background Image -->
    <picture class="cs-background">
        <source media="(max-width: 600px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/landing-m.jpg">
        <source media="(min-width: 601px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/landing.jpg">
        <img loading="lazy" decoding="async" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/landing.jpg" alt="restaurant" width="1920" height="1200" aria-hidden="true">
    </picture>
</section>

<script></script>
</body>
</html>
