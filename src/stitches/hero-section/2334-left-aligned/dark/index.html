<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>left aligned</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---           Hero             -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #hero-2334 {
    /* 150px - 258px Top */
    padding: clamp(9rem, 23.95vw, 16.125rem) calc(16/16 * 1rem) calc(0/16 * 1rem);
    overflow: hidden;
    position: relative;
    z-index: 1;
  }
  #hero-2334 .cs-container {
    width: 100%;
    max-width: calc(1280/16 * 1rem);
    margin: auto;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: calc(88/16 * 1rem);
  }
  #hero-2334 .cs-content {
    /* set text align to left if content needs to be left aligned */
    text-align: left;
    width: 100%;
    max-width: calc(630/16 * 1rem);
    /* 60px - 80px top & Bottom */
    /* 16px - 32px left & right */
    padding: clamp(3.75rem, 8vw, 5rem) clamp(1rem, 5vw, 2rem);
    display: flex;
    flex-direction: column;
    /* centers content horizontally, set to flex-start to left align */
    align-items: flex-start;
    position: relative;
    z-index: 1;
  }
  #hero-2334 .cs-overlay {
    width: 100%;
    height: 100%;
    background-color: #111418;
    overflow: hidden;
    position: absolute;
    top: 0;
    left: 0;
    z-index: -1;
  }
  #hero-2334 .cs-graphic {
    width: calc(1885/16 * 1rem);
    height: auto;
    opacity: 0.1;
    position: absolute;
    bottom: 0;
    right: 0;
  }
  #hero-2334 .cs-title {
    /* 39px - 61px */
    font-size: clamp(2.4375rem, 6.4vw, 3.8125rem);
    font-weight: 900;
    text-transform: uppercase;
    line-height: 1.2em;
    width: 100%;
    max-width: 17ch;
    margin: 0 0 calc(16/16 * 1rem);
    color: var(--bodyTextColorWhite);
    position: relative;
  }
  #hero-2334 .cs-tag {
    /* 25px - 39px */
    font-size: clamp(1.5625rem, 4vw, 2.4375rem);
    margin-bottom: calc(4/16 * 1rem);
    display: block;
  }
  #hero-2334 .cs-text {
    /* 16px - 20px */
    font-size: clamp(1rem, 2.5vw, 1.25rem);
    line-height: 1.5em;
    width: 100%;
    max-width: calc(580/16 * 1rem);
    /* 28px - 40px */
    margin: 0 0 clamp(1.75rem, 4vw, 2.5rem);
    color: var(--bodyTextColorWhite);
    opacity: 0.8;
  }
  #hero-2334 .cs-button-solid {
    font-size: calc(16/16 * 1rem);
    text-align: center;
    /* 46px - 56px */
    line-height: clamp(2.875rem, 5.5vw, 3.5rem);
    text-decoration: none;
    font-weight: 700;
    /* clips corners of the before element */
    overflow: hidden;
    margin: 0;
    color: #fff;
    padding: 0 calc(28/16 * 1rem);
    background-color: var(--primary);
    display: inline-flex;
    align-items: center;
    justify-content: space-between;
    gap: calc(12/16 * 1rem);
    position: relative;
    z-index: 1;
    transition: color 0.3s;
  }
  #hero-2334 .cs-button-solid:before {
    content: "";
    position: absolute;
    display: block;
    height: 100%;
    width: 0%;
    background: #000;
    opacity: 1;
    top: 0;
    left: 0;
    z-index: -1;
    transition: width 0.3s;
  }
  #hero-2334 .cs-button-solid:hover {
    color: #fff;
  }
  #hero-2334 .cs-button-solid:hover:before {
    width: 100%;
  }
  #hero-2334 .cs-picture {
    width: 100%;
    /* 427px - 581px */
    max-width: clamp(26.6875rem, 60vw, 42.5rem);
    height: auto;
    display: flex;
    align-items: flex-end;
    position: relative;
    z-index: 7;
  }
  #hero-2334 .cs-picture img {
    width: 100%;
    height: auto;
  }
  #hero-2334 .cs-background {
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0;
    left: 0;
    z-index: -1;
  }
  #hero-2334 .cs-background img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    top: 0;
    left: 0;
    z-index: -1;
  }
}
/* Tablet - 768px */
@media only screen and (min-width: 48rem) {
  #hero-2334 {
    /* 80px - 112px */
    --heroPadding: clamp(5rem, 10vw, 7rem);
    padding-bottom: var(--heroPadding);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: calc(90/16 * 1rem);
  }
  #hero-2334 .cs-container {
    justify-content: flex-start;
    flex-direction: row;
  }
  #hero-2334 .cs-content {
    text-align: left;
    width: 100%;
    max-width: 100%;
    padding: calc(80/16 * 1rem) calc(32/16 * 1rem);
    align-items: flex-start;
  }
  #hero-2334 .cs-overlay {
    width: 100vw;
    border-radius: 0 calc(300/16 * 1rem) calc(300/16 * 1rem) 0;
    left: auto;
    right: calc(-16/16 * 1rem);
  }
  #hero-2334 .cs-title {
    width: 55%;
  }
  #hero-2334 .cs-text {
    width: 50%;
  }
  #hero-2334 .cs-picture {
    width: 56%;
    position: absolute;
    bottom: calc(var(--heroPadding)*-1 - 3rem);
    right: calc(-10/16 * 1rem);
  }
}
/* Desktop - 1024px */
@media only screen and (min-width: 64rem) {
  #hero-2334 .cs-content {
    width: 80%;
    max-width: calc(1000/16 * 1rem);
  }
  #hero-2334 .cs-graphic {
    width: calc(2982/16 * 1rem);
  }
  #hero-2334 .cs-picture {
    width: 50vw;
    /* 32px - 80px */
    right: calc(16/16 * 1rem);
  }
}
/* Large Desktop - 1300px */
@media only screen and (min-width: 81.25rem) {
  #hero-2334 .cs-content {
    padding-left: 0;
  }
}
</style>
</head>
<body>

<!--                    Hero                      -->
<!-- ============================================ -->

<section id="hero-2334">
    <div class="cs-container">
        <div class="cs-content">
            <h1 class="cs-title"><span class="cs-tag">We're Building</span> For Better Futures</h1>
            <p class="cs-text">
                We are committed to building a future where innovation, sustainability, and inclusivity come together.
            </p>
            <a href="" class="cs-button-solid">
                Get Started Today
            </a>
            <div class="cs-overlay">
                <img class="cs-graphic" aria-hidden="true" decoding="async" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/MISC/slashes.svg" alt="stripes graphic" width="1290" height="684">
            </div>
        </div>
        <!--To make your own background crops of people use https://www.remove.bg/-->
        <picture class="cs-picture">
            <source media="(max-width: 600px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/construction-man2.png">
            <source media="(min-width: 601px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/construction-man2.png">
            <img aria-hidden="true" decoding="async" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/construction-man2.png" alt="construction worker" width="581" height="662">
        </picture>
    </div>
    <picture class="cs-background">
        <source media="(max-width: 600px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/MISC/city-bg2.jpg">
        <source media="(min-width: 601px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/MISC/city-bg2.jpg">
        <img aria-hidden="true" decoding="async" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/MISC/city-bg2.jpg" alt="construction site" width="1290" height="684">
    </picture>
</section>
