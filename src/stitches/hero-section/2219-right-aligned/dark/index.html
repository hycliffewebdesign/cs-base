<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>right aligned</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---           Hero             -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #hero-2219 {
    background-color: #1a1a1a;
  }
  #hero-2219 .cs-container {
    width: 100%;
    max-width: 120rem;
    margin: auto;
    display: flex;
    flex-direction: column;
    justify-content: center;
    /* 48px - 64px */
    gap: clamp(3rem, 7vw, 4rem);
    position: relative;
  }
  #hero-2219 .cs-content {
    /* top changes to 100px on tablet */
    /* bottom 60px - 180px */
    padding: 22.5rem 1rem clamp(3.75rem, 12vw, 11.25rem);
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    z-index: 2;
  }
  #hero-2219 .cs-author {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
  }
  #hero-2219 .cs-name {
    font-size: 1.5625rem;
    font-weight: 700;
    line-height: 1.2em;
    color: var(--bodyTextColorWhite);
    display: block;
  }
  #hero-2219 .cs-job {
    font-size: 1rem;
    line-height: 1.5em;
    margin: 0 0 1rem;
    color: var(--bodyTextColorWhite);
    display: block;
  }
  #hero-2219 .cs-title {
    /* 49px - 61px */
    font-size: clamp(3.0625rem, 6vw, 3.8125rem);
    max-width: 34.625rem;
    color: var(--bodyTextColorWhite);
  }
  #hero-2219 .cs-text {
    /* 16px - 20px */
    font-size: clamp(1rem, 2vw, 1.25rem);
    max-width: 32.125rem;
    color: var(--bodyTextColorWhite);
  }
  #hero-2219 .cs-video-group {
    width: 100%;
    /* 180px - 320px */
    height: clamp(11.25rem, 40vw, 20rem);
    /* 48px - 80px */
    margin-top: clamp(3rem, 11vw, 5rem);
    display: flex;
    justify-content: flex-end;
    position: relative;
  }
  #hero-2219 .cs-video-group:hover {
    cursor: pointer;
  }
  #hero-2219 .cs-video-group:hover .cs-play {
    transform: translateY(-50%) scale(1.1);
  }
  #hero-2219 .cs-video-group video,
  #hero-2219 .cs-video-group .cs-picture {
    width: 100%;
    height: 100%;
    display: block;
  }
  #hero-2219 .cs-video-group video img,
  #hero-2219 .cs-video-group .cs-picture img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  #hero-2219 .cs-wrapper {
    width: 88%;
    position: relative;
    z-index: 1;
  }
  #hero-2219 .cs-play {
    /* 80px - 120px */
    width: clamp(5rem, 10vw, 7.5rem);
    height: auto;
    padding: 0;
    background-color: transparent;
    border: none;
    pointer-events: none;
    position: absolute;
    top: 50%;
    left: calc(clamp(5rem, 10vw, 7.5rem)*-0.5);
    transform: translateY(-50%);
    transform-origin: center;
    transition: transform 0.3s, opacity 0.3s;
  }
  #hero-2219 .cs-play:hover {
    cursor: pointer;
  }
  #hero-2219 .cs-play.cs-hide {
    opacity: 0;
    transform: translateY(-50%) scale(0);
  }
  #hero-2219 .cs-play img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  #hero-2219 .cs-background {
    width: 100%;
    height: 39.0625rem;
    position: absolute;
    top: 0;
    left: 0;
    z-index: 1;
  }
  #hero-2219 .cs-background img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  #hero-2219 .cs-background::before {
    content: "";
    width: 100%;
    height: 100%;
    background: linear-gradient(0deg, #1a1a1a 0%, rgba(26, 26, 26, 0.83) 38.94%, rgba(26, 26, 26, 0) 76.68%);
    position: absolute;
    top: 0;
    left: 0;
  }
}
/* Tablet - 768px */
@media only screen and (min-width: 48rem) {
  #hero-2219 {
    background: linear-gradient(90deg, #1a1a1a 66.48%, rgba(26, 26, 26, 0) 66.82%), #262525;
  }
  #hero-2219 .cs-container {
    align-items: flex-end;
  }
  #hero-2219 .cs-content {
    text-align: left;
    width: 47%;
    max-width: 40.375rem;
    padding-top: 6.25rem;
    align-items: flex-start;
  }
  #hero-2219 .cs-text {
    max-width: 32.125rem;
  }
  #hero-2219 .cs-author {
    position: absolute;
    /* 60px - 120px */
    bottom: clamp(3.75rem, 12vw, 7.5rem);
    left: 7.5rem;
  }
  #hero-2219 .cs-job {
    margin: 0;
  }
  #hero-2219 .cs-background {
    width: 73%;
    height: 100%;
  }
  #hero-2219 .cs-background::before {
    background: linear-gradient(0deg, #1a1a1a 0%, rgba(26, 26, 26, 0.83) 17.39%, rgba(26, 26, 26, 0) 34.24%), linear-gradient(270deg, #1a1a1a 5.72%, rgba(26, 26, 26, 0.83) 32.01%, rgba(26, 26, 26, 0) 57.49%), -556.663px -0.19989345px 115.906% no-repeat;
  }
}
/* Large Desktop - 1300px */
@media only screen and (min-width: 81.25rem) {
  #hero-2219 .cs-content {
    width: 100%;
    box-sizing: content-box;
    /* 16px - 170px */
    padding-right: clamp(1rem, 11vw, 10.625rem);
  }
}
</style>
</head>
<body>

<!-- ============================================ -->
<!--                    Hero                      -->
<!-- ============================================ -->

<section id="hero-2219">
    <div class="cs-container">
        <div class="cs-content">
            <div class="cs-author">
                <span class="cs-name">Chris Brown</span>
                <span class="cs-job">Wedding Photographer</span>
            </div>
            <h1 class="cs-title">Love to Capture Your Best Moments</h1>
            <p class="cs-text">
                Authentic wedding photography emphasises candid shots that capture real emotions, reactions, and interactions among the couple, their families, and guests.
            </p>
            <div class="cs-video-group">
                <div class="cs-wrapper">
                    <!--Compress your video and upload it to a CDN like Digital Oceans Spaces so the video file doesn't cause load time issues. You can also remove the video tag and uncomment the picture tag to use a image instead of a video. Don't forget to remove the cs-play button!-->
                    <!-- <video loading="lazy" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Videos/gym.mp4" autoplay="false"></video> -->
                    <picture class="cs-picture">
                        <source media="(max-width: 600px)" srcset="https://csimages2.nyc3.digitaloceanspaces.com/Images/MISC/photography-video.jpg">
                        <source media="(min-width: 601px)" srcset="https://csimages2.nyc3.digitaloceanspaces.com/Images/MISC/photography-video.jpg">
                        <img loading="lazy" decoding="async" src="https://csimages2.nyc3.digitaloceanspaces.com/Images/MISC/photography-video.jpg" alt="body builder" width="630" height="877">
                    </picture>
                    <button class="cs-play" aria-label="click to play video">
                        <img src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Icons/photograph-play.svg" alt="play icon" class="cs-icon" width="24" height="24" aria-hidden="true" decoding="async">
                    </button>
                </div>
            </div>
        </div>
        <picture class="cs-background">
            <!--Mobile Image-->
            <source media="(max-width: 600px)" srcset="https://csimages2.nyc3.digitaloceanspaces.com/Images/MISC/photography-hero.jpg">
            <!--Tablet and above Image-->
            <source media="(min-width: 601px)" srcset="https://csimages2.nyc3.digitaloceanspaces.com/Images/MISC/photography-hero.jpg">
            <img loading="lazy" decoding="async" src="https://csimages2.nyc3.digitaloceanspaces.com/Images/MISC/photography-hero.jpg" alt="photographer" width="1280" height="568">
        </picture>
    </div>
</section>

<script>function togglePlayButton() {
    // Select all elements with the .cs-picture class
    const pictures = document.querySelectorAll('#hero-2219 .cs-video-group');
  
    // Add a click event listener to each .cs-picture element
    pictures.forEach(picture => {
      picture.addEventListener('click', () => {
        // Select all elements with the .cs-play class
        const playButtons = document.querySelectorAll('#hero-2219 .cs-play');
        
        // Toggle the .cs-hide class on each .cs-play element
        playButtons.forEach(button => {
          button.classList.toggle('cs-hide');
        });
      });
    });
  }
  
  // Call the function to activate the event listeners
  togglePlayButton();
  
  function toggleVideoPlayback() {
    // Select the video element
    const video = document.querySelector('#hero-2219 video');
  
    // Add a click event listener to the video
    video.addEventListener('click', () => {
      // Check if the video is paused
      if (video.paused) {
        video.play(); // Play the video if it is paused
      } else {
        video.pause(); // Pause the video if it is playing
      }
    });
  }
  
  // Call the function to activate the event listener
  toggleVideoPlayback();</script>
</body>
</html>
