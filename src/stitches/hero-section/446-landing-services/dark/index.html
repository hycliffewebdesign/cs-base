<!DOCTYPE html>

<head>

  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>

/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #hero-446 {

    padding: clamp(9rem, 25.95vw, 19.75rem) 1rem 0;

    position: relative;
    z-index: 1;
  }
  #hero-446 .cs-background {

    /* Overlay */
    content: "";
    width: 100%;
    height: 100%;
    background: #1a1a1a;
    mix-blend-mode: multiply;
    opacity: 0.4;
    position: absolute;
    display: block;
    top: 0;
    left: 0;
    z-index: 1;
    /* prevents the cursor from interacting with it */
    pointer-events: none;
  }
  #hero-446 .cs-background img {
    position: absolute;
    top: 0;
    left: 0;

    width: 100%;

  #hero-446 .cs-content {
    margin: auto;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }
  #hero-446 .cs-tag {

    margin-bottom: clamp(0.75rem, 2vw, 1.25rem);

    box-sizing: border-box;
    display: inline-block;
  }
  #hero-446 .cs-title {

  }
  #hero-446 .cs-text {
    /* 16px - 20px */

    width: 100%;
    /* 464px - 622px */
    max-width: clamp(29rem, 60vw, 38.785rem);
    margin: 0;
    color: var(--bodyTextColorWhite);
  }
  #hero-446 .cs-card-group {
    width: 100%;
    padding: 0;
    margin: 0;
    background-color: #fff;
    filter: drop-shadow(0px 24px 54px rgba(87, 107, 147, 0.12));

    border-radius: clamp(0.75rem, 2vw, 1.5rem) clamp(0.75rem, 2vw, 1.5rem) 0 0;
    display: flex;
    justify-content: center;
    align-items: stretch;
    flex-wrap: wrap;
  }
  #hero-446 .cs-item {
    list-style: none;
    width: 50%;
    margin: 0;
    /* 16px - 48px top and bottom */
    /* 12px - 110px top and bottom */
    padding: clamp(1rem, 3.7vw, 3rem) clamp(0.75rem, 3vw, 6.875rem);
    /* prevents padding and border from affecting height and width */
    box-sizing: border-box;
    border-right: 1px solid #dcdcdd;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
  }
  #hero-446 .cs-item:nth-of-type(2) {
    border: none;
  }
  #hero-446 .cs-item:last-of-type {
    width: 100%;
    border-top: 1px solid #dcdcdd;
    border-right: none;
  }
  #hero-446 .cs-number {
    /* 31px - 61px */
    font-size: clamp(1.9375rem, 4vw, 3.8125rem);
    line-height: 1.2em;
    font-weight: 700;
    text-align: center;
    color: var(--primary);
    margin: 0 0 0.25rem 0;
    display: block;
  }
  #hero-446 .cs-desc {
    /* 14px - 16px */
    font-size: clamp(0.875rem, 1.5vw, 1rem);
    line-height: 1.2em;
    font-weight: 400;
    text-align: center;
    max-width: 12.5rem;
    margin: 0;
    color: var(--bodyTextColor);
    display: block;
  }
}
/* In-Between - 650px */
@media only screen and (min-width: 40.625rem) {

  #hero-446 .cs-item:nth-of-type(2) {
    border-right: 1px solid #dcdcdd;
  }
  #hero-446 .cs-item:last-of-type {
    width: 33.33%;
    border: none;
  }
}
