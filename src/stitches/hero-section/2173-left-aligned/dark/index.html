<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>left aligned</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---           Hero             -->
<--- -------------------------- -*/
/* Mobile */
@media only screen and (min-width: 0rem) {
  #hero-2173 {
    overflow: hidden;
    background-color: #f7f7f7;
    position: relative;
    z-index: 1;
  }
  #hero-2173 .cs-content {
    position: relative;
    z-index: 1;
  }
  #hero-2173 .cs-wrapper {
    /* 60px - 80px top */
    /* 60px - 100px Bottom */
    padding: clamp(3.75rem, 5vw, 5rem) 1rem clamp(3.75rem, 9.6vw, 6.25rem);
  }
  #hero-2173 .cs-flex {
    /* changes to clamp at tablet */
    padding-left: 3.75rem;
  }
  #hero-2173 .cs-title {
    /* 39px - 82px */
    font-size: clamp(2.4375rem, 6.5vw, 5.125rem);
    text-transform: uppercase;
    line-height: 1.1em;
    max-width: 18ch;
    /* 16px - 78px */
    margin-bottom: clamp(1rem, 6vw, 4.875rem);
  }
  #hero-2173 .cs-text {
    /* 16px - 20px */
    font-size: clamp(1rem, 2vw, 1.25rem);
    margin-bottom: 1rem;
  }
  #hero-2173 .cs-text:last-of-type {
    margin-bottom: 2rem;
  }
  #hero-2173 .cs-button-solid {
    font-size: 1rem;
    /* 46px - 56px */
    line-height: clamp(2.875rem, 5.5vw, 3.5rem);
    text-decoration: none;
    font-weight: 700;
    text-align: center;
    margin: 0;
    color: #fff;
    min-width: 9.375rem;
    padding: 0 1.5rem;
    background-color: var(--primary);
    display: inline-block;
    position: relative;
    z-index: 1;
    /* prevents padding from adding to the width */
    box-sizing: border-box;
  }
  #hero-2173 .cs-button-solid:before {
    content: "";
    position: absolute;
    height: 100%;
    width: 0%;
    background: #000;
    opacity: 1;
    top: 0;
    left: 0;
    z-index: -1;
    transition: width 0.3s;
  }
  #hero-2173 .cs-button-solid:hover:before {
    width: 100%;
  }
  #hero-2173 .cs-picture {
    width: 100%;
    height: auto;
    display: block;
    position: relative;
    z-index: 1;
  }
  #hero-2173 .cs-picture img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: top;
    position: absolute;
    top: 0;
    left: 0;
  }
  #hero-2173 .cs-picture1 {
    width: 100%;
    height: 110vw;
  }
  #hero-2173 .cs-picture2 {
    width: 100%;
    height: 68vw;
    /* removed at desktop */
    max-height: 21.3125rem;
    margin-left: 4.75rem;
  }
}
/* Tablet - 700px */
@media only screen and (min-width: 43.75rem) {
  #hero-2173 {
    /* make this value the same height as your navigation for best results, and only use a navigation with a background color, not transparent. wont look right */
    margin-top: 7.5rem;
  }
  #hero-2173 .cs-container {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
  }
  #hero-2173 .cs-content {
    width: 57vw;
  }
  #hero-2173 .cs-flex {
    padding-left: 8.75rem;
  }
  #hero-2173 .cs-picture1 {
    width: 56vw;
    height: 100vh;
    position: absolute;
    top: 0%;
    right: 82%;
    z-index: -1;
    transform: translateY(-10rem);
  }
  #hero-2173 .cs-picture2 {
    width: auto;
    margin-left: 13.5rem;
  }
}
/* Small Desktop - 1024px */
@media only screen and (min-width: 64rem) {
  #hero-2173 {
    padding-right: 18.75rem;
  }
  #hero-2173 .cs-content {
    width: 54%;
    max-width: 34rem;
    position: relative;
    z-index: 1;
  }
  #hero-2173 .cs-wrapper {
    padding-left: 0;
    padding-right: 0;
  }
  #hero-2173 .cs-title {
    max-width: 12ch;
  }
  #hero-2173 .cs-picture1 {
    width: 60vw;
    right: calc(100% - 5rem);
  }
  #hero-2173 .cs-picture2 {
    width: 30vw;
    max-width: 21.875rem;
    height: 100vh;
    max-height: 100vh;
    margin: 0;
    position: absolute;
    top: 50%;
    left: calc(100% + 2.5rem);
    transform: translateY(-50%);
  }
}
/* Large Desktop - 1920px */
@media only screen and (min-width: 120rem) {
  #hero-2173 {
    padding-right: 0;
    position: relative;
    z-index: 1;
  }
  #hero-2173 .cs-container {
    width: 100%;
    max-width: 80rem;
    margin: auto;
    padding-right: 5rem;
    box-sizing: border-box;
    position: initial;
  }
  #hero-2173 .cs-content {
    position: initial;
  }
  #hero-2173 .cs-picture1 {
    height: auto;
    margin-right: -5.875rem;
    right: 50%;
    top: 0;
    bottom: 0;
    transform: none;
  }
  #hero-2173 .cs-picture2 {
    height: auto;
    width: 20vw;
    max-height: none;
    max-width: none;
    margin-left: 37.875rem;
    left: 50%;
    top: 0;
    bottom: 0;
    transform: none;
  }
}
</style>
</head>
<body>

<!-- ============================================ -->
<!--                     Hero                     -->
<!-- ============================================ -->

<!--NOTE: There is a spacing note on Tablet about adjusting the marign top of the section to match the height of whatever navbar you add on top of it-->

<section id="hero-2173">
    <div class="cs-container">
        <div class="cs-content">
            <picture class="cs-picture cs-picture1">
                <!--Mobile Image-->
                <source media="(max-width: 600px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/wedding10.jpg">
                <!--Tablet and above Image-->
                <source media="(min-width: 601px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/wedding10.jpg">
                <img loading="lazy" decoding="async" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/wedding10.jpg" alt="people at a wedding" width="1058" height="936">
            </picture>
            <div class="cs-wrapper">
                <h2 class="cs-title">Make Your Wedding Dream Come True</h2>
                <div class="cs-flex">
                    <p class="cs-text">
                        Authentic wedding photography emphasizes candid shots that capture real emotions, reactions, and interactions among the couple, their families, and guests. These moments are often spontaneous and heartfelt. 
                    </p>
                    <a href="" class="cs-button-solid">Book An Appointment</a>
                </div>
            </div>
            <picture class="cs-picture cs-picture2">
                <!--Mobile Image-->
                <source media="(max-width: 1023px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/wedding11-m.jpg">
                <!--Tablet and above Image-->
                <source media="(min-width: 1024px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/wedding11.jpg">
                <img loading="lazy" decoding="async" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/wedding11.jpg" alt="bride" width="350" height="936">
            </picture>
        </div>
    </div>
</section>

<script></script>
</body>
</html>
