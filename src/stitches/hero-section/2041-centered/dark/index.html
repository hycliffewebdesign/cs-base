<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>centered</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---           Hero             -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #hero-2041 {
    /* 200px - 300px - top leaving extra space for the navigation */
    /* 60px - 100px bottom */
    padding: clamp(12.5rem, 25.95vw, 18.75em) 1rem clamp(3.75rem, 7.82vw, 6.25rem);
    /* prevents the topper line from causing an overflow */
    overflow: hidden;
    position: relative;
    z-index: 1;
  }
  #hero-2041 .cs-container {
    width: 100%;
    max-width: 80rem;
    margin: auto;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    /* 60px - 180px */
    gap: clamp(3.75rem, 13vw, 11.25rem);
  }
  #hero-2041 .cs-content {
    text-align: center;
    width: 100%;
    max-width: 53.125rem;
    /* prevents padding from affecting height and width */
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    z-index: 1;
  }
  #hero-2041 .cs-topper {
    line-height: 1em;
    padding: 0.25rem 1rem;
    background-color: #fff;
    color: var(--primary);
    border-radius: 0.25rem;
    position: relative;
    z-index: 1;
  }
  #hero-2041 .cs-topper:before {
    content: "";
    width: 100%;
    height: 100%;
    background: var(--primary);
    opacity: 0.1;
    display: block;
    position: absolute;
    top: 0;
    left: 0;
  }
  #hero-2041 .cs-title {
    /* 39px - 80px */
    font-size: clamp(2.4375rem, 6vw, 5rem);
    max-width: 20ch;
    color: var(--bodyTextColorWhite);
  }
  #hero-2041 .cs-text {
    max-width: 35.25rem;
    margin-bottom: 2rem;
    color: var(--bodyTextColorWhite);
  }
  #hero-2041 .cs-button-solid {
    font-size: 1rem;
    font-weight: 700;
    /* 46px - 56px */
    line-height: clamp(2.875rem, 5.5vw, 3.5rem);
    text-align: center;
    text-decoration: none;
    max-width: 11.25rem;
    margin: 0;
    /* prevents padding from adding to the width */
    box-sizing: border-box;
    padding: 0 2rem;
    background-color: var(--primary);
    overflow: hidden;
    color: var(--bodyTextColorWhite);
    border: none;
    border-radius: 0.5rem;
    display: inline-block;
    position: relative;
    z-index: 1;
  }
  #hero-2041 .cs-button-solid:before {
    content: "";
    width: 0%;
    height: 100%;
    background: #1a1a1a;
    opacity: 1;
    position: absolute;
    top: 0;
    left: 0;
    z-index: -1;
    transition: width 0.3s;
  }
  #hero-2041 .cs-button-solid:hover:before {
    width: 100%;
  }
  #hero-2041 .cs-form {
    width: 100%;
    margin: 0;
    padding: 1rem;
    background-color: #fff;
    box-shadow: 0px 4px 40px 0px rgba(0, 0, 0, 0.08);
    border-radius: 0.5rem;
    display: flex;
    flex-direction: column;
    /* 16px - 20px */
    gap: clamp(1rem, 2.3vw, 1.25rem);
  }
  #hero-2041 .cs-label {
    font-size: 1rem;
    font-weight: 700;
    line-height: 1.2em;
    color: var(--headerColor);
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }
  #hero-2041 .cs-flex {
    display: inline-flex;
    justify-content: flex-start;
    gap: 0;
  }
  #hero-2041 .cs-color {
    color: #ff4747;
  }
  #hero-2041 .cs-input {
    font-size: 0.875rem;
    font-weight: 400;
    line-height: 1.5em;
    padding: 1rem;
    background-color: #f7f7f7;
    color: #767676;
    border: none;
    border-radius: 0.5rem;
  }
  #hero-2041 .cs-submit {
    width: max-content;
    align-self: center;
  }
  #hero-2041 .cs-background {
    width: 100%;
    height: 66%;
    display: block;
    position: absolute;
    top: 0;
    left: 0;
    z-index: -2;
  }
  #hero-2041 .cs-background:before {
    /* Overlay */
    content: "";
    width: 100%;
    height: 100%;
    background: #000;
    /* prevents the cursor from interacting with it */
    pointer-events: none;
    opacity: 0.48;
    display: block;
    position: absolute;
    top: 0;
    left: 0;
    z-index: 1;
  }
  #hero-2041 .cs-background img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    top: 0;
    left: 0;
  }
}
/* Tablet - 768px */
@media only screen and (min-width: 48rem) {
  #hero-2041 .cs-form {
    flex-direction: row;
    align-items: flex-end;
  }
  #hero-2041 .cs-submit {
    /* causes the submit button to grow to it's "auto" width and shrinks the inputs. this makes everything fit within cs-form */
    flex: 1 0 auto;
    align-self: flex-end;
  }
  #hero-2041 .cs-label {
    width: 100%;
    min-width: 0;
  }
  #hero-2041 .cs-background {
    height: 84%;
  }
}
/* Large Desktop - Parallax Effect - 1600px */
@media only screen and (min-width: 100rem) {
  #hero-2041 .cs-background {
    background: url("https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/MISC/dental-hero.png");
    background-position: center;
    background-size: cover;
    background-repeat: no-repeat;
    background-attachment: fixed;
  }
  #hero-2041 .cs-background img {
    display: none;
  }
}
</style>
</head>
<body>

<!-- ============================================ -->
<!--                    Hero                      -->
<!-- ============================================ -->

<section id="hero-2041">
    <div class="cs-container">
        <div class="cs-content">
            <span class="cs-topper">Dental Care for Everyone</span>
            <h1 class="cs-title">We Provide Dental Services & Surgery</h1>
            <p class="cs-text">From preventative care to restorative dentistry, our team is dedicated to providing the best possible dental care for you.</p>
            <a href="" class="cs-button-solid">Get Started</a>
            <!--Bottom Corners-->
        </div>
        <form class="cs-form" id="cs-form-2041" name="Landing Form">
            <label class="cs-label">
                <div class="cs-flex">
                    Email <span class="span cs-color">*</span>
                </div>
                <input class="cs-input" required type="text" id="email-2041" name="email" placeholder="Your email">
            </label>
            <label class="cs-label">
                <div class="cs-flex">
                    Phone <span class="span cs-color">*</span>
                </div>
                <input class="cs-input" required type="tel" id="phone-2041" name="phone" placeholder="Phone number">
            </label>
            <label class="cs-label">
                <div class="cs-flex">
                    Date <span class="span cs-color">*</span>
                </div>
                <input class="cs-input" required type="date" id="date-2041" name="date" placeholder="Choose a date">
            </label>
            <button class="cs-button-solid cs-submit">Get Started</button>
        </form>
    </div>

    <!-- Background Image -->
    <picture class="cs-background">
        <source media="(max-width: 600px)" srcset="https://csimages2.nyc3.digitaloceanspaces.com/Images/MISC/dental-hero.jpg">
        <source media="(min-width: 601px)" srcset="https://csimages2.nyc3.digitaloceanspaces.com/Images/MISC/dental-hero.jpg">
        <img loading="lazy" decoding="async" src="https://csimages2.nyc3.digitaloceanspaces.com/Images/MISC/dental-hero.jpg" alt="meeting" width="1920" height="1200" aria-hidden="true">
    </picture>
</section>

<script></script>
</body>
</html>
