<section id="hero-2410">
    <div class="cs-container">
        <div class="cs-content">
            <span class="cs-topper">Welcome to Poop Patrol</span>
            <h1 class="cs-title">Professional Pet Waste Removal Service</h1>
            <p class="cs-text">
                We help busy pet owners enjoy cleaner yards with reliable and discreet pet waste removal services designed for residential and commercial spaces.
            </p>
            <a href="" class="cs-button-solid">Get a Free Estimate</a>
        </div>
        <!--Hero Image-->
        <div class="cs-image-group">
            <!-- IF you have a wide image that gets cut off on the right, go the the cs-picture img and set the left value to a negative number till its where you like it in frame-->
            <picture class="cs-picture">
                <!--Mobile Image-->
                <source media="(max-width: 600px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/MISC/dog.png">
                <!--Tablet and above Image-->
                <source media="(min-width: 601px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/MISC/dog.png">
                <img decoding="async" fetchpriority="high" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/MISC/dog.png" alt="dog" width="635" height="836">
            </picture>
            <!--Circle Background-->
            <!--Download the SVG from the CDN by copy ad pasting its link into your browser and saving it. Then the cs-circle fill property should override it and set it to the primary color of your site-->
            <img class="cs-circle" decoding="async" fetchpriority="high" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Graphics/noise-bg.svg" alt="graphic" width="758" height="758">

            <!--Arrow Box-->
            <img class="cs-arrow" decoding="async" fetchpriority="high" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Graphics/black-squiggle-arrow.svg" alt="icon" width="76" height="162">

            <!--Steaming pile-->
            <img class="cs-no-no" decoding="async" fetchpriority="high" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Graphics/yeah-thats-poop.svg" alt="icon" width="48" height="48">
        </div>
    </div>
    <!--White curve-->
    <svg class="cs-wave" width="1920" height="167" viewBox="0 0 1920 167" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M1920 167H0V0C111.116 45.3334 456.485 136 951 136C1445.52 136 1803.21 45.3334 1920 0V167Z" fill="white"/>
        </svg>
</section>
