<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>right aligned</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---            Hero            -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #hero-669 {
    /* centers button */
    text-align: center;
    /* 120px - 300px top */
    /* 60px - 150px  bottom */
    padding: clamp(7.5rem, 23.82vw, 18.75rem) 1rem clamp(3.75rem, 14.82vw, 9.375rem);
    position: relative;
    z-index: 1;
  }
  #hero-669:before {
    /* red backgorund box */
    content: "";
    width: 100%;
    height: 85%;
    background: var(--primary);
    opacity: 1;
    position: absolute;
    display: block;
    top: 0;
    left: 0;
    z-index: -1;
  }
  #hero-669 .cs-container {
    width: 100%;
    max-width: 80rem;
    margin: auto;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    position: relative;
  }
  #hero-669 .cs-content {
    text-align: center;
    max-width: 39.375rem;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }
  #hero-669 .cs-title {
    /* 39px - 61px */
    font-size: clamp(2.4375rem, 6.4vw, 3.8125rem);
    font-weight: 900;
    line-height: 1.2em;
    text-align: inherit;
    /* 16 characters wide including spaces */
    max-width: 16ch;
    margin: 0 0 1rem 0;
    color: var(--bodyTextColorWhite);
    position: relative;
  }
  #hero-669 .cs-text {
    /* 16px - 20px */
    font-size: clamp(1rem, 1.5vw, 1.25rem);
    line-height: 1.5em;
    text-align: inherit;
    width: 100%;
    max-width: 32.625rem;
    margin: 0 0 2rem 0;
    color: var(--bodyTextColorWhite);
    opacity: 0.8;
  }
  #hero-669 .cs-button-group {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
    gap: 0.75rem;
  }
  #hero-669 .cs-button-solid {
    font-size: 1rem;
    /* 46px - 56px */
    line-height: clamp(2.875rem, 5.5vw, 3.5rem);
    text-decoration: none;
    font-weight: 700;
    text-align: center;
    margin: auto;
    color: #1a1a1a;
    min-width: 9.375rem;
    margin: 0;
    padding: 0 1.5rem;
    background-color: #fff;
    border-radius: 0.25rem;
    display: inline-block;
    position: relative;
    z-index: 1;
    /* prevents padding from adding to the width */
    box-sizing: border-box;
    transition: color 0.3s;
  }
  #hero-669 .cs-button-solid:before {
    content: "";
    position: absolute;
    height: 100%;
    width: 0%;
    background: var(--headerColor);
    opacity: 1;
    top: 0;
    left: 0;
    z-index: -1;
    border-radius: 0.25rem;
    transition: width 0.3s;
  }
  #hero-669 .cs-button-solid:hover {
    color: #fff;
  }
  #hero-669 .cs-button-solid:hover:before {
    width: 100%;
  }
  #hero-669 .cs-button-transparent {
    font-size: 1rem;
    /* 46px - 56px */
    line-height: clamp(2.875rem, 5.5vw, 3.5rem);
    text-decoration: none;
    font-weight: 700;
    text-align: center;
    margin: auto;
    color: #fff;
    min-width: 9.375rem;
    margin: 0;
    padding: 0 1.5rem;
    background-color: transparent;
    border-radius: 0.25rem;
    display: inline-block;
    position: relative;
    z-index: 1;
    /* prevents padding from adding to the width */
    box-sizing: border-box;
    transition: color 0.3s;
  }
  #hero-669 .cs-button-transparent:before {
    content: "";
    position: absolute;
    height: 100%;
    width: 0%;
    background: var(--headerColor);
    opacity: 1;
    top: 0;
    left: 0;
    z-index: -1;
    border-radius: 0.25rem;
    transition: width 0.3s;
  }
  #hero-669 .cs-button-transparent:hover {
    color: #fff;
  }
  #hero-669 .cs-button-transparent:hover:before {
    width: 100%;
  }
  #hero-669 .cs-stats-group {
    width: 100%;
    max-width: 32.625rem;
    margin: 0;
    /* 48px - 64px */
    margin-top: clamp(3rem, 6vw, 4rem);
    /* 48px - 64px, removed at desktop */
    margin-bottom: clamp(3rem, 6vw, 4rem);
    padding: 0;
    display: flex;
    /* changes at desktop */
    justify-content: space-evenly;
    align-items: center;
  }
  #hero-669 .cs-item {
    list-style: none;
    /* 100px - 150px */
    width: clamp(6.25rem, 16vw, 9.375rem);
    height: auto;
    border-radius: 50%;
    border: 1px solid #fff;
    /* makes it square - when width divided by height equals 1 - creates a square */
    aspect-ratio: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }
  #hero-669 .cs-desc {
    /* 14px - 16px */
    font-size: clamp(0.875rem, 2.1vw, 1rem);
    line-height: 1.5em;
    margin: 0;
    color: #cdcdcd;
    display: block;
  }
  #hero-669 .cs-number {
    /* 31px - 49px */
    font-size: clamp(1.9375rem, 3.8vw, 3.0625rem);
    line-height: 1.2em;
    font-weight: 900;
    color: var(--bodyTextColorWhite);
    display: block;
  }
  #hero-669 .cs-picture {
    width: 100%;
    max-width: 38.5rem;
    /* Changes at desktop */
    height: 25rem;
    overflow: hidden;
    display: block;
    position: relative;
  }
  #hero-669 .cs-picture img {
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    width: 100%;
    /* makes image act as a background image */
    object-fit: cover;
  }
}
/* Small Desktop - 1024px */
@media only screen and (min-width: 64rem) {
  #hero-669 {
    /* clips the red box from overflowing the section */
    overflow: hidden;
  }
  #hero-669:before {
    /* removed from section container and added to cs-container for easier horizontal positioning */
    display: none;
  }
  #hero-669 .cs-container {
    flex-direction: row;
    justify-content: flex-end;
  }
  #hero-669 .cs-container:before {
    /* red backgorund box */
    content: "";
    width: 100vw;
    height: 300%;
    background: var(--primary);
    opacity: 1;
    position: absolute;
    display: block;
    top: 50%;
    /* 200px - 305px, posiitoming it off the right edge of the container whihc has a fixed width so  */
    left: clamp(12.5rem, 20vw, 19.0625rem);
    z-index: -1;
    transform: translateY(-50%);
  }
  #hero-669 .cs-content {
    text-align: left;
    width: 53%;
    /* prevents flex-box from squishing it */
    flex: none;
    align-items: flex-start;
  }
  #hero-669 .cs-stats-group {
    margin-bottom: 0;
    justify-content: space-between;
  }
  #hero-669 .cs-picture {
    width: 50vw;
    max-width: 100%;
    /* 714px - 800px */
    height: clamp(44.625rem, 60vw, 50rem);
    /* push 100px left of that center line from the left property. this ensures it always stays exactly 100px right of the center line and wont move */
    margin-right: 6.25rem;
    position: absolute;
    bottom: 0;
    /* send the left edge of the element to line up at the center of the screen */
    right: 50%;
  }
}
</style>
</head>
