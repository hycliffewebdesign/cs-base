<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>left aligned</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---           Hero             -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #hero-2042 {
    /* Centers button */
    text-align: center;
    /* 200px - 300px - leaving extra space for the navigation */
    padding: clamp(12.5rem, 25.95vw, 18.75em) calc(16/16 * 1rem);
    /* prevents the topper line from causing an overflow */
    overflow: hidden;
    position: relative;
    z-index: 1;
  }
  #hero-2042 .cs-container {
    width: 100%;
    max-width: calc(1280/16 * 1rem);
    margin: auto;
    /* turned off pointer events on the container so the video stops when you click on the background as well */
    pointer-events: none;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    /* 120px - 465px */
    gap: clamp(7.5rem, 24vw, 29.0625rem);
  }
  #hero-2042 .cs-content {
    text-align: center;
    width: 100%;
    /* changes to 564px on tablet */
    max-width: calc(328/16 * 1rem);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }
  #hero-2042 .cs-title {
    /* 39px - 61px */
    font-size: clamp(2.4375rem, 5vw, 3.8125rem);
    color: var(--bodyTextColorWhite);
  }
  #hero-2042 .cs-text {
    margin-bottom: calc(32/16 * 1rem);
    color: var(--bodyTextColorWhite);
  }
  #hero-2042 .cs-button-group {
    display: flex;
    justify-content: flex-start;
    flex-wrap: wrap;
    gap: calc(8/16 * 1rem);
  }
  #hero-2042 .cs-play {
    /* 80px - 120px */
    width: clamp(5rem, 14vw, 7.5rem);
    height: clamp(5rem, 14vw, 7.5rem);
    background-color: rgba(255, 255, 255, 0.2);
    cursor: pointer;
    border: none;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9;
    transition: opacity 0.3s, transform 0.3s;
    backdrop-filter: blur(8px);
    flex: none;
  }
  #hero-2042 .cs-play.cs-hide {
    opacity: 0;
    transform: scale(0);
  }
  #hero-2042 .cs-button-solid {
    font-size: calc(16/16 * 1rem);
    font-weight: 700;
    /* 46px - 56px */
    line-height: clamp(2.875rem, 5.5vw, 3.5rem);
    text-align: center;
    text-decoration: none;
    margin: 0;
    /* prevents padding from adding to the width */
    box-sizing: border-box;
    padding: 0 calc(32/16 * 1rem);
    background-color: var(--primary);
    pointer-events: auto;
    color: var(--bodyTextColorWhite);
    border-radius: calc(8/16 * 1rem);
    display: inline-block;
    position: relative;
    z-index: 1;
  }
  #hero-2042 .cs-button-solid:before {
    content: "";
    width: 0%;
    height: 100%;
    background: #000;
    opacity: 1;
    border-radius: calc(4/16 * 1rem);
    position: absolute;
    top: 0;
    left: 0;
    z-index: -1;
    transition: width 0.3s;
  }
  #hero-2042 .cs-button-solid:hover:before {
    width: 100%;
  }
  #hero-2042 .cs-video-wrapper {
    width: 100%;
    /* changes to 90% at tablet, then back to 100% at desktop */
    height: 100%;
    display: block;
    position: absolute;
    top: 0;
    left: 0;
    z-index: -1;
  }
  #hero-2042 .cs-video-wrapper:hover {
    cursor: pointer;
  }
  #hero-2042 .cs-video-wrapper video,
  #hero-2042 .cs-video-wrapper .cs-picture {
    width: 100%;
    height: 100%;
    /* makes image act as a background image */
    object-fit: cover;
    position: absolute;
    top: 0;
    left: 0;
  }
  #hero-2042 .cs-video-wrapper video img,
  #hero-2042 .cs-video-wrapper .cs-picture img {
    width: 100%;
    height: 100%;
    /* makes image act as a background image */
    object-fit: cover;
    position: absolute;
    top: 0;
    left: 0;
  }
  #hero-2042 .cs-video-wrapper:before {
    /* Overlay */
    content: "";
    width: 100%;
    height: 100%;
    background: linear-gradient(0deg, rgba(0, 0, 0, 0) 16.54%, rgba(0, 0, 0, 0.64) 59.41%), linear-gradient(0deg, rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4));
    /* prevents the cursor from interacting with it */
    pointer-events: none;
    display: block;
    position: absolute;
    top: 0;
    left: 0;
    z-index: 1;
  }
}
/* Tablet - 768px */
@media only screen and (min-width: 48rem) {
  #hero-2042 .cs-container {
    padding-right: calc(100/16 * 1rem);
    flex-direction: row;
    justify-content: flex-start;
  }
  #hero-2042 .cs-content {
    text-align: left;
    max-width: calc(564/16 * 1rem);
    align-items: flex-start;
  }
  #hero-2042 .cs-video-wrapper::before {
    background: linear-gradient(270deg, rgba(0, 0, 0, 0) 51.02%, rgba(0, 0, 0, 0.64) 75.13%), linear-gradient(0deg, rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4));
  }
}
</style>
</head>
<body>

<!-- ============================================ -->
<!--                    Hero                      -->
<!-- ============================================ -->

<section id="hero-2042">
    <div class="cs-container">
        <div class="cs-content">
            <span class="cs-topper">Dental Care for Everyone</span>
            <h1 class="cs-title">We Provide Dental Services & Surgery</h1>
            <p class="cs-text">
                From preventative care to restorative dentistry, our team is dedicated  to providing the best possible dental care for you.
            </p>
            <div class="cs-button-group">
                <a href="" class="cs-button-solid">Get Started</a>
            </div>
        </div>
        <button class="cs-play" aria-label="click to play video">
            <img class="cs-icon" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Icons/play-right.svg" alt="play icon" width="24" height="24" aria-hidden="true" decoding="async">
        </button>
    </div>

    <div class="cs-video-wrapper">
        <!--Compress your video and upload it to a CDN like Digital Oceans Spaces so the video file doesn't cause load time issues. You can also remove the video tag and uncomment the picture tag to use a image instead of a video. Don't forget to remove the cs-play button!-->
        <video loading="lazy" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Videos/gym.mp4" muted></video>
        <!-- <picture class="cs-picture">
            <source media="(max-width: 600px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Graphics/gym-hero-image-2.png">
            <source media="(min-width: 601px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Graphics/gym-hero-image-2.png">
            <img loading="lazy" decoding="async" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Graphics/gym-hero-image-2.png" alt="body builder" width="630" height="877">
        </picture> -->
    </div>
</section>

<script>function togglePlayButton() {
        // Select all elements with the .cs-picture class
        const picture = document.querySelector('#hero-2042 .cs-video-wrapper');
        const playButton = document.querySelector('#hero-2042 .cs-play');

        function togglePlayButton() {
            playButton.classList.toggle('cs-hide');
        }

        picture.addEventListener('click', togglePlayButton);
        playButton.addEventListener('click', togglePlayButton);
    }

    // Call the function to activate the event listeners
    togglePlayButton();

    function toggleVideoPlayback() {
        // Select the video element
        const video = document.querySelector('#hero-2042 video');
        const playButton = document.querySelector('#hero-2042 .cs-play');

        function togglePlay() {
            // Check if the video is paused
            if (video.paused) {
                video.play(); // Play the video if it is paused
            } else {
                video.pause(); // Pause the video if it is playing
            }
        }

        video.addEventListener("click", togglePlay);
        playButton.addEventListener("click", togglePlay);
    }

    // Call the function to activate the event listener
    toggleVideoPlayback();</script>
</body>
</html>
