<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>left aligned</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---            Hero            -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #hero-2470 {
    padding: var(--sectionPadding);
    /* 180px - 200px top */
    /* 60px - 120px bottom */
    padding: clamp(10.25rem, 16.82vw, 12.5rem) 1rem clamp(3.75rem, 8vw, 7.5rem);
    position: relative;
  }
  #hero-2470 .cs-container {
    width: 100%;
    max-width: 80rem;
    margin: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    /* 48px - 64px */
    gap: clamp(3rem, 6vw, 4rem);
  }
  #hero-2470 .cs-content {
    /* set text align to center if content needs to be center aligned */
    text-align: left;
    width: 100%;
    /* prevents padding and border from affecting height and width */
    display: flex;
    flex-direction: column;
    /* aligns content to the left, set to center to center align */
    align-items: flex-start;
  }
  #hero-2470 .cs-title {
    /* 39px - 61px */
    font-size: clamp(2.4375rem, 6.4vw, 3.8125rem);
    max-width: none;
  }
  #hero-2470 .cs-button-solid {
    font-size: 1rem;
    font-weight: 700;
    /* 46px - 56px */
    line-height: clamp(2.875rem, 5.5vw, 3.5rem);
    text-align: center;
    text-decoration: none;
    min-width: 15.625rem;
    margin: 0;
    /* prevents padding from adding to the width */
    box-sizing: border-box;
    padding: 0 1.5rem;
    background-color: var(--primary);
    color: #fff;
    border-radius: 0.25rem;
    display: inline-block;
    position: relative;
    z-index: 1;
  }
  #hero-2470 .cs-button-solid:before {
    content: "";
    width: 0%;
    height: 100%;
    background: #000;
    opacity: 1;
    border-radius: 0.25rem;
    position: absolute;
    top: 0;
    left: 0;
    z-index: -1;
    transition: width 0.3s;
  }
  #hero-2470 .cs-button-solid:hover:before {
    width: 100%;
  }
  #hero-2470 .cs-slideshow {
    width: 100%;
    height: 106vw;
    max-height: 31.25rem;
    position: relative;
    z-index: 1;
  }
  #hero-2470 .cs-background {
    width: 100%;
    height: 100%;
    opacity: 0;
    display: block;
    position: absolute;
    top: 0;
    left: 0;
    z-index: 1;
    transition: opacity 0.3s ease-in-out;
  }
  #hero-2470 .cs-background:before {
    content: '';
    width: 100%;
    height: 50%;
    background: linear-gradient(to bottom, rgba(0, 0, 0, 0) 0%, #000000 97%, #000000 100%);
    opacity: 1;
    display: block;
    position: absolute;
    bottom: 0;
    left: 0;
  }
  #hero-2470 .cs-background.cs-active {
    opacity: 1;
  }
  #hero-2470 .cs-background img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  #hero-2470 .cs-dots {
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    position: absolute;
    bottom: 1.5rem;
    left: 50%;
    z-index: 10;
    transform: translateX(-50%);
  }
  #hero-2470 .cs-dot {
    width: 0.5rem;
    height: 0.5rem;
    background-color: rgba(255, 255, 255, 0.5);
    cursor: pointer;
    display: block;
    position: relative;
    transition: width 0.3s;
  }
  #hero-2470 .cs-dot::before {
    content: '';
    width: 0;
    height: 100%;
    background-color: var(--primary);
    display: block;
    position: absolute;
    top: 0;
    left: 0;
    z-index: 1;
  }
  #hero-2470 .cs-dot.cs-active {
    width: 1rem;
  }
  #hero-2470 .cs-dot.cs-active::before {
    width: 100%;
    transition: width 7s linear;
  }
  #hero-2470 .cs-floater {
    width: 20rem;
    height: 19.625rem;
    opacity: 0.08;
    display: none;
    position: absolute;
    bottom: 0;
    left: 0;
  }
}
/* Desktop - 1300px */
@media only screen and (min-width: 81.25rem) {
  #hero-2470 {
    /* 120px - 275px */
    padding-top: clamp(7.5rem, 15vw, 17.1875rem);
    padding-bottom: clamp(7.5rem, 15vw, 17.1875rem);
  }
  #hero-2470 .cs-container {
    max-width: 80rem;
    flex-direction: row;
    justify-content: flex-start;
  }
  #hero-2470 .cs-content {
    text-align: left;
    /* removed padding and put it on the section */
    width: 45%;
    padding: 0;
    align-items: flex-start;
  }
  #hero-2470 .cs-slideshow {
    width: 44%;
    height: auto;
    max-height: 100%;
    position: absolute;
    top: 0;
    right: 0;
    bottom: 0;
  }
  #hero-2470 .cs-floater {
    display: block;
  }
}
/* Large Desktop - 1920px */
@media only screen and (min-width: 120rem) {
  #hero-2470 .cs-floater {
    margin-left: -62.5rem;
    left: 50%;
  }
}
</style>
</head>
<body>

<!-- ============================================ -->
<!--                    Hero                      -->
<!-- ============================================ -->

<section id="hero-2470">
    <div class="cs-container">
        <div class="cs-content">
            <span class="cs-topper">Genuine Japandi FurniStitch Creations</span>
            <h2 class="cs-title">
                Explore a Collection of Japandi-Inspired Furniture
            </h2>
            <a href="" class="cs-button-solid">Browse Our Catalog</a>
        </div>
        <div class="cs-slideshow">
            <picture data-slide="1" class="cs-background cs-active">
                <source media="(max-width: 600px)" srcset="https://nyc3.digitaloceanspaces.com/csimages2/Images/ecommerce/ecomm-hero3.jpg">
                <source media="(min-width: 601px)" srcset="https://nyc3.digitaloceanspaces.com/csimages2/Images/ecommerce/ecomm-hero3.jpg">
                <img decoding="async" src="https://nyc3.digitaloceanspaces.com/csimages2/Images/ecommerce/ecomm-hero3.jpg" alt="consultation" width="960" height="979" aria-hidden="true">
            </picture>
            <picture data-slide="2" class="cs-background">
                <source media="(max-width: 600px)" srcset="https://nyc3.digitaloceanspaces.com/csimages2/Images/ecommerce/ecomm-hero3.jpg">
                <source media="(min-width: 601px)" srcset="https://nyc3.digitaloceanspaces.com/csimages2/Images/ecommerce/ecomm-hero3.jpg">
                <img decoding="async" src="https://nyc3.digitaloceanspaces.com/csimages2/Images/ecommerce/ecomm-hero3.jpg" alt="furniture display" width="960" height="979" aria-hidden="true">
            </picture>
            <picture data-slide="3" class="cs-background">
                <source media="(max-width: 600px)" srcset="https://nyc3.digitaloceanspaces.com/csimages2/Images/ecommerce/ecomm-hero3.jpg">
                <source media="(min-width: 601px)" srcset="https://nyc3.digitaloceanspaces.com/csimages2/Images/ecommerce/ecomm-hero3.jpg">
                <img decoding="async" src="https://nyc3.digitaloceanspaces.com/csimages2/Images/ecommerce/ecomm-hero3.jpg" alt="furniture showcase" width="960" height="979" aria-hidden="true">
            </picture>
            <!-- Dots positioned at bottom of images -->
            <div class="cs-dots">
                <span data-slide="1" class="cs-dot cs-active"></span>
                <span data-slide="2" class="cs-dot"></span>
                <span data-slide="3" class="cs-dot"></span>
            </div>
        </div>
    </div>
    <img class="cs-floater" src="https://nyc3.digitaloceanspaces.com/csimages2/Images/Logos/japandi-logomark.svg" alt="japandi logo" height="320" width="314" aria-hidden="true" decoding="async">
</section>

<script>class HeroSlideshow {
    constructor(heroElement) {
        // config
        this.hero = heroElement;
        this.dots = Array.from(this.hero.querySelectorAll('.cs-dot'));
        this.slides = Array.from(this.hero.querySelectorAll('.cs-background'));
        this.currentSlide = 0;
        this.totalSlides = this.dots.length;
        this.slideDuration = 7000; // 7 seconds - this needs to be the same as the transition duration in the css
        this.slideInterval = null;

        this.init();
    }

    init() {
        this.slides.forEach((slide, index) => {
            slide.style.opacity = index === 0 ? '1' : '0';
        });

        this.dots.forEach((dot, index) => {
            dot.addEventListener('click', () => this.handleDotClick(index));
        });

        this.activateDot(0);
        this.startSlideshow();
    }

    activateDot(index) {
        const dot = this.dots[index];
        dot.classList.add('cs-active');
    }

    deactivateDot(index) {
        const dot = this.dots[index];
        dot.classList.remove('cs-active');
    }

    goToSlide(slideIndex) {
        this.deactivateDot(this.currentSlide);
        this.slides[this.currentSlide].style.opacity = '0';
        this.currentSlide = slideIndex;

        requestAnimationFrame(() => {
            this.activateDot(this.currentSlide);
            this.slides[this.currentSlide].style.opacity = '1';
        });
    }

    nextSlide() {
        const nextIndex = (this.currentSlide + 1) % this.totalSlides;
        this.goToSlide(nextIndex);
    }

    startSlideshow() {
        this.slideInterval = setInterval(() => this.nextSlide(), this.slideDuration);
    }

    resetSlideshow() {
        clearInterval(this.slideInterval);
        this.startSlideshow();
    }

    handleDotClick(index) {
        if (index !== this.currentSlide) {
            this.goToSlide(index);
            this.resetSlideshow();
        }
    }

    destroy() {
        clearInterval(this.slideInterval);
        this.dots.forEach((dot, index) => {
            dot.removeEventListener('click', () => this.handleDotClick(index));
        });
    }
}

// initialize slideshow on DOM ready, if the hero element exists. this prevents errors if the hero element does not exist.
document.addEventListener('DOMContentLoaded', function () {
    const hero = document.querySelector('#hero-2470');
    if (hero) {
        new HeroSlideshow(hero);
    }
});</script>
</body>
