<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>centered</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---           Hero             -->
<--- -------------------------- -*/
/* Mobile */
@media only screen and (min-width: 0rem) {
  #hero-2436 {
    min-height: 100vh;
    padding: var(--sectionPadding);
    padding-top: clamp(calc(220/16 * 1rem), 45vw, calc(475/16 * 1rem));
    overflow: hidden;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    position: relative;
    z-index: 1;
  }
  #hero-2436:before {
    content: '';
    width: 100%;
    height: 85%;
    background: linear-gradient(to bottom, #030711 0%, rgba(3, 7, 17, 0.35) 75%, rgba(3, 7, 17, 0) 100%);
    opacity: 1;
    display: block;
    position: absolute;
    top: 0;
    left: 0;
    z-index: -1;
  }
  #hero-2436:after {
    content: '';
    width: 100%;
    height: 35%;
    background: linear-gradient(to bottom, rgba(1, 1, 4, 0) 0%, #010104 100%);
    opacity: 1;
    display: block;
    position: absolute;
    bottom: 0;
    left: 0;
    z-index: -1;
  }
  #hero-2436 .cs-container {
    width: 100%;
    max-width: calc(1280/16 * 1rem);
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: clamp(calc(48/16 * 1rem), 8vw, calc(128/16 * 1rem));
  }
  #hero-2436 .cs-container:before {
    content: '';
    width: 100%;
    height: 100%;
    background: linear-gradient(to right, rgba(3, 7, 17, 0.64) 0%, rgba(3, 7, 17, 0.64) 18%, rgba(3, 7, 17, 0.51) 25%, rgba(3, 7, 17, 0.32) 35%, rgba(3, 7, 17, 0.32) 60%, rgba(3, 7, 17, 0.64) 78%, rgba(3, 7, 17, 0.64) 80%, rgba(3, 7, 17, 0.64) 100%);
    opacity: 1;
    display: block;
    position: absolute;
    bottom: 0;
    left: 0;
    z-index: -1;
  }
  #hero-2436 .cs-content {
    text-align: center;
    width: 100%;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    align-items: center;
    row-gap: calc(16/16 * 1rem);
    column-gap: clamp(calc(64/16 * 1rem), 10vw, calc(100/16 * 1rem));
  }
  #hero-2436 .cs-flex {
    text-align: inherit;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  #hero-2436 .cs-flex2 {
    max-width: calc(540/16 * 1rem);
  }
  #hero-2436 .cs-topper {
    color: var(--secondary);
  }
  #hero-2436 .cs-title {
    font-size: clamp(calc(39/16 * 1rem), 6vw, calc(61/16 * 1rem));
    margin-bottom: 0;
    max-width: 15ch;
    color: var(--bodyTextColorWhite);
  }
  #hero-2436 .cs-text {
    font-size: clamp(calc(16/16 * 1rem), 2vw, calc(20/16 * 1rem));
    color: var(--bodyTextColorWhite);
    margin-bottom: calc(32/16 * 1rem);
  }
  #hero-2436 .cs-button-solid {
    font-size: calc(16/16 * 1rem);
    font-weight: 700;
    /* 46px - 56px */
    line-height: clamp(2.875rem, 5.5vw, 3.5rem);
    text-align: center;
    text-decoration: none;
    min-width: calc(150/16 * 1rem);
    margin: 0;
    padding: 0 calc(24/16 * 1rem);
    background-color: var(--primary);
    color: var(--bodyTextColorWhite);
    display: inline-block;
    position: relative;
    z-index: 1;
  }
  #hero-2436 .cs-button-solid:before {
    content: "";
    width: 0%;
    height: 100%;
    background: #000;
    opacity: 1;
    position: absolute;
    top: 0;
    left: 0;
    z-index: -1;
    transition: width 0.3s;
  }
  #hero-2436 .cs-button-solid:hover:before {
    width: 100%;
  }
  #hero-2436 .cs-logo-feature {
    width: 100%;
    height: auto;
    display: block;
  }
  #hero-2436 .cs-background {
    width: 100%;
    height: 100%;
    display: block;
    position: absolute;
    top: 0;
    left: 0;
    object-fit: cover;
    z-index: -2;
  }
  #hero-2436 .cs-background img {
    width: 100%;
    height: 100%;
    display: block;
    position: absolute;
    top: 0;
    left: 0;
    object-fit: cover;
  }
}
/* Desktop - 1024px */
@media only screen and (min-width: 64rem) {
  #hero-2436 .cs-content {
    flex-direction: row;
    justify-content: space-between;
  }
  #hero-2436 .cs-flex {
    text-align: left;
    align-items: flex-start;
  }
  #hero-2436 .cs-flex2 {
    max-width: calc(417/16 * 1rem);
  }
}
</style>
</head>
<body>

<!-- ============================================ -->
<!--                   Hero                       -->
<!-- ============================================ -->

<section id="hero-2436">
    <div class="cs-container">
        <div class="cs-content">
            <div class="cs-flex cs-flex1">
                <span class="cs-topper">Welcome to Artistitch</span>
                <h2 class="cs-title">Tattoo & Body Art Templates</h2>
            </div>
            <div class="cs-flex cs-flex2">
                <p class="cs-text">
                    UV body painting, blacklight realism, geometric illusions, abstract expression, and fine line body art in North Portland, OR.
                </p>
                <a href="" class="cs-button-solid">Book A Call</a>
            </div>
        </div>
        <img class="cs-logo-feature" decoding="async" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/Logos/art-logo.svg" alt="logo" width="1280" height="239">
    </div>
    <!--Background Image-->
    <picture class="cs-background">
        <!--Mobile Image-->
        <source media="(max-width: 600px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/art4.jpg">
        <!--Tablet and above Image-->
        <source media="(min-width: 601px)" srcset="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/art4.jpg">
        <img decoding="async" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Images/People/art4.jpg" alt="face with body art" width="1800" height="860" aria-hidden="true" fetchpriority="high">
    </picture>
</section>

<script></script>
</body>
</html>
