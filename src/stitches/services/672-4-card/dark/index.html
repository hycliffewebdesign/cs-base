  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>

/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #services-672 .cs-card-group {
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
  }
  #services-672 .cs-item {
    list-style: none;
    /* 40px - 64px */
    padding: clamp(2.5rem, 6.3vw, 4rem);
    /* prevents padding and border from affecting height and width */
    box-sizing: border-box;
    background-color: #eff1f0;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    z-index: 1;
    transition: filter 0.3s;
  }
  #services-672 .cs-item:hover {
    filter: brightness(70%);
  }
  #services-672 .cs-item:nth-of-type(even) {
    background-color: var(--primary);
  }
  #services-672 .cs-item:nth-of-type(even) .cs-link,
  #services-672 .cs-item:nth-of-type(even) .cs-h2 {
    color: #f7f7f7;
  }
  #services-672 .cs-item:nth-of-type(even) .cs-waves {
    display: none;
  }
  #services-672 .cs-picture {
    width: calc(100 / 16 * 1rem);
    height: calc(100 / 16 * 1rem);
    margin: 0 0 calc(20 / 16 * 1rem) 0;
    background-color: #fdfaf8;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  #services-672 .cs-icon {
    width: calc(52 / 16 * 1rem);
    height: auto;
    display: block;
  }
  #services-672 .cs-h2 {
    font-size: calc(25 / 16 * 1rem);
    font-weight: 700;
    text-align: center;
    line-height: 1.2em;
    /* 20px - 32px */
    margin: 0 0 clamp(1.25rem, 3vw, 2rem);
    color: var(--headerColor);
    display: block;
  }
  #services-672 .cs-link {
    font-size: calc(16 / 16 * 1rem);
    line-height: 1.2em;
    font-weight: 700;
    text-decoration: none;
    margin: 0;
    color: var(--primary);
    display: inline-block;
    position: relative;
  }
  #services-672 .cs-link:before {
    /* underline */
    content: "";
    width: 100%;
    height: 1px;
    background: currentColor;
    opacity: 1;
    position: absolute;
    display: block;
    bottom: -1px;
    left: 0;
  }
  #services-672 .cs-waves {
    width: 100%;
    height: 100%;
    opacity: 0.5;
    display: block;
    position: absolute;
    top: 0;
    left: 0;
    /* prevents the mouse from interacting with it */
    pointer-events: none;
    /* makes it act like a background images */
    object-fit: cover;
    z-index: -1;
  }
}
/* Tablet - 650px */
@media only screen and (min-width: 40.625rem) {
  #services-672 .cs-card-group {
    flex-direction: row;
    flex-wrap: wrap;
  }
  #services-672 .cs-item {
    width: 50%;
  }
  #services-672 .cs-item:nth-of-type(3) {
    order: 4;
  }
}
/* Small Desktop - 1200px */
@media only screen and (min-width: 75rem) {
  #services-672 .cs-item {
    width: 25%;
  }
  #services-672 .cs-item:nth-of-type(3) {
    order: initial;
  }
}
</style>
