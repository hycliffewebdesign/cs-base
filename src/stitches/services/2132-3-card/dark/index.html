<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3 card</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---          Services          -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #services-2132 {
    padding: var(--sectionPadding);
    overflow: hidden;
    position: relative;
    z-index: 1;
  }
  #services-2132:before {
    content: "";
    width: 100%;
    height: 48%;
    background-color: var(--primary);
    opacity: 0.05;
    position: absolute;
    bottom: 0;
    left: 0;
    z-index: -1;
  }
  #services-2132 .cs-container {
    width: 100%;
    /* changes to 1280px at tablet */
    max-width: 44rem;
    margin: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    /* 48px - 64px */
    gap: clamp(3rem, 6vw, 4rem);
  }
  #services-2132 .cs-content {
    /* set text align to left if content needs to be left aligned */
    text-align: center;
    width: 100%;
    display: flex;
    flex-direction: column;
    /* centers content horizontally, set to flex-start to left align */
    align-items: center;
  }
  #services-2132 .cs-title {
    margin: 0;
  }
  #services-2132 .cs-card-group {
    width: 100%;
    margin: 0;
    padding: 0;
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    /* 16px - 20px */
    gap: clamp(1rem, 1.5vw, 1.25rem);
  }
  #services-2132 .cs-item {
    list-style: none;
    width: 100%;
    height: 17.5rem;
    margin: 0;
    /* prevents padding and border from affecting height and width */
    box-sizing: border-box;
    /* clips the image corners */
    overflow: hidden;
    grid-column: span 12;
    grid-row: span 1;
    position: relative;
  }
  #services-2132 .cs-item:hover .cs-h3,
  #services-2132 .cs-item:focus-within .cs-h3 {
    background-color: #fff;
    color: var(--headerColor);
    transform: translateY(0);
  }
  #services-2132 .cs-item:hover .cs-background:after,
  #services-2132 .cs-item:focus-within .cs-background:after {
    opacity: 0.6;
  }
  #services-2132 .cs-item:hover .cs-background img,
  #services-2132 .cs-item:focus-within .cs-background img {
    transform: scale(1.2);
  }
  #services-2132 .cs-link {
    text-decoration: none;
    height: 100%;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }
  #services-2132 .cs-h3 {
    /* 20px - 25px */
    font-size: clamp(1.25rem, 2vw, 1.5625rem);
    font-weight: 700;
    line-height: 1.2em;
    text-align: center;
    margin: 0;
    padding: 1rem 1.25rem;
    color: var(--bodyTextColorWhite);
    border: 1px solid var(--bodyTextColorWhite);
    transform: translateY(0.75rem);
    transition: transform 0.3s, color 0.3s, background-color 0.3s;
  }
  #services-2132 .cs-background {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    position: absolute;
    top: 0;
    left: 0;
    z-index: -1;
  }
  #services-2132 .cs-background:before {
    /* gradient overlay */
    content: "";
    width: 100%;
    height: 100%;
    background: linear-gradient(0deg, rgba(0, 0, 0, 0.4) 0%, rgba(0, 0, 0, 0.4) 100%);
    opacity: 1;
    display: block;
    position: absolute;
    bottom: 0;
    left: 0;
    z-index: -2;
    transition: height 0.3s;
  }
  #services-2132 .cs-background:after {
    /* gradient overlay */
    content: "";
    width: 100%;
    height: 100%;
    background: #000;
    opacity: 0;
    display: block;
    position: absolute;
    bottom: 0;
    left: 0;
    z-index: -1;
    transition: opacity 0.3s;
  }
  #services-2132 .cs-background img {
    width: 100%;
    height: 100%;
    /* Makes img tag act as a background image */
    object-fit: cover;
    position: absolute;
    z-index: -3;
    transition: transform 0.7s;
  }
  #services-2132 .cs-stats-group {
    width: 100%;
    margin: 0;
    padding: 0rem;
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 1.5rem;
  }
  #services-2132 .cs-stats {
    list-style: none;
    padding: 1rem 0 1.5rem 0;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
    grid-column: span 12;
    gap: 1rem;
    position: relative;
  }
  #services-2132 .cs-stats:after {
    /* grey lines */
    content: "";
    width: 90%;
    height: 1px;
    margin: 0;
    background: #e8e8e8;
    opacity: 1;
    display: block;
    position: absolute;
    bottom: 0;
  }
  #services-2132 .cs-stats:last-of-type:after {
    display: none;
  }
  #services-2132 .cs-header {
    font-size: 1.25rem;
    font-weight: 700;
    line-height: 1.2em;
    width: 100%;
    max-width: max-content;
    margin: 0;
    color: var(--bodyTextColor);
    display: inline-block;
  }
  #services-2132 .cs-number {
    /* 61px - 80px */
    font-size: clamp(3.8125rem, 8vw, 5rem);
    font-weight: 600;
    line-height: 1.2em;
    margin: 0;
    color: var(--primary);
    display: block;
  }
}
/* Tablet - 768px */
@media only screen and (min-width: 48rem) {
  #services-2132 .cs-container {
    max-width: 80rem;
  }
  #services-2132 .cs-item {
    /* 280px - 440px */
    height: clamp(17.5rem, 35vw, 27.5rem);
    grid-column: span 4;
  }
  #services-2132 .cs-stats-group {
    display: flex;
    justify-content: space-between;
    /* 32px - 80px */
    gap: clamp(2rem, 4vw, 5rem);
  }
  #services-2132 .cs-stats {
    width: 100%;
    max-width: 16.25rem;
    padding-left: 0;
    align-items: flex-start;
    grid-column: span 6;
  }
  #services-2132 .cs-stats:after {
    /* grey lines */
    content: "";
    width: 1px;
    height: 100%;
    margin: 0;
    background: #e8e8e8;
    opacity: 1;
    display: block;
    position: absolute;
    right: 0;
    bottom: 0;
  }
  #services-2132 .cs-stats:last-of-type:after {
    display: none;
  }
}
/* Large Desktop - 1440px */
@media only screen and (min-width: 90rem) {
  #services-2132 .cs-stats-group {
    transform: translateX(2.5rem);
  }
}
</style>
</head>
<body>
