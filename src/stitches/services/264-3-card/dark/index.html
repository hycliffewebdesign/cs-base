<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3 card</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---         Services           -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #services-264 {
    padding: var(--sectionPadding);
  }
  #services-264 .cs-container {
    width: 100%;
    max-width: 80rem;
    margin: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    /* 48px - 64px */
    gap: clamp(3rem, 6vw, 4rem);
  }
  #services-264 .cs-content {
    /* set text align to left if content needs to be left aligned */
    text-align: left;
    width: 100%;
    display: flex;
    flex-direction: column;
    /* centers content horizontally, set to flex-start to left align */
    align-items: flex-start;
  }
  #services-264 .cs-text {
    margin-bottom: 1rem;
  }
  #services-264 .cs-text:last-of-type {
    margin-bottom: 2rem;
  }
  #services-264 .cs-button-solid {
    font-size: 1rem;
    /* 46px - 56px */
    line-height: clamp(2.875rem, 5.5vw, 3.5rem);
    text-decoration: none;
    font-weight: 700;
    text-align: center;
    margin: 0;
    color: #000;
    min-width: 9.375rem;
    padding: 0 1.5rem;
    background-color: var(--secondaryLight);
    border-radius: 0.25rem;
    display: inline-block;
    position: relative;
    z-index: 1;
    /* prevents padding from adding to the width */
    box-sizing: border-box;
    transition: color 0.3s;
  }
  #services-264 .cs-button-solid:before {
    content: "";
    position: absolute;
    height: 100%;
    width: 0%;
    background: #000;
    opacity: 1;
    top: 0;
    left: 0;
    z-index: -1;
    border-radius: 0.25rem;
    transition: width 0.3s;
  }
  #services-264 .cs-button-solid:hover {
    color: #fff;
  }
  #services-264 .cs-button-solid:hover:before {
    width: 100%;
  }
  #services-264 .cs-card-group {
    width: 100%;
    padding: 0;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    gap: 0.5rem;
  }
  #services-264 .cs-item {
    list-style: none;
    position: relative;
    display: block;
    width: 100%;
    height: 60vw;
    max-height: 15.625rem;
    font-size: clamp(1rem, 1.7vw, 1.5rem);
    color: #fff;
    /* 16px - 20px top & bottom */
    /* 20px - 24px left & right */
    padding: clamp(1rem, 2vw, 1.25rem) clamp(1.25rem, 2vw, 1.5rem);
    /* prevents padding and border from affecting height and width */
    box-sizing: border-box;
  }
  #services-264 .cs-h3 {
    /* 16px - 25px */
    font-size: clamp(1rem, 2vw, 1.5625rem);
    font-weight: 700;
    line-height: 1.2em;
    margin: 0;
    color: var(--bodyTextColorWhite);
    display: block;
  }
  #services-264 .cs-picture {
    display: block;
    width: 100%;
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    z-index: -1;
    overflow: hidden;
  }
  #services-264 .cs-picture:before {
    /* top right box */
    content: "";
    width: 100%;
    height: 100%;
    background: #000;
    opacity: 0.4;
    position: absolute;
    display: block;
    top: 0;
    left: 0;
    z-index: 1;
    transition: opacity 0.3s;
  }
  #services-264 .cs-picture img {
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    width: 100%;
    object-fit: cover;
    transition: transform 0.3s;
  }
}
/* Tablet - 768px */
@media only screen and (min-width: 48rem) {
  #services-264 .cs-container {
    flex-direction: row;
  }
  #services-264 .cs-card-group {
    width: 64%;
    max-width: 54.1875rem;
    flex-direction: row;
    justify-content: space-between;
    /* 16px - 20px */
    gap: clamp(1rem, 1.5vw, 1.25rem);
    flex: none;
  }
  #services-264 .cs-item {
    width: 100%;
    height: 50vw;
    max-width: 17.1875rem;
    max-height: 28.75rem;
  }
  #services-264 .cs-item:hover .cs-picture:before {
    opacity: 0.7;
  }
  #services-264 .cs-item:hover .cs-picture img {
    transform: scale(1.2);
  }
}
</style>
</head>
<body>

<!-- ============================================ -->
<!--                  Services                    -->
<!-- ============================================ -->

<section id="services-264">
    <div class="cs-container">
        <div class="cs-content">
            <span class="cs-topper">Services</span>
            <h2 class="cs-title">What We Do</h2>
            <p class="cs-text">
                We are a full service construction company offering everything from residential and commercial painting to full home remodels and new home additions.
            </p>
            <a href="/portfolio.html" class="cs-button-solid">View Portfolio</a>
        </div>
        <ul class="cs-card-group">
            <li class="cs-item">
                <h3 class="cs-h3">New Home Construction</h3>
                <picture class="cs-picture">
                    <source media="(max-width: 600px)" srcset="https://csimages2.nyc3.digitaloceanspaces.com/Services/s1.jpg">
                    <source media="(min-width: 601px)" srcset="https://csimages2.nyc3.digitaloceanspaces.com/Services/s1.jpg">
                    <img aria-hidden="true" loading="lazy" decoding="async" src="https://csimages2.nyc3.digitaloceanspaces.com/Services/s1.jpg" alt="house" width="275" height="132">
                </picture>
            </li>
            <li class="cs-item">
                <h3 class="cs-h3">Renovations</h3>
                <picture class="cs-picture">
                    <source media="(max-width: 600px)" srcset="https://csimages2.nyc3.digitaloceanspaces.com/Services/s2.jpg">
                    <source media="(min-width: 601px)" srcset="https://csimages2.nyc3.digitaloceanspaces.com/Services/s2.jpg">
                    <img aria-hidden="true" loading="lazy" decoding="async" src="https://csimages2.nyc3.digitaloceanspaces.com/Services/s2.jpg" alt="stairs" width="275" height="132">
                </picture>
            </li>
            <li class="cs-item">
                <h3 class="cs-h3">Additions</h3>
                <picture class="cs-picture">
                    <source media="(max-width: 600px)" srcset="https://csimages2.nyc3.digitaloceanspaces.com/Services/s3.jpg">
                    <source media="(min-width: 601px)" srcset="https://csimages2.nyc3.digitaloceanspaces.com/Services/s3.jpg">
                    <img aria-hidden="true" loading="lazy" decoding="async" src="https://csimages2.nyc3.digitaloceanspaces.com/Services/s3.jpg" alt="bathroom" width="275" height="132">
                </picture>
            </li>
        </ul>
    </div>
</section>

<script></script>
</body>
</html>
