<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3 card</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---          Services          -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #services-25 {
    /* Centers the button */
    text-align: center;
    padding: var(--sectionPadding);
  }
  #services-25 .cs-container {
    width: 100%;
    max-width: 80rem;
    margin: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    /* 48px - 64px */
    gap: clamp(3rem, 6vw, 4rem);
  }
  #services-25 .cs-content {
    /* set text align to left if content needs to be left aligned */
    text-align: center;
    width: 100%;
    display: flex;
    flex-direction: column;
    /* centers content horizontally, set to flex-start to left align */
    align-items: center;
  }
  #services-25 .cs-card-group {
    width: 100%;
    max-width: 34.375rem;
    margin: 0;
    padding: 0;
    border: 1px solid #a0a3bd;
    border-bottom: 0;
  }
  #services-25 .cs-item {
    width: 100%;
    margin: auto;
    list-style: none;
    border-bottom: 1px solid #a0a3bd;
    background-color: #fff;
    transition: background-color 0.3s;
  }
  #services-25 .cs-item:hover {
    background-color: var(--primary);
  }
  #services-25 .cs-item:hover .cs-icon {
    /* turns it white */
    filter: grayscale(1) brightness(1000%);
  }
  #services-25 .cs-item:hover .cs-h3 {
    color: #fff;
  }
  #services-25 .cs-link {
    text-decoration: none;
    width: 100%;
    height: 100%;
    /* 32px - 40px */
    padding: clamp(2rem, 5vw, 2.5rem) 0;
    display: flex;
    justify-content: flex-start;
    align-items: center;
    flex-direction: column;
    /* Prevents padding from affecting height */
    box-sizing: border-box;
  }
  #services-25 .cs-icon {
    margin-bottom: 1.125rem;
    width: 5rem;
    height: auto;
  }
  #services-25 .cs-hover {
    display: none;
  }
  #services-25 .cs-h3 {
    /* 16px - 20px */
    font-size: clamp(1rem, 1.7vw, 1.25rem);
    line-height: 1.2em;
    font-weight: 700;
    text-align: center;
    margin: 0;
    color: var(--headerColor);
    transition: color 0.3s;
  }
  #services-25 .cs-button-solid {
    font-size: 1rem;
    /* 46px - 56px */
    line-height: clamp(2.875rem, 5.5vw, 3.5rem);
    text-decoration: none;
    font-weight: 700;
    text-align: center;
    margin: 0;
    color: #fff;
    min-width: 9.375rem;
    padding: 0 1.5rem;
    background-color: var(--primary);
    border-radius: 0.25rem;
    display: inline-block;
    position: relative;
    z-index: 1;
    /* prevents padding from adding to the width */
    box-sizing: border-box;
  }
  #services-25 .cs-button-solid:before {
    content: "";
    position: absolute;
    height: 100%;
    width: 0%;
    background: #000;
    opacity: 1;
    top: 0;
    left: 0;
    z-index: -1;
    border-radius: 0.25rem;
    transition: width 0.3s;
  }
  #services-25 .cs-button-solid:hover:before {
    width: 100%;
  }
}
/* In Between - 500px */
@media only screen and (min-width: 31.25rem) {
  #services-25 .cs-card-group {
    display: flex;
    justify-content: center;
    /* makes the items have the same height */
    align-items: stretch;
    flex-wrap: wrap;
    border-bottom: 1px solid #a0a3bd;
  }
  #services-25 .cs-item {
    width: 50%;
    max-width: 18.4375rem;
    margin: 0;
    border-bottom: none;
    /* Makes borders not affect widths */
    box-sizing: border-box;
  }
  #services-25 .cs-item:nth-of-type(1) {
    border-right: 1px solid #a0a3bd;
    border-bottom: 1px solid #a0a3bd;
  }
  #services-25 .cs-item:nth-of-type(2) {
    border-bottom: 1px solid #a0a3bd;
  }
  #services-25 .cs-item:nth-of-type(3) {
    width: 100%;
  }
}
/* Tablet - 768px */
@media only screen and (min-width: 48rem) {
  #services-25 .cs-card-group {
    max-width: 100%;
    border: none;
  }
  #services-25 .cs-item {
    height: 13.125rem;
    width: 33%;
  }
  #services-25 .cs-item:nth-of-type(1) {
    border: none;
    border: 1px solid #a0a3bd;
  }
  #services-25 .cs-item:nth-of-type(2) {
    border: none;
    border-top: 1px solid #a0a3bd;
    border-bottom: 1px solid #a0a3bd;
    border-right: 1px solid #a0a3bd;
  }
  #services-25 .cs-item:nth-of-type(3) {
    border: none;
    border-top: 1px solid #a0a3bd;
    border-right: 1px solid #a0a3bd;
    border-bottom: 1px solid #a0a3bd;
    width: 33%;
  }
  #services-25 .cs-item:nth-of-type(4) {
    border: 1px solid #a0a3bd;
  }
  #services-25 .cs-link {
    padding: 2.25rem 0;
  }
  #services-25 .cs-icon {
    margin-bottom: 1.75rem;
  }
}
</style>
</head>
