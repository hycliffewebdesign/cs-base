<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>6 card</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---          Services          -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #services-2220 {
    padding: var(--sectionPadding);
    background-color: #fdfaf8;
    position: relative;
    z-index: 1;
  }
  #services-2220 .cs-container {
    width: 100%;
    /* changes to 1840px at tablet */
    max-width: 44rem;
    margin: auto;
  }
  #services-2220 .cs-title {
    text-transform: uppercase;
  }
  #services-2220 .cs-card-group {
    width: 100%;
    /* changes to 100% at tablet */
    max-width: 31.25rem;
    margin: 0 auto;
    padding: 0;
    /* changes to flexbox at large desktop */
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    /* 16px - 20px */
    gap: clamp(1rem, 1.5vw, 1.25rem);
  }
  #services-2220 .cs-item {
    text-align: left;
    list-style: none;
    width: 100%;
    /* 240px - 300px */
    min-height: clamp(15rem, 30vw, 18.75rem);
    margin: 0;
    /* prevents padding and border from affecting height and width */
    box-sizing: border-box;
    padding: 0;
    /* clips the image corners */
    overflow: hidden;
    display: flex;
    flex-direction: column;
    grid-column: span 12;
    grid-row: span 1;
    position: relative;
  }
  #services-2220 .cs-item:hover .cs-h3,
  #services-2220 .cs-item:focus-within .cs-h3 {
    transform: translateY(-0.75rem);
  }
  #services-2220 .cs-item:hover .cs-background:before,
  #services-2220 .cs-item:focus-within .cs-background:before {
    height: 180%;
  }
  #services-2220 .cs-item:hover .cs-background img,
  #services-2220 .cs-item:focus-within .cs-background img {
    opacity: 0.5;
    transform: scale(1.1);
  }
  #services-2220 .cs-link {
    text-decoration: none;
    height: 100%;
    /* 16px - 24px */
    padding: clamp(1rem, 1.25vw, 1.5rem);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: flex-start;
  }
  #services-2220 .cs-h3 {
    /* 20px - 25px */
    font-size: clamp(1.25rem, 2.5vw, 1.5625rem);
    font-weight: 700;
    line-height: 1.2em;
    text-align: inherit;
    margin: 0;
    color: var(--bodyTextColorWhite);
    transition: transform 0.3s, color 0.3s;
  }
  #services-2220 .cs-content {
    text-align: center;
    min-height: 0;
    padding: 1.5rem;
    background-color: #fbf5f1;
    justify-content: center;
    align-items: center;
  }
  #services-2220 .cs-title {
    margin: 0 0 2rem;
  }
  #services-2220 .cs-button-solid {
    font-size: calc(16 / 16 * 1rem);
    font-weight: bold;
    line-height: calc(50 / 16 * 1em);
    text-align: center;
    text-transform: uppercase;
    text-decoration: none;
    width: max-content;
    padding: 0 calc(30 / 16 * 1rem);
    background-color: var(--primary);
    color: #000;
    display: inline-block;
    position: relative;
    z-index: 1;
    transition: color 0.3s;
    transition-delay: 0.1s;
  }
  #services-2220 .cs-button-solid:hover {
    color: #fff;
  }
  #services-2220 .cs-button-solid:hover:before {
    width: 100%;
  }
  #services-2220 .cs-button-solid:before {
    content: "";
    width: 0;
    height: 100%;
    background-color: #000;
    opacity: 1;
    display: block;
    position: absolute;
    top: 0;
    left: 0;
    z-index: -1;
    transition: width 0.3s;
  }
  #services-2220 .cs-background {
    width: 100%;
    height: 100%;
    background-color: #000;
    object-fit: cover;
    display: block;
    position: absolute;
    top: 0;
    left: 0;
    z-index: -1;
  }
  #services-2220 .cs-background:before {
    /* gradient overlay */
    content: "";
    width: 100%;
    height: 100%;
    background: linear-gradient(0deg, rgba(0, 0, 0, 0.72) 14.59%, rgba(0, 0, 0, 0) 43.18%);
    opacity: 1;
    display: block;
    position: absolute;
    bottom: 0;
    left: 0;
    transition: height 0.3s;
  }
  #services-2220 .cs-background img {
    width: 100%;
    height: 100%;
    /* Makes img tag act as a background image */
    object-fit: cover;
    position: absolute;
    z-index: -1;
    transition: transform 0.6s, opacity 0.3s;
  }
}
/* Tablet - 768px */
@media only screen and (min-width: 48rem) {
  #services-2220 .cs-container {
    max-width: 115rem;
  }
  #services-2220 .cs-card-group {
    max-width: 100%;
    grid-template-rows: 1fr;
  }
  #services-2220 .cs-item {
    grid-column: span 4;
  }
  #services-2220 .cs-item.cs-content {
    grid-column: span 12;
  }
}
/* Desktop - 1500px */
@media only screen and (min-width: 93.75rem) {
  #services-2220 .cs-card-group {
    min-height: 37.5rem;
    display: flex;
    flex-direction: row;
  }
  #services-2220 .cs-content {
    min-width: 22rem;
    padding: 9.75rem 0 12.5rem;
  }
}
</style>
</head>
