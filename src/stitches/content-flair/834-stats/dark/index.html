<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>stats</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---       Content Stats        -->
<--- -------------------------- -*/
/* you can copy and paste these styles into the section CSS where you placed the #list-834 HTML, or you can place it in your global stylesheet so you can reuse the HTML in any Side By Side section on your site. That way when you make changes to it, it will also change everywhere in the site */
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #stats-834 {
    width: 100%;
    /* changes at desktop */
    max-width: 23.375rem;
    margin: auto auto 2rem;
    display: flex;
    align-items: flex-start;
    gap: 1.25rem;
  }
  #stats-834 .cs-circle {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    flex: 1;
    aspect-ratio: 1;
  }
  #stats-834 .cs-ring-wrapper {
    position: relative;
    margin: 0 0 0.5rem 0;
  }
  #stats-834 .cs-number {
    /* 20px - 39px */
    font-size: clamp(1.25rem, 3vw, 2.4375rem);
    font-weight: 900;
    /* prevents mouse from interacting with it */
    pointer-events: none;
    line-height: 1.2em;
    color: var(--headerColor);
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
  #stats-834 .cs-desc {
    /* 14px - 16px */
    font-size: clamp(0.875rem, 1.4vw, 1rem);
    line-height: 1.5em;
    text-align: center;
    width: 100%;
    color: var(--bodyTextColor);
  }
  #stats-834 .cs-ring {
    --ring-width: 8px;
    width: calc(100% - var(--ring-width));
    aspect-ratio: 1;
    overflow: visible;
    pointer-events: none;
    rotate: -90deg;
    scale: 1 -1;
  }
  #stats-834 .cs-ring circle {
    fill: none;
    stroke: #f7f7f7;
    stroke-width: var(--ring-width);
  }
  #stats-834 .cs-ring circle:last-of-type {
    stroke: var(--secondaryLight);
    stroke-linecap: round;
    stroke-dasharray: calc(var(--ratio) * 314%) 314%;
    transition: stroke-dasharray 1s;
  }
  #stats-834 .cs-circle:hover .cs-ring {
    --ratio: 0 !important;
  }
}
/* Small Desktop - 1024px */
@media only screen and (min-width: 64rem) {
  #stats-834 {
    max-width: 100%;
    max-width: 39.375rem;
    margin-left: 0;
    margin-right: 0;
  }
  #stats-834 .cs-ring-wrapper {
    /* breaks the children out of the container.  They can now be arranged as if thy are all children of the cs-circle */
    display: contents;
  }
  #stats-834 .cs-ring {
    /* make the ring position absolute so it can sit on top of the other elements that are centered relatively in the cs-circle */
    width: 100%;
    height: auto;
    position: absolute;
    top: 0;
    left: 0;
  }
  #stats-834 .cs-number {
    /* make the number relative positioning so it and the cs-desc can position themselves around each other */
    position: relative;
    top: auto;
    left: auto;
    transform: none;
  }
  #stats-834 .cs-desc {
    position: relative;
    bottom: auto;
    left: auto;
    transform: none;
  }
}
</style>
</head>
<body>

<!--SVG Circles-->
<div id="stats-834">
    <div class="cs-circle">
        <!--Wrapped in a div so mobile positioning is easier-->
        <div class="cs-ring-wrapper">
            <span class="cs-number">90%</span>
            <!--Change the --ratio to the decimal percentage of this circle-->
            <svg class="cs-ring" style="--ratio: 0.90">
                <circle cx="50%" cy="50%" r="50%"/>
                <circle cx="50%" cy="50%" r="50%"/>
            </svg>
        </div>
        <span class="cs-desc">Case Win</span>
    </div>
    <div class="cs-circle">
        <div class="cs-ring-wrapper">
            <span class="cs-number">75%</span>
            <!--Change the --ratio to the decimal percentage of this circle-->
            <svg class="cs-ring" style="--ratio: 0.75">
                <circle cx="50%" cy="50%" r="50%"/>
                <circle cx="50%" cy="50%" r="50%"/>
            </svg>
        </div>
        <span class="cs-desc">Settle</span>
    </div>
    <div class="cs-circle">
        <div class="cs-ring-wrapper">
            <span class="cs-number">30%</span>
            <!--Change the --ratio to the decimal percentage of this circle-->
            <svg class="cs-ring" style="--ratio: 0.30">
                <circle cx="50%" cy="50%" r="50%"/>
                <circle cx="50%" cy="50%" r="50%"/>
            </svg>
        </div>
        <span class="cs-desc">Case Pending</span>
    </div>
</div>

<script></script>
</body>
</html>
