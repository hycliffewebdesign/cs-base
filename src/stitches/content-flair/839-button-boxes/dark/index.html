<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>button boxes</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/* you can copy and paste this into your global stylesheet to be used everywhere in your site */
#button-box-839 {
  width: 100%;
  display: flex;
  justify-content: flex-start;
  align-items: center;
  flex-wrap: wrap;
  gap: 1rem;
}
#button-box-839 .cs-button-solid {
  text-align: center;
  font-size: 1rem;
  /* 46px - 56px */
  line-height: clamp(2.875em, 5.5vw, 3.5em);
  min-width: 11.25rem;
  text-decoration: none;
  font-weight: 700;
  border-radius: 0.5rem;
  /* clips corners of the before element */
  overflow: hidden;
  margin: 0;
  color: #fff;
  padding: 0;
  background-color: var(--secondary);
  display: inline-block;
  position: relative;
  z-index: 1;
}
#button-box-839 .cs-button-solid:before {
  content: "";
  position: absolute;
  display: block;
  height: 100%;
  width: 0%;
  background: #000;
  opacity: 1;
  top: 0;
  left: 0;
  z-index: -1;
  transition: width 0.3s;
}
#button-box-839 .cs-button-solid:hover:before {
  width: 100%;
}
#button-box-839 .cs-button-transparent {
  font-size: 1rem;
  /* 46px - 56px */
  line-height: clamp(2.875rem, 5.5vw, 3.5rem);
  width: 11.25rem;
  /* 46px - 56px */
  height: clamp(2.875rem, 5.5vw, 3.5rem);
  text-decoration: none;
  font-weight: 700;
  margin: 0;
  color: var(--primaryLight);
  padding: 0;
  background-color: transparent;
  box-sizing: border-box;
  display: inline-flex;
  justify-content: flex-start;
  align-items: center;
  position: relative;
  z-index: 1;
}
#button-box-839 .cs-button-transparent:before {
  /* white hover box */
  content: "";
  /* 46px - 56px */
  width: clamp(2.875rem, 5.5vw, 3.5rem);
  background: #fff;
  border-radius: 1.75rem;
  opacity: 1;
  position: absolute;
  display: block;
  top: 0px;
  bottom: 0px;
  left: 0px;
  z-index: -1;
  transition: width 0.3s, box-shadow 0.3s;
}
#button-box-839 .cs-button-transparent:hover:before {
  width: 100%;
  box-shadow: rgba(149, 157, 165, 0.2) 0px 8px 24px;
}
#button-box-839 .cs-picture {
  /* 46px - 56px */
  width: clamp(2.875rem, 5.5vw, 3.5rem);
  height: clamp(2.875rem, 5.5vw, 3.5rem);
  margin-right: 0.5rem;
  background-color: var(--primaryLight);
  border-radius: 50%;
  border: 6px solid #fff;
  box-sizing: border-box;
  display: flex;
  justify-content: center;
  align-items: center;
}
#button-box-839 .cs-image {
  width: 0.75rem;
  height: auto;
}
</style>
</head>
<body>

<!--                   
    These "Micro Stitches" are to be placed inside the .cs-content group of Side By Side Stitches. This one is supposed to go under the cs-text. 
-->

<div id="button-box-839">
    <a href="" class="cs-button-solid">Get Started</a>
    <a href="" class="cs-button-transparent">
        <picture class="cs-picture">
            <img class="cs-img" decoding="async" src="https://csimg.nyc3.digitaloceanspaces.com/chevron-right.svg" alt="icon" width="12" height="12" aria-hidden="true">
        </picture>
        See Prices
    </a>
</div>

<script></script>
</body>
</html>
