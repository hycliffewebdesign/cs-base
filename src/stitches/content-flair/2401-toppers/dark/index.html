<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>toppers</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>.cs-topper {
  font-size: calc(13/16 * 1rem);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  max-width: fit-content;
  margin-bottom: calc(4/16 * 1rem);
  padding: clamp(0.25rem, 0.6vw, 0.5rem) clamp(0.75rem, 1vw, 1rem);
  color: var(--primary);
  display: flex;
  align-items: center;
  gap: clamp(0.25rem, 0.6vw, 0.625rem);
  position: relative;
  z-index: 1;
}
.cs-topper:before {
  content: "";
  width: 100%;
  height: 100%;
  background-color: var(--secondary);
  opacity: 0.1;
  border-radius: calc(100/16 * 1rem);
  display: block;
  position: absolute;
  top: 0;
  left: 0;
  z-index: -1;
}
.cs-topper img {
  display: block;
  width: clamp(1rem, 2vw, 1.25rem);
  height: auto;
}
</style>
</head>
<body>

<span class="cs-topper">
    <img aria-hidden="true" src="https://nyc3.digitaloceanspaces.com/csimages2/Images/Icons/paw.svg" loading="lazy" decoding="async" alt="paw" width="16" height="16" />
    Main Services
</span>

<script></script>
</body>
</html>
