<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>stats</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/* Mobile - 360px */
/* you can copy and paste these styles into the section CSS where you placed the #list-1336 HTML, or you can place it in your global stylesheet so you can reuse the HTML in any Side By Side section on your site. That way when you make changes to it, it will also change everywhere in the site */
#stats-1336 {
  width: 100%;
  max-width: 39.375rem;
  padding: 0;
  /* 32px - 48px */
  margin: clamp(2rem, 5vw, 3rem) 0 0 0;
  /* 32px - 48px */
  padding: clamp(2rem, 5vw, 3rem) 0 0 0;
  border-top: 1px solid #e8e8e8;
  display: flex;
  justify-content: space-between;
  align-items: center;
  column-gap: 0.75rem;
}
#stats-1336 .cs-item {
  list-style: none;
  width: 32%;
  /* making flex so we can align a heading with 1 line to the bottom */
  display: flex;
  flex-direction: column;
  align-self: stretch;
  align-content: space-between;
}
#stats-1336 .cs-number {
  font-size: 1.5625rem;
  line-height: 1.2em;
  font-weight: 700;
  text-align: left;
  color: var(--primary);
  display: block;
  margin: 0 0 0.5rem 0;
}
#stats-1336 .cs-h3 {
  font-size: 1rem;
  line-height: 1.5em;
  font-weight: 400;
  text-align: left;
  /* auto margin top will push text to bottom if there's only one line */
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
</head>
<body>

<!--                   
    These "Micro Stitches" are to be placed inside the .cs-content group of Side By Side Stitches.  Typically after the .cs-title or .cs-text. They are used to add more design flair to a Stitch as well as convey more information in a different way.
-->

<ul id="stats-1336" class="cs-ul">
    <li class="cs-item">
        <span class="cs-number">150 +</span>
        <h3 class="cs-h3">Staff on three continents</h3>
    </li>
    <li class="cs-item">
        <span class="cs-number">700 +</span>
        <h3 class="cs-h3">Consulting engagements</h3>
    </li>
    <li class="cs-item">
        <span class="cs-number">180 +</span>
        <h3 class="cs-h3">Learning community members</h3>
    </li>
</ul>

<script></script>
</body>
</html>
