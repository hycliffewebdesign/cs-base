<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>non standard</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>.cs-button-11 {
  text-decoration: none;
  padding-right: 1.875rem;
  display: flex;
  justify-content: flex-start;
  align-items: center;
  gap: 1rem;
  position: relative;
  perspective: 200px;
  transform-style: preserve-3d;
}
.cs-button-11:nth-of-type(2) {
  display: none;
}
.cs-button-11:hover .cs-wrapper {
  transform: rotateY(180deg);
}
.cs-button-11 .cs-wrapper {
  width: 3.5rem;
  height: 3.5rem;
  display: flex;
  justify-content: center;
  align-items: center;
  /* prevents flexbox from squishing it */
  flex: none;
  position: relative;
  z-index: 1;
  transition: transform 0.6s;
}
.cs-button-11 .cs-wrapper:before {
  /* backgorund color in pseudo so we can use the primary color variable and use opacity */
  content: "";
  width: 100%;
  height: 100%;
  background-color: var(--primary);
  opacity: 0.1;
  position: absolute;
  display: block;
  top: 0;
  left: 0;
  z-index: -1;
}
.cs-button-11 .cs-icon {
  width: 1.5rem;
  height: auto;
  display: block;
  transition: transform 0.3s;
}
.cs-button-11 .cs-info {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 0.25rem;
}
.cs-button-11 .cs-header {
  font-size: 1rem;
  line-height: 1.2em;
  font-weight: 700;
  margin: 0;
  color: var(--headerColor);
  display: block;
}
.cs-button-11 .cs-link-content {
  font-size: 0.875rem;
  line-height: 1.2em;
  font-weight: 400;
  margin: 0;
  color: var(--bodyTextColor);
  display: block;
}
</style>
</head>
<body>

<a class="cs-button-11" href="mailto:Info@health&wellness.com">
                <picture class="cs-wrapper">
                    <img class="cs-icon" loading="lazy" decoding="async" src="https://csimg.nyc3.cdn.digitaloceanspaces.com/Icons/yellow-pin.svg" alt="icon" width="24" height="24">
                </picture>
                <div class="cs-info">
                    <span class="cs-header">Visit Us At</span>
                    <span class="cs-link-content">Oak Harbor, WA</span>
                </div>
            </a>

<script></script>
</body>
</html>
