<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>non standard</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>

/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #sbs-2329 {
    padding: var(--sectionPadding);
    position: relative;

  #sbs-2329 .cs-container {

    text-align: left;

    gap: 1.25rem;

  #sbs-2329 .cs-li:last-of-type {
    margin: 0;
    padding: 0;
    border: none;
  }
  #sbs-2329 .cs-icon {

    width: clamp(2.5rem, 5vw, 3.75rem);
    height: auto;
    display: block;
  }
  #sbs-2329 .cs-h3 {
    font-size: 1.25rem;
    font-weight: 700;
    line-height: 1.2em;
    text-align: left;
    margin: 0 0 0.5rem 0;

  #sbs-2329 .cs-li-text {
    font-size: 1rem;
    line-height: 1.5em;
    text-align: left;
    margin: 0;
    color: var(--bodyTextColor);
  }
  #sbs-2329 .cs-picture {
    width: 100%;
    height: 22.5rem;
    display: block;
  }

    object-fit: cover;
  }
  #sbs-2329 .cs-button-solid {
    font-size: 1rem;
    font-weight: 700;
    /* 46px - 56px */
    line-height: clamp(2.875rem, 5.5vw, 3.5rem);
    text-align: center;
    text-decoration: none;
    min-width: 9.375rem;
    margin: 0;
    padding: 0 1.5rem;

    color: var(--bodyTextColorWhite);
    display: inline-block;
    position: relative;
    z-index: 1;
  }
  #sbs-2329 .cs-button-solid:before {
    content: "";
    width: 0%;
    height: 100%;
    background: #000;
    opacity: 1;
    border-radius: 0.25rem;
    position: absolute;
    top: 0;
    left: 0;
    z-index: -1;
    transition: width 0.3s;
  }
  #sbs-2329 .cs-button-solid:hover:before {
    width: 100%;
  }
}
/* Tablet - 768px */
@media only screen and (min-width: 48rem) {
  #sbs-2329 .cs-container {
    max-width: 80rem;

  }

    display: grid;

  #sbs-2329 .cs-flex-wrapper {

  #sbs-2329 .cs-content-picture {
    width: 28vw;

  }
  #sbs-2329 .cs-ul-wrapper {
    padding-bottom: 4.5rem;
  }
  #sbs-2329 .cs-ul {

  }
}
/* Desktop - 1024px */
@media only screen and (min-width: 64rem) {

</style>

<script>function togglePlayButton() {
    // Select all elements with the .cs-picture class
    const pictures = document.querySelectorAll('#sbs-2329 .cs-video');
  
    // Add a click event listener to each .cs-picture element
    pictures.forEach(picture => {
      picture.addEventListener('click', () => {
        // Select all elements with the .cs-play class
        const playButtons = document.querySelectorAll('#sbs-2329 .cs-play');
        
        // Toggle the .cs-hide class on each .cs-play element
        playButtons.forEach(button => {
          button.classList.toggle('cs-hide');
        });
      });
    });
  }
  
  // Call the function to activate the event listeners
  togglePlayButton();
  
  function toggleVideoPlayback() {
    // Select the video element
    const video = document.querySelector('#sbs-2329 video');
  
    // Add a click event listener to the video
    video.addEventListener('click', () => {
      // Check if the video is paused
      if (video.paused) {
        video.play(); // Play the video if it is paused
      } else {
        video.pause(); // Pause the video if it is playing
      }
    });
  }
  
  // Call the function to activate the event listener
  toggleVideoPlayback();</script>
