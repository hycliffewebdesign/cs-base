<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3 card</title>
  <style>:root {
  /* Add these styles to your global stylesheet, which is used across all site pages. You only need to do this once. All elements in the library derive their variables and base styles from this central sheet, simplifying site-wide edits. For instance, if you want to modify how your h2's appear across the site, you just update it once in the global styles, and the changes apply everywhere. */
  --primary: #ff6a3e;
  --primaryLight: #ffba43;
  --secondary: #ffba43;
  --secondaryLight: #ffba43;
  --headerColor: #1a1a1a;
  --bodyTextColor: #4e4b66;
  --bodyTextColorWhite: #fafbfc;
  /* 13px - 16px */
  --topperFontSize: clamp(0.8125rem, 1.6vw, 1rem);
  /* 31px - 49px */
  --headerFontSize: clamp(1.9375rem, 3.9vw, 3.0625rem);
  --bodyFontSize: 1rem;
  /* 60px - 100px top and bottom */
  --sectionPadding: clamp(3.75rem, 7.82vw, 6.25rem) 1rem;
}
body {
  margin: 0;
  padding: 0;
}
*,
*:before,
*:after {
  /* prevents padding from affecting height and width */
  box-sizing: border-box;
}
.cs-topper {
  font-size: var(--topperFontSize);
  line-height: 1.2em;
  text-transform: uppercase;
  text-align: inherit;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 0.25rem;
  display: block;
}
.cs-title {
  font-size: var(--headerFontSize);
  font-weight: 900;
  line-height: 1.2em;
  text-align: inherit;
  max-width: 43.75rem;
  margin: 0 0 1rem 0;
  color: var(--headerColor);
  position: relative;
}
.cs-text {
  font-size: var(--bodyFontSize);
  line-height: 1.5em;
  text-align: inherit;
  width: 100%;
  max-width: 40.625rem;
  margin: 0;
  color: var(--bodyTextColor);
}
</style>
  <style>/*-- -------------------------- -->
<---       Meet The Team        -->
<--- -------------------------- -*/
/* Mobile - 360px */
@media only screen and (min-width: 0rem) {
  #meet-us-348 {
    padding: var(--sectionPadding);
    background-color: #f7f7f7;
  }
  #meet-us-348 .cs-container {
    width: 100%;
    max-width: 80rem;
    margin: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    /* 48px - 64px */
    gap: clamp(3rem, 6vw, 4rem);
  }
  #meet-us-348 .cs-content {
    /* set text align to left if content needs to be left aligned */
    text-align: center;
    width: 100%;
    display: flex;
    flex-direction: column;
    /* centers content horizontally, set to flex-start to left align */
    align-items: center;
  }
  #meet-us-348 .cs-button-solid {
    font-size: 1rem;
    /* 46px - 56px */
    line-height: clamp(2.875rem, 5.5vw, 3.5rem);
    text-decoration: none;
    font-weight: 700;
    text-align: center;
    margin: 0;
    color: #fff;
    min-width: 9.375rem;
    padding: 0 1.5rem;
    background-color: var(--primary);
    border-radius: 0.25rem;
    display: inline-block;
    position: relative;
    z-index: 1;
    /* prevents padding from adding to the width */
    box-sizing: border-box;
  }
  #meet-us-348 .cs-button-solid:before {
    content: "";
    position: absolute;
    height: 100%;
    width: 0%;
    background: #000;
    opacity: 1;
    top: 0;
    left: 0;
    z-index: -1;
    border-radius: 0.25rem;
    transition: width 0.3s;
  }
  #meet-us-348 .cs-button-solid:hover:before {
    width: 100%;
  }
  #meet-us-348 .cs-card-group {
    width: 100%;
    padding: 0;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    gap: 1rem;
  }
  #meet-us-348 .cs-item {
    list-style: none;
    width: 100%;
    max-width: 21.5rem;
    border-radius: 1rem;
    /* clips corners */
    overflow: hidden;
    position: relative;
  }
  #meet-us-348 .cs-item:hover .cs-background {
    background-color: var(--primary);
  }
  #meet-us-348 .cs-item:hover .cs-background img {
    transform: scale(1.1);
    opacity: 0.9;
  }
  #meet-us-348 .cs-item:hover .cs-name {
    color: var(--primary);
  }
  #meet-us-348 .cs-info {
    padding: 0.75rem 1rem;
    background-color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 10;
  }
  #meet-us-348 .cs-name {
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--headerColor);
    line-height: 1.2em;
    margin: 0;
    display: block;
    transition: color 0.3s;
  }
  #meet-us-348 .cs-job {
    /* 14px - 16px */
    font-size: clamp(0.875rem, 1.5vw, 1rem);
    line-height: 1.5em;
    color: var(--bodyTextColor);
    display: block;
  }
  #meet-us-348 .cs-background {
    width: 100%;
    height: 21.25rem;
    overflow: hidden;
    display: block;
    position: relative;
    transition: background-color 0.3s;
  }
  #meet-us-348 .cs-background img {
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    width: 100%;
    /* makes it behave like a background image */
    object-fit: cover;
    /* makes the image position itself at the top of the parent */
    object-position: top;
    transition: transform 0.6s, opacity 0.3s;
  }
  #meet-us-348 .cs-bubbles {
    display: none;
  }
}
/* Tablet - 700px */
@media only screen and (min-width: 43.75rem) {
  #meet-us-348 .cs-title {
    margin-bottom: 0;
  }
  #meet-us-348 .cs-button-solid {
    margin: 0;
  }
  #meet-us-348 .cs-card-group {
    flex-direction: row;
    justify-content: center;
    width: 100%;
  }
  #meet-us-348 .cs-item {
    width: 48.8%;
  }
}
/* Desktop - 1024px */
@media only screen and (min-width: 64rem) {
  #meet-us-348 .cs-content {
    max-width: 100%;
  }
  #meet-us-348 .cs-card-group {
    flex-wrap: nowrap;
    justify-content: center;
  }
  #meet-us-348 .cs-item {
    /* stretch the list items as far as they can go, and the gap property on the parent will space them apart */
    width: 100%;
  }
  #meet-us-348 .cs-background {
    /* 250px - 335px */
    height: clamp(15.625rem, 25vw, 20.9375rem);
  }
  #meet-us-348 .cs-bubbles {
    display: block;
    position: absolute;
  }
  #meet-us-348 .cs-bubbles-small {
    width: 13.875rem;
    height: 9.5rem;
    left: -15.625rem;
    top: -3.125rem;
  }
  #meet-us-348 .cs-bubbles-small:before {
    /* circle 1 */
    content: "";
    width: 8.75rem;
    height: 8.75rem;
    border-radius: 50%;
    background: #fff;
    opacity: 1;
    position: absolute;
    display: block;
    top: 0;
    right: 0;
    animation-name: floatAnimation2;
    animation-duration: 6s;
    animation-timing-function: ease-in-out;
    animation-fill-mode: forwards;
    animation-iteration-count: infinite;
  }
  #meet-us-348 .cs-bubbles-small:after {
    /* circle 2 */
    content: "";
    width: 7.3125rem;
    height: 7.3125rem;
    border-radius: 50%;
    background: #fff;
    opacity: 1;
    position: absolute;
    display: block;
    bottom: 0;
    left: 0;
    animation-name: floatAnimation;
    animation-duration: 20s;
    animation-timing-function: ease-in-out;
    animation-fill-mode: forwards;
    animation-iteration-count: infinite;
  }
  #meet-us-348 .cs-bubbles-big {
    width: 19.75rem;
    height: 24.125rem;
    right: -18.75rem;
    bottom: -6.25rem;
  }
  #meet-us-348 .cs-bubbles-big:before {
    /* circle 1 */
    content: "";
    width: 5.875rem;
    height: 5.875rem;
    border-radius: 50%;
    background: #fff;
    opacity: 1;
    position: absolute;
    display: block;
    top: 0;
    left: 0;
    animation-name: floatAnimation2;
    animation-duration: 6s;
    animation-timing-function: ease-in-out;
    animation-fill-mode: forwards;
    animation-iteration-count: infinite;
  }
  #meet-us-348 .cs-bubbles-big:after {
    /* circle 2 */
    content: "";
    width: 5.875rem;
    height: 5.875rem;
    border-radius: 50%;
    background: #fff;
    opacity: 1;
    position: absolute;
    display: block;
    top: 4.375rem;
    right: 3.75rem;
    animation-name: floatAnimation;
    animation-duration: 20s;
    animation-timing-function: ease-in-out;
    animation-fill-mode: forwards;
    animation-iteration-count: infinite;
  }
  #meet-us-348 .cs-bubbles-big .cs-bubbles-big2 {
    width: 13.1875rem;
    height: 13.1875rem;
    border-radius: 50%;
    background: #fff;
    opacity: 1;
    position: absolute;
    display: block;
    bottom: 1.4375rem;
    left: 0.1875rem;
    animation-name: floatAnimation;
    animation-duration: 14s;
    animation-timing-function: ease-in-out;
    animation-fill-mode: forwards;
    animation-iteration-count: infinite;
  }
  #meet-us-348 .cs-bubbles-big .cs-bubbles-big2:before {
    /* second bubble */
    content: "";
    width: 9.875rem;
    height: 9.875rem;
    border-radius: 50%;
    background: #fff;
    opacity: 1;
    position: absolute;
    display: block;
    bottom: -4.6875rem;
    right: -4.6875rem;
    animation-name: floatAnimation2;
    animation-duration: 6s;
    animation-timing-function: ease-in-out;
    animation-fill-mode: forwards;
    animation-iteration-count: infinite;
  }
  @keyframes floatAnimation {
    0% {
      transform: translateY(0);
    }
    50% {
      transform: translateY(-2em);
    }
    100% {
      transform: translateY(0);
    }
  }
  @keyframes floatAnimation2 {
    0% {
      transform: translateY(0);
    }
    50% {
      transform: translateY(-1em);
    }
    100% {
      transform: translateY(0);
    }
  }
}
</style>
</head>
<body>

        <a href="" class="cs-button-solid">View All Members</a>
        <div class="cs-bubbles cs-bubbles-small" aria-hidden="true"></div>
        <div class="cs-bubbles cs-bubbles-big" aria-hidden="true">
