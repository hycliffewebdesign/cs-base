<section id="hero">
    <div class="cs-container">
        <div class="cs-content">
            <span class="cs-topper">Local Business Websites</span>
            <h1 class="cs-title">A Website That Works as Hard as You Do</h1>
            <p class="cs-text">
                {{ client.tagline }} Plans start at <strong class="cs-price">$239/month</strong> with hosting, updates, and support included.
            </p>
            <div class="cs-button-group">
                <a href="/contact/" class="cs-button-solid">Get a Free Quote</a>
                <a href="/services/" class="cs-button-outline">View Services</a>
            </div>
        </div>
        <picture class="cs-picture">
            <source media="(max-width: 600px)" srcset="{% getUrl "/assets/images/portfolio/port1.jpg" | resize({ width: 600, height: 520 }) | webp %}" type="image/webp">
            <source media="(max-width: 600px)" srcset="{% getUrl "/assets/images/portfolio/port1.jpg" | resize({ width: 600, height: 520 }) | jpeg %}" type="image/jpeg">
            <source media="(min-width: 601px)" srcset="{% getUrl "/assets/images/portfolio/port1.jpg" | resize({ width: 840, height: 728 }) | webp %}" type="image/webp">
            <source media="(min-width: 601px)" srcset="{% getUrl "/assets/images/portfolio/port1.jpg" | resize({ width: 840, height: 728 }) | jpeg %}" type="image/jpeg">
            <img src="{% getUrl "/assets/images/portfolio/port1.jpg" | resize({ width: 840, height: 728 }) | jpeg %}" alt="Professional website displayed on a laptop" width="420" height="364" decoding="async">
        </picture>
    </div>
</section>
